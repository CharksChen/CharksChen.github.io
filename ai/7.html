t":"静态类型只能在程序运行时确定","explanation":"错误。静态类型在编译时就能确定，而非运行时。运行时确定的是动态类型。"},{"id":2,"text":"动态类型一定与静态类型完全相同","explanation":"错误。当基类指针指向派生类对象时，静态类型是基类而动态类型是派生类，两者可以不同。"},{"id":3,"text":"只有普通对象才有动态类型，指针和引用没有动态类型相关问题","explanation":"错误。动态类型问题主要出现在指针和引用的场景中，普通对象赋值会发生切片，不存在动态类型差异。"}],"answer":[0]},{"id":18,"description":"# 问题<br><br>下列代码的输出结果是：<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass Base {\npublic:\n    virtual void f() {\n        cout &lt;&lt; &quot;Base&quot;;\n    }\n};\n\nclass Derived : public Base {\npublic:\n    void f(int x) {\n        cout &lt;&lt; &quot;Derived&quot;;\n    }\n};\n\nint main() {\n    Derived d;\n    Base* p = &amp;d;\n    p-&gt;f();\n    return 0;\n}</code></pre>","explanation":"出题人太懒，什么都没解释","choices":[{"id":0,"text":"Base","explanation":"正确。<code class=\"inline-code\">Derived::f(int x)</code>参数列表与<code class=\"inline-code\">Base::f()</code>不同，不构成覆盖而是隐藏。通过<code class=\"inline-code\">Base*</code>调用<code class=\"inline-code\">f()</code>时，查虚函数表找到的是<code class=\"inline-code\">Base::f()</code>，输出\"Base\"。"},{"id":1,"text":"Derived","explanation":"错误。派生类的<code class=\"inline-code\">f(int x)</code>与基类的<code class=\"inline-code\">f()</code>参数不同，不覆盖基类版本，基类指针调用<code class=\"inline-code\">f()</code>仍执行基类版本。"},{"id":2,"text":"BaseDerived","explanation":"错误。只调用了一次<code class=\"inline-code\">p-&gt;f()</code>，只会输出一个结果，不会同时输出两个。"},{"id":3,"text":"编译错误","explanation":"错误。<code class=\"inline-code\">Base::f()</code>是无参数的虚函数，<code class=\"inline-code\">p-&gt;f()</code>调用完全匹配，代码正确不会编译错误。"}],"answer":[0]},{"id":19,"description":"# 问题<br>关于 C++ 多态、虚函数和函数重载，下列说法正确的是：","explanation":"出题人太懒，什么都没解释","choices":[{"id":0,"text":"只要派生类中出现与基类同名的函数，就一定发生运行时多态","explanation":"错误。派生类中同名函数可能是覆盖（参数相同）或隐藏（参数不同），只有覆盖且通过指针/引用调用虚函数时才发生运行时多态。"},{"id":1,"text":"函数重载主要根据返回值类型区分不同函数","explanation":"错误。函数重载主要根据参数列表（个数、类型、顺序）来区分，返回值类型不同不能构成重载。"},{"id":2,"text":"通过基类指针或引用调用虚函数时，可能根据对象的实际类型决定调用版本","explanation":"正确。通过基类指针或引用调用虚函数时，运行时根据对象的实际类型（动态类型）从虚函数表中查找，可能调用基类版本也可能调用派生类版本。"},{"id":3,"text":"非虚函数也一定会根据对象的动态类型进行动态绑定","explanation":"错误。非虚函数是静态绑定的，在编译时就确定了调用版本，不会根据对象的动态类型进行动态绑定。"}],"answer":[2]}]},"14":{"title":"25程设Ⅱ-周14-理论题","questions":[{"id":0,"description":"关于多态，下列说法正确的是","explanation":"","choices":[{"id":0,"text":"一个对象同时占用多个内存空间","explanation":"错误。多态不是指一个对象占用多个内存空间，对象在内存中只有一份实例。"},{"id":1,"text":"同一个接口表现出不同的行为","explanation":"正确。多态的核心含义是同一个接口（如基类指针调用虚函数）根据对象的实际类型表现出不同的行为。"},{"id":2,"text":"一个类只能有一个父类","explanation":"错误。一个类只能有一个父类描述的是单继承，与多态无关。C++支持多重继承。"},{"id":3,"text":"一个函数只能被调用一次","explanation":"错误。函数可以被多次调用，这与多态概念完全无关。"}],"answer":[1]},{"id":1,"description":"下列关于纯虚函数的声明正确的是","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">virtual void f();</code>","explanation":"错误。<code class=\"inline-code\">virtual void f();</code>只是普通虚函数的声明，不是纯虚函数。纯虚函数需要<code class=\"inline-code\">= 0</code>。"},{"id":1,"text":"<code class=\"inline-code\">void f() = 0;</code>","explanation":"错误。<code class=\"inline-code\">void f() = 0;</code>缺少<code class=\"inline-code\">virtual</code>关键字，纯虚函数必须用virtual声明。"},{"id":2,"text":"<code class=\"inline-code\">virtual void f() = 0;</code>","explanation":"正确。纯虚函数的标准声明格式为<code class=\"inline-code\">virtual void f() = 0;</code>，需要virtual关键字和<code class=\"inline-code\">= 0</code>后缀。"},{"id":3,"text":"<code class=\"inline-code\">void virtual f();</code>","explanation":"错误。<code class=\"inline-code\">void virtual f();</code>虽然语法上virtual位置可以互换，但缺少<code class=\"inline-code\">= 0</code>，不是纯虚函数。"}],"answer":[2]},{"id":2,"description":"关于抽象类，错误的是（ ）","explanation":"","choices":[{"id":0,"text":"可以声明指针","explanation":"该说法正确，不是本题答案。抽象类可以声明指针，如<code class=\"inline-code\">Base* p;</code>，这是多态编程的常见用法。"},{"id":1,"text":"可以声明引用","explanation":"该说法正确，不是本题答案。抽象类可以声明引用，如<code class=\"inline-code\">Base&amp; ref = obj;</code>，引用不创建新对象。"},{"id":2,"text":"可以实例化对象","explanation":"该说法错误，是本题答案。抽象类包含纯虚函数，不能直接实例化对象，如<code class=\"inline-code\">Base b;</code>会导致编译错误。"},{"id":3,"text":"可以作为基类","explanation":"该说法正确，不是本题答案。抽象类的主要用途就是作为基类被派生类继承，以实现多态。"}],"answer":[2]},{"id":3,"description":"当Animal为抽象类时，下列代码中合法的是","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">Animal a;</code>","explanation":"错误。<code class=\"inline-code\">Animal a;</code>试图直接实例化抽象类对象，编译器会报错。"},{"id":1,"text":"<code class=\"inline-code\">Animal* p;</code>","explanation":"正确。<code class=\"inline-code\">Animal* p;</code>只是声明一个指向Animal的指针，不创建对象，完全合法。"},{"id":2,"text":"<code class=\"inline-code\">Animal x = Dog();</code>","explanation":"错误。<code class=\"inline-code\">Animal x = Dog();</code>会发生对象切片（slicing），且按值创建Animal对象不合法。"},{"id":3,"text":"<code class=\"inline-code\">Animal* fun();</code>","explanation":"正确。<code class=\"inline-code\">Animal* fun();</code>是返回Animal指针的函数声明，不实例化抽象类对象，合法。"}],"answer":[1,3]},{"id":4,"description":"关于虚析构函数的说法正确的是","explanation":"","choices":[{"id":0,"text":"析构函数不能是虚函数","explanation":"错误。析构函数可以声明为虚函数，且多态基类通常需要这样做。"},{"id":1,"text":"只有派生类需要虚析构","explanation":"错误。基类才需要声明虚析构函数，这样通过基类指针删除派生类对象时能正确调用派生类的析构函数。"},{"id":2,"text":"多态基类应该具有虚析构函数","explanation":"正确。多态基类应该具有虚析构函数，以确保通过基类指针delete时能正确调用整个继承链上的析构函数。"},{"id":3,"text":"虚析构会阻止对象析构","explanation":"错误。虚析构函数不会阻止对象析构，恰恰相反，它确保析构过程正确执行。"}],"answer":[2]},{"id":5,"description":"<code class=\"inline-code\">dynamic_cast</code> 向下转换失败时，若目标类型是指针，则返回","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">0</code>","explanation":"错误。虽然0和nullptr在数值上等价，但C++11起标准规定返回nullptr，返回0不是标准描述。"},{"id":1,"text":"<code class=\"inline-code\">nullptr</code>","explanation":"正确。<code class=\"inline-code\">dynamic_cast</code>向下转换失败时，若目标类型是指针则返回<code class=\"inline-code\">nullptr</code>。"},{"id":2,"text":"<code class=\"inline-code\">false</code>","explanation":"错误。<code class=\"inline-code\">dynamic_cast</code>不会返回false，false是布尔值，不适用于指针类型的转换结果。"},{"id":3,"text":"异常","explanation":"错误。只有当目标类型是引用时，转换失败才会抛出<code class=\"inline-code\">std::bad_cast</code>异常；指针类型失败返回nullptr。"}],"answer":[1]},{"id":6,"description":"关于纯虚函数，下列说法错误的是","explanation":"","choices":[{"id":0,"text":"使用 <code class=\"inline-code\">=0</code> 声明","explanation":"该说法正确，不是本题答案。纯虚函数使用<code class=\"inline-code\">= 0</code>语法声明，如<code class=\"inline-code\">virtual void f() = 0;</code>。"},{"id":1,"text":"所在类一定是抽象类","explanation":"该说法正确，不是本题答案。包含纯虚函数的类自动成为抽象类，不能直接实例化。"},{"id":2,"text":"纯虚函数必须实现函数体","explanation":"该说法错误，是本题答案。纯虚函数不需要在声明时提供函数体，它只是一个接口声明，具体实现由派生类完成。"},{"id":3,"text":"子类可将其实现为普通函数","explanation":"该说法正确，不是本题答案。子类可以覆写纯虚函数并提供具体实现，使其成为普通成员函数。"}],"answer":[2]},{"id":7,"description":"关于接口风格抽象类，下列说法错误的是","explanation":"","choices":[{"id":0,"text":"通常由纯虚函数组成","explanation":"该说法正确，不是本题答案。接口风格抽象类通常由纯虚函数组成，定义一组操作接口。"},{"id":1,"text":"可以包含静态成员","explanation":"该说法正确，不是本题答案。接口风格抽象类可以包含静态成员，静态成员不属于对象实例，不影响接口的抽象性。"},{"id":2,"text":"可以作为多重继承的公共接口","explanation":"该说法正确，不是本题答案。接口风格抽象类常用于多重继承，作为公共接口被多个类实现。"},{"id":3,"text":"可以包含普通数据成员","explanation":"该说法错误，是本题答案。接口风格抽象类不应包含普通数据成员，只包含纯虚函数（可能有静态成员），数据成员会破坏接口的纯粹性。"}],"answer":[3]},{"id":8,"description":"RTTI机制主要解决的问题是","explanation":"","choices":[{"id":0,"text":"编译时类型检查","explanation":"错误。编译时类型检查是静态类型系统的功能，不需要RTTI。RTTI专门解决运行时类型识别问题。"},{"id":1,"text":"运行时识别对象真实类型","explanation":"正确。RTTI（Run-Time Type Identification）的主要目的是在运行时识别多态对象的真实派生类型。"},{"id":2,"text":"动态分配内存","explanation":"错误。动态分配内存由new/delete完成，与RTTI无关。"},{"id":3,"text":"函数重载解析","explanation":"错误。函数重载解析在编译时完成，由编译器根据参数类型选择匹配的函数，不涉及RTTI。"}],"answer":[1]},{"id":9,"description":"关于抽象类的描述，正确的是","explanation":"","choices":[{"id":0,"text":"抽象类可以直接创建对象","explanation":"错误。抽象类含有纯虚函数，不能直接创建对象实例。"},{"id":1,"text":"抽象类不能作为基类","explanation":"错误。抽象类的主要用途就是作为基类被继承，派生类通过覆写纯虚函数实现具体功能。"},{"id":2,"text":"抽象类定义或继承了至少一个纯虚函数","explanation":"正确。抽象类是指定义或继承了至少一个纯虚函数的类，因此不能直接实例化。"},{"id":3,"text":"抽象类不能声明指针","explanation":"错误。抽象类可以声明指针和引用，如<code class=\"inline-code\">Shape* p;</code>，这是多态编程的基础。"}],"answer":[2]},{"id":10,"description":"关于 <code class=\"inline-code\">final</code> 说明符，下列说法正确的是","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">final</code> 可以修饰任意成员函数，包括非虚函数","explanation":"错误。<code class=\"inline-code\">final</code>只能修饰虚函数，用于非虚函数会导致编译错误。"},{"id":1,"text":"<code class=\"inline-code\">struct B final : A {}</code> 表示 B 不能被任何类继承","explanation":"正确。<code class=\"inline-code\">struct B final : A {}</code>中<code class=\"inline-code\">final</code>修饰类B，表示B不能被任何其他类继承。"},{"id":2,"text":"<code class=\"inline-code\">final</code> 修饰的函数在子类中仍然可以被覆写","explanation":"错误。<code class=\"inline-code\">final</code>修饰的虚函数在子类中不能再被覆写，否则编译器会报错。"},{"id":3,"text":"<code class=\"inline-code\">final</code> 是 C++98 引入的关键字","explanation":"错误。<code class=\"inline-code\">final</code>是C++11引入的标识符，不是C++98的内容。"}],"answer":[1]},{"id":11,"description":"**以下代码中，哪一行会导致编译错误？**<br><br>cpp<br><br><pre class=\"code-block\"><code>struct Base { virtual void foo(); };    // ①\nstruct A : Base {\n    void foo() final;                   // ②\n    void bar() final;                   // ③\n};\nstruct B final : A {\n    void foo() override;                // ④\n};\nstruct C : B {};                        // ⑤</code></pre>","explanation":"","choices":[{"id":0,"text":"①","explanation":"错误。①<code class=\"inline-code\">struct Base { virtual void foo(); };</code>是合法的虚函数声明。"},{"id":1,"text":"只有③","explanation":"错误。②<code class=\"inline-code\">void foo() final;</code>是合法的，A覆写了Base的虚函数并标记为final。"},{"id":2,"text":"③ 和 ④ 和 ⑤","explanation":"正确。③<code class=\"inline-code\">void bar() final;</code>错误，bar不是虚函数不能使用final；④B继承自被A标记final的foo存在问题；⑤<code class=\"inline-code\">struct C : B {};</code>错误，B被标记final不可继承。"},{"id":3,"text":"②","explanation":"错误。②<code class=\"inline-code\">void foo() final;</code>是合法的虚函数覆写并标记final。"}],"answer":[2]},{"id":12,"description":"关于 <code class=\"inline-code\">typeid</code> 运算符，下列说法正确的是","explanation":"","choices":[{"id":0,"text":"使用 <code class=\"inline-code\">typeid</code> 无需包含任何头文件","explanation":"错误。使用<code class=\"inline-code\">typeid</code>需要包含<code class=\"inline-code\">&lt;typeinfo&gt;</code>头文件。"},{"id":1,"text":"对多态类型对象使用 <code class=\"inline-code\">typeid</code> 时，返回的是对象的静态类型信息","explanation":"错误。对多态类型对象使用<code class=\"inline-code\">typeid</code>时，返回的是对象的动态类型（实际类型），而非静态类型。"},{"id":2,"text":"<code class=\"inline-code\">typeid</code> 返回 <code class=\"inline-code\">std::type_info</code> 对象，可通过 <code class=\"inline-code\">name()</code> 获取类型名","explanation":"正确。<code class=\"inline-code\">typeid</code>返回<code class=\"inline-code\">std::type_info</code>对象，可通过其<code class=\"inline-code\">name()</code>成员函数获取类型名称。"},{"id":3,"text":"<code class=\"inline-code\">typeid</code> 只能用于表达式，不能用于类型名","explanation":"错误。<code class=\"inline-code\">typeid</code>既可以用于表达式（如<code class=\"inline-code\">typeid(expr)</code>），也可以用于类型名（如<code class=\"inline-code\">typeid(int)</code>）。"}],"answer":[2]},{"id":13,"description":"关于 <code class=\"inline-code\">dynamic_cast</code>，下列说法错误的是","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">dynamic_cast</code> 可以沿继承层级向上、向下及侧向转换","explanation":"该说法正确，不是本题答案。<code class=\"inline-code\">dynamic_cast</code>支持沿继承层级向上（子类到基类）、向下（基类到子类）及侧向（兄弟类之间）转换。"},{"id":1,"text":"转型目标为指针类型且转型失败时，返回空指针","explanation":"该说法正确，不是本题答案。当转型目标为指针类型且失败时，<code class=\"inline-code\">dynamic_cast</code>返回空指针<code class=\"inline-code\">nullptr</code>。"},{"id":2,"text":"转型目标为引用类型且转型失败时，返回空引用","explanation":"该说法错误，是本题答案。当转型目标为引用类型且失败时，<code class=\"inline-code\">dynamic_cast</code>会抛出<code class=\"inline-code\">std::bad_cast</code>异常，不存在\"空引用\"的概念。"},{"id":3,"text":"<code class=\"inline-code\">dynamic_cast</code> 是运行时类型识别（RTTI）机制的一部分","explanation":"该说法正确，不是本题答案。<code class=\"inline-code\">dynamic_cast</code>是C++ RTTI（运行时类型识别）机制的核心组成部分。"}],"answer":[2]},{"id":14,"description":"关于 RTTI 机制，下列说法正确的是","explanation":"","choices":[{"id":0,"text":"RTTI 是 C 语言的特性，C++ 继承了该机制","explanation":"错误。RTTI是C++特有的运行时类型识别机制，C语言没有此特性。"},{"id":1,"text":"RTTI 允许程序在运行时通过基类指针检查所指对象的实际派生类型","explanation":"正确。RTTI允许程序在运行时通过基类指针或引用来检查所指对象的实际派生类型，主要依靠<code class=\"inline-code\">dynamic_cast</code>和<code class=\"inline-code\">typeid</code>。"},{"id":2,"text":"RTTI 只提供 <code class=\"inline-code\">typeid</code> 一种操作符","explanation":"错误。RTTI提供<code class=\"inline-code\">typeid</code>和<code class=\"inline-code\">dynamic_cast</code>两种主要操作，不只一种。"},{"id":3,"text":"RTTI 在编译期就能确定对象的动态类型","explanation":"错误。RTTI的全称就是\"运行时\"类型识别，其核心功能是在运行期间确定对象的动态类型，编译期无法确定。"}],"answer":[1]},{"id":15,"description":"关于抽象类与接口，下列说法正确的是","explanation":"","choices":[{"id":0,"text":"C++ 有专门的 <code class=\"inline-code\">interface</code> 关键字来定义接口","explanation":"错误。C++没有专门的<code class=\"inline-code\">interface</code>关键字，这是Java等语言的特性。"},{"id":1,"text":"C++ 可以用所有成员函数均为纯虚函数的类来模拟接口","explanation":"正确。C++可以用所有成员函数均为纯虚函数的抽象类来模拟接口，这是C++中实现接口的标准方式。"},{"id":2,"text":"接口风格的抽象类不能包含任何静态成员","explanation":"错误。接口风格的抽象类可以包含静态成员，静态成员不依赖于对象实例。"},{"id":3,"text":"接口风格的抽象类必须有构造函数","explanation":"错误。纯接口风格的抽象类（全部为纯虚函数）通常不需要构造函数，因为它不包含数据成员需要初始化。"}],"answer":[1]},{"id":16,"description":"以下关于接口风格抽象类被多重继承的说法，正确的是","explanation":"","choices":[{"id":0,"text":"接口风格抽象类多重继承时必然产生命名冲突","explanation":"错误。接口风格抽象类由于只有纯虚函数没有数据成员，多重继承时不会因数据成员产生命名冲突。"},{"id":1,"text":"接口风格抽象类因为没有数据成员，可以无歧义地被多重继承","explanation":"正确。接口风格抽象类因为没有数据成员，可以无歧义地被多重继承，避免了菱形继承中数据冗余和二义性问题。"},{"id":2,"text":"C++ 中多重继承接口风格抽象类需要使用 <code class=\"inline-code\">implements</code> 关键字","explanation":"错误。C++没有<code class=\"inline-code\">implements</code>关键字，多重继承仍使用普通的冒号加基类列表语法。"},{"id":3,"text":"接口风格抽象类不能被虚继承","explanation":"错误。接口风格抽象类可以被虚继承，虚继承是解决多重继承菱形问题的另一种方式。"}],"answer":[1]},{"id":17,"description":"下列哪种情况下，抽象类的子类仍然是抽象类？","explanation":"","choices":[{"id":0,"text":"子类只覆写了部分纯虚函数，还有纯虚函数未被覆写","explanation":"正确。如果子类只覆写了部分纯虚函数，剩余的纯虚函数未覆写，子类仍然是抽象类，不能实例化。"},{"id":1,"text":"子类覆写了基类所有纯虚函数","explanation":"错误。如果子类覆写了基类所有纯虚函数，则子类不再是抽象类，可以被实例化。"},{"id":2,"text":"子类新增了自己的普通成员函数","explanation":"错误。新增普通成员函数不影响类的抽象性，是否为抽象类取决于是否还有未覆写的纯虚函数。"},{"id":3,"text":"子类新增了自己的数据成员","explanation":"错误。新增数据成员不影响类的抽象性，是否为抽象类取决于是否还有未覆写的纯虚函数。"}],"answer":[0]},{"id":18,"description":"**下列客户端代码中，合法的是（Shape 为抽象类）**<br><br><pre class=\"code-block\"><code>Shape fun1(int);        // ①\nvoid fun2(Shape a);     // ②\nShape&amp; fun3(Shape&amp; a);  // ③\nShape x;                // ④\nShape* p;               // ⑤</code></pre>","explanation":"","choices":[{"id":0,"text":"③ 和 ⑤","explanation":"正确。③<code class=\"inline-code\">Shape&amp; fun3(Shape&amp; a);</code>返回引用合法，⑤<code class=\"inline-code\">Shape* p;</code>声明指针合法，两者都不创建抽象类对象。"},{"id":1,"text":"④ 和 ⑤","explanation":"错误。④<code class=\"inline-code\">Shape x;</code>试图直接实例化抽象类对象，编译错误。"},{"id":2,"text":"① 和 ②","explanation":"错误。①<code class=\"inline-code\">Shape fun1(int);</code>按值返回抽象类对象不合法，②<code class=\"inline-code\">void fun2(Shape a);</code>按值传递抽象类参数也不合法。"},{"id":3,"text":"只有 ①","explanation":"错误。①<code class=\"inline-code\">Shape fun1(int);</code>按值返回抽象类对象不合法，不能编译通过。"}],"answer":[0]},{"id":19,"description":"关于虚析构函数，下列说法正确的是","explanation":"","choices":[{"id":0,"text":"只要基类有虚函数，不需要虚析构函数也能正确释放派生类对象","explanation":"错误。如果基类析构函数不是虚函数，通过基类指针delete派生类对象时只会调用基类析构，派生类部分不会被正确释放。"},{"id":1,"text":"派生类析构函数必须显式声明 <code class=\"inline-code\">virtual</code> 才能被正确调用","explanation":"错误。如果基类析构函数是虚函数，派生类析构函数会自动成为虚函数，不需要显式声明<code class=\"inline-code\">virtual</code>。"},{"id":2,"text":"虚析构函数不能有函数体，必须写成纯虚函数","explanation":"错误。虚析构函数可以有函数体，不必写成纯虚函数。纯虚析构函数是特殊情况，且也必须提供函数体。"},{"id":3,"text":"任何包含虚函数的基类，其析构函数必须为公开且虚，或受保护且非虚","explanation":"正确。这是C++最佳实践：如果基类用于多态（含虚函数），析构函数应为公开且虚的；如果不需要多态删除，则析构函数应为受保护且非虚的。"}],"answer":[3]}]},"15":{"title":"25程设Ⅱ-周15-理论题","questions":[{"id":0,"description":"关于泛型编程与模板的特征，下列说法错误的是？","explanation":"泛型编程（模板）是在编译期完成实例化和决议的，它属于静态多态性（编译时多态），而不是基于虚函数的动态多态性（运行时多态）。","choices":[{"id":0,"text":"泛型编程独立于任何特定数据类型","explanation":"该说法正确，不是本题答案。泛型编程的核心思想是编写独立于特定数据类型的通用代码，通过模板参数实现类型参数化。"},{"id":1,"text":"模板实例化（Instantiation）是由编译器在编译期完成的","explanation":"该说法正确，不是本题答案。模板实例化是由编译器在编译期完成的，编译器根据实际使用的类型参数生成具体的函数或类代码。"},{"id":2,"text":"泛型编程利用模板实现了动态多态性（运行时代态）","explanation":"该说法错误，是本题答案。泛型编程利用模板实现的是静态多态性（编译时多态），而非动态多态性（运行时的虚函数多态）。"},{"id":3,"text":"模板的代码只有在被具体类型实例化后，才会由编译器生成实际的机器代码","explanation":"该说法正确，不是本题答案。模板只有被具体类型实例化后，编译器才会生成对应的实际机器代码，未使用的模板不会产生代码。"}],"answer":[2]},{"id":1,"description":"考虑以下函数模板声明：<code class=\"inline-code\">template &lt;typename T&gt; T foo(T a, T b);</code>，在不考虑隐式类型转换的情况下，以下哪个调用会导致编译错误？","explanation":"<code class=\"inline-code\">foo(1, 2.5)</code> 传入了一个 <code class=\"inline-code\">int</code> 和一个 <code class=\"inline-code\">double</code>。由于模板参数只有一个 <code class=\"inline-code\">T</code>，编译器在推导时会发生类型冲突（一个推导为 <code class=\"inline-code\">int</code>，一个推导为 <code class=\"inline-code\">double</code>），在没有显式指定 <code class=\"inline-code\">&lt;double&gt;</code> 的情况下会导致编译错误。","choices":[{"id":0,"text":"<code class=\"inline-code\">foo(1, 2);</code>","explanation":"该调用不会导致编译错误，不是本题答案。<code class=\"inline-code\">foo(1, 2)</code>两个参数都是int，可以推导出T=int，编译通过。"},{"id":1,"text":"<code class=\"inline-code\">foo(1.5, 2.5);</code>","explanation":"该调用不会导致编译错误，不是本题答案。<code class=\"inline-code\">foo(1.5, 2.5)</code>两个参数都是double，可以推导出T=double，编译通过。"},{"id":2,"text":"<code class=\"inline-code\">foo(1, 2.5);</code>","explanation":"该调用会导致编译错误，是本题答案。<code class=\"inline-code\">foo(1, 2.5)</code>第一个参数是int，第二个是double，模板参数T无法同时推导为两种不同类型，编译失败。"},{"id":3,"text":"<code class=\"inline-code\">foo&lt;double&gt;(1, 2.5);</code>","explanation":"该调用不会导致编译错误，不是本题答案。<code class=\"inline-code\">foo&lt;double&gt;(1, 2.5)</code>显式指定T=double，int参数会隐式转换为double，编译通过。"}],"answer":[2]},{"id":2,"description":"下列关于函数模板特化（Specialization）的说法中，正确的是？","explanation":"函数模板全特化时，<code class=\"inline-code\">template &lt;&gt;</code> 尖括号内留空。特化版本是具体类型的独立实现，其内部业务逻辑可以与主模板截然不同，但匹配时编译器依然会优先看重载和特化链。","choices":[{"id":0,"text":"函数模板特化形式为 <code class=\"inline-code\">template &lt;typename T&gt;</code> 后面跟特化函数定义","explanation":"错误。函数模板全特化的正确形式是<code class=\"inline-code\">template &lt;&gt;</code>（空尖括号）后跟特化函数定义，而非保留模板参数。"},{"id":1,"text":"特化版本的函数体必须与主模板（基础模板）的实现逻辑完全一致","explanation":"错误。特化版本的函数体可以与主模板完全不同，特化的目的就是为特定类型提供不同的实现逻辑。"},{"id":2,"text":"进行全特化时，<code class=\"inline-code\">template &lt;&gt;</code> 后面的尖括号内不保留任何模板类型形参","explanation":"正确。进行全特化时，<code class=\"inline-code\">template &lt;&gt;</code>后面的尖括号内不保留任何模板类型形参，表示所有参数都已具体化。"},{"id":3,"text":"编译器在匹配函数时，总是优先匹配基础模板，匹配不上才考虑特化版本","explanation":"错误。编译器在匹配函数时，在参数完美匹配的情况下优先选择非模板函数，其次是特化版本，最后才是基础模板。"}],"answer":[2]},{"id":3,"description":"观察以下代码片段，该程序在编译运行后的输出结果是？<br><pre class=\"code-block\"><code>template &lt;typename T&gt;\nvoid print(T x) { std::cout &lt;&lt; 1; }\n\ntemplate &lt;&gt;\nvoid print(int x) { std::cout &lt;&lt; 2; }\n\nvoid print(int x) { std::cout &lt;&lt; 3; }\n\nint main() {\n    print(10);\n}</code></pre>","explanation":"重载决议中，普通非模板函数的匹配优先级绝对高于模板函数（包括其特化版本）。因此直接路由到 <code class=\"inline-code\">print(int)</code> 打印出 <code class=\"inline-code\">3</code>。","choices":[{"id":0,"text":"1","explanation":"错误。输出不是1。基础模板<code class=\"inline-code\">print(T x)</code>的优先级最低，被普通函数和特化版本覆盖。"},{"id":1,"text":"2","explanation":"错误。输出不是2。全特化版本<code class=\"inline-code\">print(int x)</code>虽然匹配，但普通非模板函数优先级更高。"},{"id":2,"text":"3","explanation":"正确。<code class=\"inline-code\">print(10)</code>中，普通非模板函数<code class=\"inline-code\">void print(int x)</code>优先级最高，输出3。重载决议优先级：普通函数 &gt; 特化模板 &gt; 基础模板。"},{"id":3,"text":"编译错误，函数重载定义冲突","explanation":"错误。三个print函数不构成重载冲突，它们分别是基础模板、全特化版本和普通函数，编译器可以通过重载决议正确选择。"}],"answer":[2]},{"id":4,"description":"在类模板的定义中，下列关于成员函数外部实现的语法，正确的是？","explanation":"类模板的成员函数在外部实现时，必须完整携带 <code class=\"inline-code\">template &lt;...&gt;</code> 声明，且作用域限定符前要写带有参数列表的类名 <code class=\"inline-code\">Stack&lt;T&gt;::</code>。","choices":[{"id":0,"text":"<code class=\"inline-code\">void Stack&lt;T&gt;::push(T x) { ... }</code>","explanation":"错误。缺少<code class=\"inline-code\">template &lt;typename T&gt;</code>前缀，编译器无法识别T是模板参数。"},{"id":1,"text":"<code class=\"inline-code\">template &lt;class T&gt; void Stack::push(T x) { ... }</code>","explanation":"错误。类名后缺少模板参数<code class=\"inline-code\">&lt;T&gt;</code>，应为<code class=\"inline-code\">Stack&lt;T&gt;::push</code>。"},{"id":2,"text":"<code class=\"inline-code\">template &lt;typename T&gt; void Stack&lt;T&gt;::push(T x) { ... }</code>","explanation":"正确。类模板成员函数的外部实现需要<code class=\"inline-code\">template &lt;typename T&gt;</code>前缀，类名后加<code class=\"inline-code\">&lt;T&gt;</code>，语法为<code class=\"inline-code\">template &lt;typename T&gt; void Stack&lt;T&gt;::push(T x)</code>。"},{"id":3,"text":"<code class=\"inline-code\">template &lt;typename T&gt; void Stack::push&lt;T&gt;(T x) { ... }</code>","explanation":"错误。类名后缺少<code class=\"inline-code\">&lt;T&gt;</code>，且函数名后不应加<code class=\"inline-code\">&lt;T&gt;</code>，语法不正确。"}],"answer":[2]},{"id":5,"description":"关于非类型模板形参（Non-type Template Parameters），下列说法正确的是？","explanation":"非类型模板参数本质上是编译期常量。在 C++11 标准中，浮点数、类对象字符串等都不能直接充当非类型形参。","choices":[{"id":0,"text":"任何自定义的类结构体对象（如 <code class=\"inline-code\">std::string</code>）都可以直接作为非类型模板形参","explanation":"错误。自定义类对象（如<code class=\"inline-code\">std::string</code>）不能直接作为非类型模板形参，非类型形参只能是整型、枚举、指针、引用等特定类型。"},{"id":1,"text":"非类型模板实参必须是编译期常量或常量表达式","explanation":"正确。非类型模板实参必须是编译期常量或常量表达式，因为模板实例化发生在编译期，需要在此时确定参数值。"},{"id":2,"text":"非类型模板形参在模板类内部可以被当成普通变量进行动态修改","explanation":"错误。非类型模板形参在模板类内部被视为常量，不能被动态修改，其值在编译期就已确定。"},{"id":3,"text":"浮点数类型（如 <code class=\"inline-code\">float</code>、<code class=\"inline-code\">double</code>）在 C++11 标准中可以无条件直接作为非类型模板形参","explanation":"错误。在C++11标准下，浮点数类型（如float、double）不能作为非类型模板形参，C++17起部分支持，C++20才正式支持。"}],"answer":[1]},{"id":6,"description":"设有类模板定义：<code class=\"inline-code\">template &lt;typename T, int N&gt; class Array { ... };</code>，以下哪组对象的类型在编译期被认为是完全相同的类型？","explanation":"<code class=\"inline-code\">Array&lt;int, 2+3&gt;</code> 在编译期被计算为 <code class=\"inline-code\">Array&lt;int, 5&gt;</code>，二者完全是同一种类型。而非类型模板参数不同的类（如大小为5和10）被编译器视为两种毫无关联的独立类型。","choices":[{"id":0,"text":"<code class=\"inline-code\">Array&lt;int, 5&gt;</code> 与 <code class=\"inline-code\">Array&lt;int, 10&gt;</code>","explanation":"错误。<code class=\"inline-code\">Array&lt;int, 5&gt;</code>与<code class=\"inline-code\">Array&lt;int, 10&gt;</code>的非类型参数不同（5≠10），是不同的类型。"},{"id":1,"text":"<code class=\"inline-code\">Array&lt;int, 5&gt;</code> 与 <code class=\"inline-code\">Array&lt;double, 5&gt;</code>","explanation":"错误。<code class=\"inline-code\">Array&lt;int, 5&gt;</code>与<code class=\"inline-code\">Array&lt;double, 5&gt;</code>的类型参数不同（int≠double），是不同的类型。"},{"id":2,"text":"<code class=\"inline-code\">Array&lt;int, 2 + 3&gt;</code> 与 <code class=\"inline-code\">Array&lt;int, 5&gt;</code>","explanation":"正确。<code class=\"inline-code\">2 + 3</code>是编译期常量表达式，编译器会将其计算为5，因此<code class=\"inline-code\">Array&lt;int, 2+3&gt;</code>与<code class=\"inline-code\">Array&lt;int, 5&gt;</code>是完全相同的类型。"},{"id":3,"text":"<code class=\"inline-code\">Array&lt;const int, 5&gt;</code> 与 <code class=\"inline-code\">Array&lt;int, 5&gt;</code>","explanation":"错误。<code class=\"inline-code\">Array&lt;const int, 5&gt;</code>与<code class=\"inline-code\">Array&lt;int, 5&gt;</code>的类型参数不同（const int≠int），是不同的类型。"}],"answer":[2]},{"id":7,"description":"函数模板可以重载。若同时存在普通非模板函数和同名的函数模板，在参数完美匹配的情况下，编译器的重载决议（Overload Resolution）策略是？","explanation":"精简规则：非模板普通函数 &gt; 模板特化/重载 &gt; 基础主模板。","choices":[{"id":0,"text":"优先选择非模板函数","explanation":"正确。当普通非模板函数和函数模板在参数完美匹配的情况下，编译器优先选择非模板函数，这是C++重载决议的规则。"},{"id":1,"text":"优先选择函数模板的基础版本","explanation":"错误。函数模板的基础版本优先级低于普通非模板函数，只有在没有匹配的普通函数时才会被选用。"},{"id":2,"text":"优先选择函数模板的特化版本","explanation":"错误。函数模板的特化版本优先级低于普通非模板函数。重载优先级为：普通函数 &gt; 特化模板 &gt; 基础模板。"},{"id":3,"text":"编译器无法抉择，直接报编译歧义错误（Ambiguous Call）","explanation":"错误。编译器不会报歧义错误，C++重载决议有明确的优先级规则，普通函数优先于模板函数。"}],"answer":[0]},{"id":8,"description":"考虑以下用于推导一维数组长度的函数模板：<br><pre class=\"code-block\"><code>template &lt;typename T, int N&gt;\nvoid getLength(T (&amp;arr)[N]) {\n    std::cout &lt;&lt; N;\n}</code></pre><br>对于定义 <code class=\"inline-code\">int a[10];</code>，调用 <code class=\"inline-code\">getLength(a);</code> 时，模板形参 <code class=\"inline-code\">T</code> 和 <code class=\"inline-code\">N</code> 分别被推导为什么？","explanation":"<code class=\"inline-code\">int a[10]</code> 的类型是“具有10个 int 元素的数组”。将其传给引用变参 <code class=\"inline-code\">T (&amp;arr)[N]</code> 时，<code class=\"inline-code\">T</code> 完美匹配其元素类型 <code class=\"inline-code\">int</code>，<code class=\"inline-code\">N</code> 自动推导为数组跨度 <code class=\"inline-code\">10</code>。","choices":[{"id":0,"text":"<code class=\"inline-code\">T</code> 是 <code class=\"inline-code\">int*</code>，<code class=\"inline-code\">N</code> 是 10","explanation":"错误。由于形参是数组引用<code class=\"inline-code\">T (&amp;arr)[N]</code>，数组不会退化为指针，T推导为元素类型int而非int*。"},{"id":1,"text":"<code class=\"inline-code\">T</code> 是 <code class=\"inline-code\">int</code>，<code class=\"inline-code\">N</code> 是 10","explanation":"正确。通过数组引用<code class=\"inline-code\">T (&amp;arr)[N]</code>传递<code class=\"inline-code\">int[10]</code>时，T推导为int（元素类型），N推导为10（数组长度）。"},{"id":2,"text":"<code class=\"inline-code\">T</code> 是 <code class=\"inline-code\">int[10]</code>，<code class=\"inline-code\">N</code> 无法推导","explanation":"错误。T推导为int（元素类型），不是int[10]。N可以正常推导为10，不存在无法推导的问题。"},{"id":3,"text":"编译报错，无法通过引用传递数组","explanation":"错误。C++支持通过引用传递数组，<code class=\"inline-code\">T (&amp;arr)[N]</code>正是防止数组退化为指针的标准写法。"}],"answer":[1]},{"id":9,"description":"如果将上题的函数签名修改为 <code class=\"inline-code\">template &lt;typename T, int N&gt; void getLength(T arr[N])</code>，调用 <code class=\"inline-code\">getLength(a);</code> 会发生什么？","explanation":"若形参写成常规值传参 <code class=\"inline-code\">T arr[N]</code>，在 C++ 语法规则中它会强制隐式退化为一级指针 <code class=\"inline-code\">T*</code>，导致编译器丢失长度信息，从而无法解出非类型常量 <code class=\"inline-code\">N</code>。","choices":[{"id":0,"text":"依然成功输出 10","explanation":"错误。形参改为值传递<code class=\"inline-code\">T arr[N]</code>后，数组会退化为指针T*，N无法推导，不能正常输出。"},{"id":1,"text":"编译期能够推导出 <code class=\"inline-code\">N</code>，但无法推导出 <code class=\"inline-code\">T</code>","explanation":"错误。实际上T可以推导（退化为指针类型int*），但N无法推导。选项描述恰好相反。"},{"id":2,"text":"编译错误，因为此时 <code class=\"inline-code\">arr</code> 会退化（Decay）为指针，无法推导出数组长度 <code class=\"inline-code\">N</code>","explanation":"正确。当形参为<code class=\"inline-code\">T arr[N]</code>（值传递）时，数组会退化为指针T*，维度信息N丢失，编译器无法推导出N，导致编译错误。"},{"id":3,"text":"运行期发生段错误（Segmentation Fault）","explanation":"错误。问题在编译期就会暴露（模板参数推导失败），不会进入运行阶段，更不会产生段错误。"}],"answer":[2]},{"id":10,"description":"观察以下关于类模板全特化的讨论，哪项陈述是错误的？","explanation":"类模板和函数模板都可以进行全特化（Full Specialization）。","choices":[{"id":0,"text":"只有类模板可以进行全特化，函数模板只能重载不能特化","explanation":"该说法错误，是本题答案。函数模板也可以进行特化（包括全特化），并非只能重载。类模板和函数模板都支持特化。"},{"id":1,"text":"类模板全特化时，必须在类名后用尖括号显式指定具体类型参数","explanation":"该说法正确，不是本题答案。类模板全特化时，必须在类名后用尖括号显式指定所有具体类型参数，如<code class=\"inline-code\">class MyTemplate&lt;int&gt;</code>。"},{"id":2,"text":"类模板的全特化版本可以定义与基础模板完全不同的成员变量和成员函数","explanation":"该说法正确，不是本题答案。类模板的全特化版本可以定义与基础模板完全不同的成员变量和成员函数，相当于一个独立的类定义。"},{"id":3,"text":"特化一个类模板时，必须在其前面写上空模板参数列表 <code class=\"inline-code\">template &lt;&gt;</code>","explanation":"该说法正确，不是本题答案。特化类模板时，必须在其前面写上空模板参数列表<code class=\"inline-code\">template &lt;&gt;</code>，表明这是一个全特化。"}],"answer":[0]},{"id":11,"description":"考虑以下代码，在编译时会发生什么情况？<br><pre class=\"code-block\"><code>template &lt;int Size&gt;\nclass Buffer {\n    int data[Size];\n};\n\nint main() {\n    int n;\n    std::cin &gt;&gt; n;\n    Buffer&lt;n&gt; myBuf;\n}</code></pre>","explanation":"模板实例化必须在编译期全部完成。<code class=\"inline-code\">n</code> 是通过 <code class=\"inline-code\">cin</code> 在运行期动态获取的，不满足编译期常量表达式的硬性条件。","choices":[{"id":0,"text":"编译成功，在运行期动态分配长度为 <code class=\"inline-code\">n</code> 的静态数组","explanation":"错误。非类型模板参数要求编译期常量，运行期变量n不能作为模板实参，编译会失败。"},{"id":1,"text":"编译失败，因为非类型模板实参 <code class=\"inline-code\">n</code> 是运行期变量，不是编译期常量","explanation":"正确。<code class=\"inline-code\">Buffer&lt;n&gt;</code>编译失败，因为n是运行时变量，非类型模板实参必须是编译期常量表达式。"},{"id":2,"text":"编译成功，但由于 <code class=\"inline-code\">n</code> 未初始化，会导致运行时数据越界","explanation":"错误。代码无法通过编译，不会进入运行阶段，不存在n未初始化的问题。"},{"id":3,"text":"只有当用户输入正整数时，编译才能成功","explanation":"错误。无论用户输入什么值，只要n是运行时变量就不能作为模板实参，编译必然失败。"}],"answer":[1]},{"id":12,"description":"下列关于模板代码的头文件包含模式，说法最准确的是？","explanation":"模板被称为“代码生成器”。编译器在面对单独的模板 <code class=\"inline-code\">.cpp</code> 时因为没有具体类型而无法生成任何具体目标的二进制机器码。因此，模板必须采用“包含模式”，将声明和具体实现均写在 <code class=\"inline-code\">.h</code> 中。","choices":[{"id":0,"text":"模板的声明和实现必须和普通类一样，分别放在 <code class=\"inline-code\">.h</code> 和 <code class=\"inline-code\">.cpp</code> 中独立编译","explanation":"错误。模板不能像普通类那样将声明和实现分离到.h和.cpp文件中，因为模板需要在编译期看到完整定义才能实例化。"},{"id":1,"text":"由于模板是编译期动态生成的代码源，通常将其声明与实现都写在同一个 <code class=\"inline-code\">.h</code> 头文件中","explanation":"正确。由于模板是编译期按需实例化的代码，通常将声明与实现都写在同一个.h头文件中，确保使用时能看到完整定义。"},{"id":2,"text":"<code class=\"inline-code\">.cpp</code> 文件中只要包含了模板的声明，不需要知道其实现细节就能成功完成链接","explanation":"错误。.cpp文件中只有模板声明而看不到实现，编译器无法实例化模板代码，会导致链接错误。"},{"id":3,"text":"编译器在编译没有被任何地方实例化的模板源文件时，会生成完整的二进制目标代码","explanation":"错误。模板只有被具体类型实例化后才会生成代码，没有被实例化的模板不会生成任何二进制目标代码。"}],"answer":[1]},{"id":13,"description":"观察以下关于二维数组引用的形参推导模板：<br><pre class=\"code-block\"><code>template &lt;typename T, int R, int C&gt;\nvoid processMatrix(T (&amp;matrix)[R][C]);</code></pre><br>已知 <code class=\"inline-code\">double mat[3][5];</code>，调用 <code class=\"inline-code\">processMatrix(mat);</code> 后，<code class=\"inline-code\">R</code> 和 <code class=\"inline-code\">C</code> 的值分别是？","explanation":"多维数组引用的边界推导依然遵循严格映射。<code class=\"inline-code\">mat[3][5]</code> 代表 3 行 5 列，对应 <code class=\"inline-code\">R = 3, C = 5</code>。","choices":[{"id":0,"text":"<code class=\"inline-code\">R = 5, C = 3</code>","explanation":"错误。对于<code class=\"inline-code\">int matrix[3][5]</code>传入<code class=\"inline-code\">T (&amp;arr)[R][C]</code>，R应为第一维3，C应为第二维5，不是R=5,C=3。"},{"id":1,"text":"<code class=\"inline-code\">R = 3, C = 5</code>","explanation":"正确。对于<code class=\"inline-code\">int matrix[3][5]</code>传入<code class=\"inline-code\">T (&amp;arr)[R][C]</code>，R推导为3（行数），C推导为5（列数）。"},{"id":2,"text":"<code class=\"inline-code\">R = 15</code>，<code class=\"inline-code\">C</code> 无法推导","explanation":"错误。R不会等于15（总元素数），二维数组引用会正确区分两个维度，R和C都可以被推导。"},{"id":3,"text":"编译错误，C++ 不支持多维数组引用的模板参数推导","explanation":"错误。C++完全支持多维数组引用的模板参数推导，<code class=\"inline-code\">T (&amp;arr)[R][C]</code>是标准用法。"}],"answer":[1]},{"id":14,"description":"下列哪种类型不能作为 C++11 标准下的非类型模板形参？","explanation":"C++11 标准明确禁止将浮点类型（<code class=\"inline-code\">float</code>/<code class=\"inline-code\">double</code>）用作非类型模板参数。","choices":[{"id":0,"text":"<code class=\"inline-code\">char</code>","explanation":"错误。<code class=\"inline-code\">char</code>是整型类型，可以作为非类型模板形参，如<code class=\"inline-code\">template &lt;char C&gt;</code>。"},{"id":1,"text":"<code class=\"inline-code\">long long</code>","explanation":"错误。<code class=\"inline-code\">long long</code>是整型类型，C++11起可以作为非类型模板形参。"},{"id":2,"text":"<code class=\"inline-code\">double</code>","explanation":"正确。在C++11标准下，<code class=\"inline-code\">double</code>等浮点类型不能作为非类型模板形参，只有整型、枚举、指针、引用等可以。"},{"id":3,"text":"指针类型（如 <code class=\"inline-code\">int*</code>）","explanation":"错误。指针类型（如<code class=\"inline-code\">int*</code>）可以作为非类型模板形参，前提是指向具有外部链接或静态存储期的对象。"}],"answer":[2]},{"id":15,"description":"在执行代码 <code class=\"inline-code\">template&lt;typename T&gt; void swap(T&amp; a, T&amp; b);</code> 的显式实例化声明时，正确的语法是？","explanation":"显式实例化的语法为 <code class=\"inline-code\">template</code> 关键字后直接接完整的函数签名（不能带空尖括号 <code class=\"inline-code\">&lt;&gt;</code>，带了就变成全特化了）。","choices":[{"id":0,"text":"<code class=\"inline-code\">template swap&lt;int&gt;(int&amp;, int&amp;);</code>","explanation":"错误。缺少返回类型<code class=\"inline-code\">void</code>，显式实例化声明需要完整的函数签名。"},{"id":1,"text":"<code class=\"inline-code\">template void swap&lt;int&gt;(int&amp;, int&amp;);</code>","explanation":"正确。显式实例化声明的正确语法为<code class=\"inline-code\">template void swap&lt;int&gt;(int&amp;, int&amp;);</code>，需要template关键字、返回类型和完整的函数签名。"},{"id":2,"text":"<code class=\"inline-code\">void swap&lt;int&gt;(int&amp;, int&amp;);</code>","explanation":"错误。缺少<code class=\"inline-code\">template</code>关键字，没有template前缀只是普通函数声明，不是显式实例化。"},{"id":3,"text":"<code class=\"inline-code\">template &lt;&gt; void swap&lt;int&gt;(int&amp;, int&amp;);</code>","explanation":"错误。<code class=\"inline-code\">template &lt;&gt;</code>是全特化的语法，不是显式实例化声明的语法。显式实例化只需<code class=\"inline-code\">template</code>不加尖括号。"}],"answer":[1]},{"id":16,"description":"观察下面这段带有偏序匹配陷阱的重载代码，执行 <code class=\"inline-code\">foo(5);</code> 后的输出结果是？<br><pre class=\"code-block\"><code>template &lt;typename T&gt;\nvoid foo(T x) { std::cout &lt;&lt; &quot;A&quot;; }\n\ntemplate &lt;typename T&gt;\nvoid foo(T* x) { std::cout &lt;&lt; &quot;B&quot;; }\n\ntemplate &lt;&gt;\nvoid foo(int x) { std::cout &lt;&lt; &quot;C&quot;; }\n\nint main() {\n    foo(5);\n}</code></pre>","explanation":"<code class=\"inline-code\">5</code> 是一个非常量左值/右值字面量 <code class=\"inline-code\">int</code>，与模板 <code class=\"inline-code\">T</code> 匹配时会被推导为 <code class=\"inline-code\">int</code>。由于存在 <code class=\"inline-code\">foo(int)</code> 的全特化版本，它会精准拦截该类型，输出 <code class=\"inline-code\">C</code>。","choices":[{"id":0,"text":"A","explanation":"错误。<code class=\"inline-code\">foo(5)</code>传入int值，A版本<code class=\"inline-code\">foo(T x)</code>虽然匹配但不是最优选择。"},{"id":1,"text":"B","explanation":"错误。B版本<code class=\"inline-code\">foo(T* x)</code>要求指针参数，<code class=\"inline-code\">foo(5)</code>传入的是int值，不匹配。"},{"id":2,"text":"C","explanation":"正确。<code class=\"inline-code\">foo(5)</code>传入int值，全特化版本<code class=\"inline-code\">foo(int x)</code>精确匹配int类型，优先级高于基础模板，输出C。"},{"id":3,"text":"编译产生歧义","explanation":"错误。编译器不会产生歧义，全特化版本精确匹配int类型，优先级明确高于基础模板<code class=\"inline-code\">foo(T x)</code>。"}],"answer":[2]},{"id":17,"description":"接上题，如果我们在 <code class=\"inline-code\">main</code> 函数中改为执行 <code class=\"inline-code\">int n = 10; foo(&amp;n);</code>，输出结果将变为？","explanation":"<code class=\"inline-code\">&amp;n</code> 的类型是 <code class=\"inline-code\">int*</code>（指针类型）。在基础主模板 <code class=\"inline-code\">foo(T)</code> 和偏序重载模板 <code class=\"inline-code\">foo(T*)</code> 之间，后者显然更加精确偏序匹配。而 <code class=\"inline-code\">foo(int)</code> 全特化和指针无关，故匹配到 <code class=\"inline-code\">foo(T*)</code> 输出 <code class=\"inline-code\">B</code>。","choices":[{"id":0,"text":"A","explanation":"错误。A版本<code class=\"inline-code\">foo(T x)</code>虽然能匹配<code class=\"inline-code\">int*</code>，但B版本<code class=\"inline-code\">foo(T* x)</code>是更特化的匹配。"},{"id":1,"text":"B","explanation":"正确。<code class=\"inline-code\">foo(&amp;n)</code>传入<code class=\"inline-code\">int*</code>指针，B版本<code class=\"inline-code\">foo(T* x)</code>是偏特化匹配（更具体），优先于A版本<code class=\"inline-code\">foo(T x)</code>，输出B。"},{"id":2,"text":"C","explanation":"错误。C版本是全特化<code class=\"inline-code\">foo(int x)</code>，参数类型是int而非int*，与传入的指针不匹配。"},{"id":3,"text":"编译错误","explanation":"错误。不会编译错误，B版本<code class=\"inline-code\">foo(T* x)</code>可以完美匹配int*类型参数。"}],"answer":[1]},{"id":18,"description":"下列关于类模板内使用 <code class=\"inline-code\">typename</code> 的说法，正确的是？","explanation":"当类模板内部引用的嵌套项（如 <code class=\"inline-code\">T::iterator</code>）依赖于未确定的模板形参 <code class=\"inline-code\">T</code> 时，编译器在编译前无法确认它是静态成员变量还是类型。因此必须前置 <code class=\"inline-code\">typename</code> 强行声明其为类型。","choices":[{"id":0,"text":"<code class=\"inline-code\">typename</code> 和 <code class=\"inline-code\">class</code> 在任何场景下都可以完全互换，没有任何区别","explanation":"错误。<code class=\"inline-code\">typename</code>和<code class=\"inline-code\">class</code>在模板参数声明中可互换，但在从属类型名称场景中只能用<code class=\"inline-code\">typename</code>。"},{"id":1,"text":"在类模板内部声明嵌套的从属依赖类型（Dependent Name）时，必须前置 <code class=\"inline-code\">typename</code> 关键字","explanation":"正确。在类模板内部引用嵌套的从属依赖类型（如<code class=\"inline-code\">T::iterator</code>）时，必须前置<code class=\"inline-code\">typename</code>关键字告知编译器这是一个类型名。"},{"id":2,"text":"<code class=\"inline-code\">typename</code> 只能在非类型模板参数声明中使用","explanation":"错误。<code class=\"inline-code\">typename</code>主要在从属类型名（dependent type name）前使用，而非仅限于非类型模板参数声明。"},{"id":3,"text":"在实例化一个模板类对象时，必须显式书写 <code class=\"inline-code\">typename</code>","explanation":"错误。实例化模板类对象时不需要书写<code class=\"inline-code\">typename</code>，如<code class=\"inline-code\">vector&lt;int&gt; v;</code>即可。"}],"answer":[1]},{"id":19,"description":"设有模板声明：<code class=\"inline-code\">template &lt;typename T, typename U&gt; class Pair;</code>。现在想要为两个参数类型相同（如都是 <code class=\"inline-code\">int</code>，或都是 <code class=\"inline-code\">double</code>）的情况编写专门的高效逻辑。在不使用类模板特化（超纲）的前提下，我们可以通过下列哪种方式通知编译器处理？","explanation":"通过 if constexpr (std::is_same_v&lt;T, U&gt;) 在成员函数内部进行编译期分支判断，当模板参数 T 与 U 相同时，编译器仅保留高效逻辑分支并完全丢弃另一分支，既不依赖类模板特化，又能安全地为“类型相同”这一情况生成专门优化代码。","choices":[{"id":0,"text":"无法处理，必须引入偏特化","explanation":"错误。可以使用偏特化处理T和U相同的情况，但偏特化不是唯一的方案，也不是必须引入的。"},{"id":1,"text":"在成员函数内部通过编译期常量表达式 <code class=\"inline-code\">if constexpr (std::is_same_v&lt;T, U&gt;)</code> 结合业务进行分支控制。","explanation":"正确。在成员函数内部使用<code class=\"inline-code\">if constexpr (std::is_same_v&lt;T, U&gt;)</code>可以在编译期判断T和U是否相同并进行分支控制，这是C++17的简洁方案。"},{"id":2,"text":"在主模板里直接限制 <code class=\"inline-code\">template &lt;typename T, typename T&gt; class Pair;</code>","explanation":"错误。<code class=\"inline-code\">template &lt;typename T, typename T&gt;</code>语法错误，同一个模板参数列表中不能有两个同名的类型参数。"},{"id":3,"text":"在构造函数中强制将 <code class=\"inline-code\">U</code> 转换为 <code class=\"inline-code\">T</code>","explanation":"错误。在构造函数中强制转换U为T不能真正约束模板参数，且运行时转换无法在编译期捕获类型不匹配的问题。"}],"answer":[1]}]},"16":{"title":"25程设Ⅱ-周16-理论题（选做）","questions":[{"id":0,"description":"在 STL 中，哪个容器用于存储唯一的元素，且可以快速查找？","explanation":"set 容器在 STL 中用于存储唯一一元素，基于红黑树实现，查找时间复杂度为 O(log n)。","choices":[{"id":0,"text":"vector","explanation":"错误。vector是动态数组容器，允许存储重复元素，且不保证元素有序。"},{"id":1,"text":"deque","explanation":"错误。deque是双端队列容器，允许存储重复元素，主要优势在于两端高效插入删除。"},{"id":2,"text":"map","explanation":"错误。map存储键值对（key-value），虽然键唯一且可快速查找，但题目问的是存储唯一元素的容器，set更准确。"},{"id":3,"text":"set","explanation":"正确。set是关联容器，存储唯一的元素（不允许重复），底层通常用红黑树实现，支持O(log n)的快速查找。"}],"answer":[3]},{"id":1,"description":"STL 中 list 容器的主要优势是什么？","explanation":"list 容器在 STL 中使用双向链表实现，因此在任何位置插入和删除元素都非常高效。","choices":[{"id":0,"text":"随机访问","explanation":"错误。list是双向链表，不支持O(1)的随机访问，随机访问需要O(n)遍历。"},{"id":1,"text":"高效的插入和删除操作","explanation":"正确。list是双向链表结构，在已知位置的插入和删除操作只需O(1)时间，是其主要优势。"},{"id":2,"text":"可排序性","explanation":"错误。可排序性不是list的主要优势，虽然list提供了自己的sort成员函数，但这不是其核心特点。"},{"id":3,"text":"固定大小","explanation":"错误。list的大小是动态的，随元素增删而变化，\"固定大小\"描述的是array容器。"}],"answer":[1]},{"id":2,"description":"C++ STL 中 stack 容器的主要特征是什么？","explanation":"stack 容器在 STL 中实现的是后进先出（LIFO）结构，也即先进后出（FILO）。","choices":[{"id":0,"text":"随机访问","explanation":"错误。stack只允许访问栈顶元素，不支持随机访问任意位置的元素。"},{"id":1,"text":"先进后出（FILO）","explanation":"正确。stack（栈）遵循先进后出（FILO/LIFO）原则，只能在栈顶进行push和pop操作。"},{"id":2,"text":"双端队列","explanation":"错误。双端队列是deque的特征，stack只在一端（栈顶）进行操作。"},{"id":3,"text":"无序集合","explanation":"错误。无序集合是unordered_set的特征，stack是按特定顺序（LIFO）操作元素的容器适配器。"}],"answer":[1]},{"id":3,"description":"unordered_set 容器的查找复杂度通常为？","explanation":"unordered_set 容器使用哈希表实现，其查找、插入和删除操作的平均复杂度为 O(1)。","choices":[{"id":0,"text":"O(n)","explanation":"错误。O(n)是无序容器在最坏情况下的查找复杂度（哈希冲突严重时），不是通常情况。"},{"id":1,"text":"O(log n)","explanation":"错误。O(log n)是有序关联容器（如set、map，基于红黑树）的查找复杂度，不是unordered_set的。"},{"id":2,"text":"O(1)","explanation":"正确。unordered_set基于哈希表实现，在正常情况下查找的平均时间复杂度为O(1)。"},{"id":3,"text":"O(n^2)","explanation":"错误。O(n^2)不是任何标准STL容器的查找复杂度，这是明显不合理的性能。"}],"answer":[2]},{"id":4,"description":"如何在 queue 容器中访问队列的最后一个元素？","explanation":"","choices":[{"id":0,"text":"使用 front","explanation":"错误。<code class=\"inline-code\">front()</code>用于访问队列的队首元素（第一个元素），不是最后一个元素。"},{"id":1,"text":"使用 back","explanation":"正确。<code class=\"inline-code\">back()</code>方法可以访问queue中队列的最后一个元素（队尾元素）。"},{"id":2,"text":"队列不允许直接访问最后一个元素","explanation":"错误。queue允许通过<code class=\"inline-code\">back()</code>访问最后一个元素，通过<code class=\"inline-code\">front()</code>访问第一个元素。"},{"id":3,"text":"使用 pop","explanation":"错误。<code class=\"inline-code\">pop()</code>用于移除队首元素并不返回值，不能用来访问最后一个元素。"}],"answer":[1]},{"id":5,"description":"priority_queue 容器的默认实现是什么？","explanation":"priority_queue 容器默认实现为最大堆，即队列顶部元素是最大的。","choices":[{"id":0,"text":"最小堆","explanation":"错误。最小堆需要显式指定<code class=\"inline-code\">std::greater</code>比较器，如<code class=\"inline-code\">priority_queue&lt;int, vector&lt;int&gt;, greater&lt;int&gt;&gt;</code>。"},{"id":1,"text":"最大堆","explanation":"正确。priority_queue默认使用最大堆（max-heap）实现，<code class=\"inline-code\">top()</code>返回优先级最高（最大）的元素。"},{"id":2,"text":"先进先出队列","explanation":"错误。先进先出队列是queue的特征，priority_queue按优先级而非插入顺序出队。"},{"id":3,"text":"无序集合","explanation":"错误。priority_queue内部维护堆结构，元素按优先级有序排列，不是无序集合。"}],"answer":[1]},{"id":6,"description":"下面哪个容器以动态数组的形式存储元素？","explanation":"deque 容器基于动态数组实现，支持两端的高效插入和删除。","choices":[{"id":0,"text":"list","explanation":"错误。list是双向链表结构，元素通过节点和指针链接，不以动态数组形式存储。"},{"id":1,"text":"deque","explanation":"正确。deque（双端队列）以分段动态数组的形式存储元素，由多个固定大小的数组块组成，可视为动态数组的扩展形式。"},{"id":2,"text":"stack","explanation":"错误。stack是容器适配器，不是独立的存储结构，其底层可以是vector、deque或list。"},{"id":3,"text":"queue","explanation":"错误。queue是容器适配器，不是独立的存储结构，其底层通常是deque或list。"}],"answer":[1]},{"id":7,"description":"在 <code class=\"inline-code\">std::map</code> 中，调用 <code class=\"inline-code\">m.find(k)</code> 查找不存在的键时，返回什么？","explanation":"m.find(k) 找到时返回指向对应元素的迭代器，找不到时返回 m.end()","choices":[{"id":0,"text":"返回 \\<code class=\"inline-code\">nullptr\\</code>","explanation":"错误。STL容器的find方法不返回<code class=\"inline-code\">nullptr</code>，<code class=\"inline-code\">nullptr</code>是空指针常量，不是迭代器类型。"},{"id":1,"text":"返回 \\<code class=\"inline-code\">m.begin()\\</code>","explanation":"错误。查找不存在时不会返回<code class=\"inline-code\">m.begin()</code>，begin()指向容器的第一个元素。"},{"id":2,"text":"返回 \\<code class=\"inline-code\">m.end()\\</code>","explanation":"正确。当<code class=\"inline-code\">m.find(k)</code>查找不存在的键时，返回<code class=\"inline-code\">m.end()</code>，即尾后迭代器，表示查找失败。"},{"id":3,"text":"程序直接报错","explanation":"错误。查找不存在的键不会导致程序报错，而是返回end()迭代器，由程序员判断查找结果。"}],"answer":[2]},{"id":8,"description":"下列哪个不是 STL 中算法的特性？","explanation":"STL 中的算法是通用、可移植、高效的，但它们可以重载以适应不同类型的容器。","choices":[{"id":0,"text":"通用性","explanation":"该说法正确，通用性是STL算法的特性，不是本题答案。STL算法通过模板实现，可以作用于不同类型的容器和数据。"},{"id":1,"text":"可移植性","explanation":"该说法正确，可移植性是STL算法的特性，不是本题答案。STL算法基于标准接口设计，具有良好的可移植性。"},{"id":2,"text":"高效性","explanation":"该说法正确，高效性是STL算法的特性，不是本题答案。STL算法经过精心设计，如sort使用introsort实现O(n log n)性能。"},{"id":3,"text":"非重载性","explanation":"\"非重载性\"不是STL算法的特性，是本题答案。STL算法支持重载，许多算法提供多个版本（如带谓词和不带谓词的版本）。"}],"answer":[3]},{"id":9,"description":"哪个 STL 容器适合频繁在两端进行插入和删除操作？","explanation":"deque（双端队列）容器专为在两端高效插入和删除元素而设计。","choices":[{"id":0,"text":"vector","explanation":"错误。vector在头部插入需要移动所有元素，时间复杂度为O(n)，不适合频繁在头部操作。"},{"id":1,"text":"list","explanation":"错误。list虽然支持任意位置的高效插入删除，但在两端操作不如deque直接和高效。"},{"id":2,"text":"deque","explanation":"正确。deque（双端队列）专门设计为在两端都能高效地进行插入和删除操作，时间复杂度接近O(1)。"},{"id":3,"text":"set","explanation":"错误。set是有序关联容器，插入操作需维护排序，不适合以\"两端插入删除\"的场景来使用。"}],"answer":[2]},{"id":10,"description":"在 STL 中，哪个容器不使用动态内存分配？","explanation":"array 容器是固定大小的，不使用动态内存分配，其大小在编译时确定。","choices":[{"id":0,"text":"vector","explanation":"错误。vector在运行时通过new动态分配堆内存来存储元素，使用动态内存分配。"},{"id":1,"text":"array","explanation":"正确。<code class=\"inline-code\">std::array</code>在编译期确定大小，直接在栈上分配固定大小的连续内存，不使用动态内存分配。"},{"id":2,"text":"list","explanation":"错误。list的每个节点都需要动态分配内存，使用大量的动态内存分配。"},{"id":3,"text":"deque","explanation":"错误。deque在运行时动态分配多个固定大小的数组块来存储元素，使用动态内存分配。"}],"answer":[1]},{"id":11,"description":"哪个 STL 容器在内存中是不连续存储的？","explanation":"list 容器使用链表实现，其元素在内存中是不连续存储的，每个节点包含数据和指向下一个节点的指针。","choices":[{"id":0,"text":"vector","explanation":"错误。vector的元素在内存中是连续存储的，所有元素占据一块连续的内存区域。"},{"id":1,"text":"array","explanation":"错误。array的元素在内存中也是连续存储的，与vector类似但大小固定。"},{"id":2,"text":"list","explanation":"正确。list是双向链表，每个节点包含数据和前后指针，节点在内存中分散分配，不连续存储。"},{"id":3,"text":"deque","explanation":"错误。deque虽然分段存储，但每个段内部是连续的，且整体被视为\"分段连续\"而非完全不连续。list才是典型的不连续存储。"}],"answer":[2]},{"id":12,"description":"STL 中的 copy 算法主要用于什么？","explanation":"copy 算法用于将一个范围内的元素复制到另一个范围，需要确保目标范围有足够的空间。","choices":[{"id":0,"text":"复制容器","explanation":"错误。copy算法不是用来复制整个容器对象的，容器的复制可通过拷贝构造函数完成。"},{"id":1,"text":"将一个范围内的元素复制到另一个范围","explanation":"正确。copy算法将一个迭代器范围<code class=\"inline-code\">[first, last)</code>内的元素逐个复制到目标迭代器所指向的位置。"},{"id":2,"text":"创建容器的深拷贝","explanation":"错误。创建容器的深拷贝通常由容器的拷贝构造函数完成，copy算法只是逐元素复制，不创建容器本身。"},{"id":3,"text":"复制单个元素","explanation":"错误。copy算法处理的是一个范围内的多个元素，而非单个元素的复制。"}],"answer":[1]},{"id":13,"description":"在 STL 中，哪个容器适合频繁的插入和删除操作但不需要随机访问？","explanation":"count 算法用于计算特定元素在容器中出现的次数，而 count_if 则用于计算满足特定条件的元素数量。","choices":[{"id":0,"text":"vector","explanation":"错误。vector适合随机访问和尾部操作，在中间位置插入删除需要移动大量元素，效率较低。"},{"id":1,"text":"list","explanation":"正确。list（双向链表）适合频繁的插入和删除操作（O(1)），但不支持随机访问，遍历需要O(n)。"},{"id":2,"text":"array","explanation":"错误。array是固定大小容器，不支持动态的插入和删除操作。"},{"id":3,"text":"deque","explanation":"错误。deque虽然支持两端高效操作，但在中间位置插入删除效率不如list。"}],"answer":[1]},{"id":14,"description":"哪个 STL 容器在插入元素时可能导致迭代器失效？","explanation":"vector 容器在插入元素时，如果需要重新分配内存，会导致所有迭代器失效。","choices":[{"id":0,"text":"list","explanation":"错误。list的插入操作不会导致已有迭代器失效，因为链表节点独立分配，不影响其他节点的地址。"},{"id":1,"text":"set","explanation":"错误。set基于红黑树，插入新元素不会导致已有迭代器失效。"},{"id":2,"text":"vector","explanation":"正确。vector在插入元素时可能触发容量扩容，导致内存重新分配和元素搬移，所有迭代器、指针和引用都可能失效。"},{"id":3,"text":"map","explanation":"错误。map基于红黑树，插入新元素不会导致已有迭代器失效。"}],"answer":[2]},{"id":15,"description":"STL 中的 remove 算法实际上做了什么？","explanation":"remove 算法并不实际删除元素，而是将不需要删除的元素移到容器前部，返回新的逻辑结束位置。要真正删除元素，需要配合容器的 erase 方法。","choices":[{"id":0,"text":"从容器中删除元素","explanation":"错误。STL的remove算法并不真正从容器中删除元素，它只是重排元素，需要配合erase才能完成删除。"},{"id":1,"text":"将要删除的元素移到容器末尾","explanation":"正确。remove算法将要删除的元素移到容器末尾（保留在新逻辑结尾之后），返回新的逻辑结尾迭代器，需配合容器的erase完成实际删除。"},{"id":2,"text":"标记要删除的元素","explanation":"错误。remove不是简单地标记要删除的元素，而是将保留元素前移、被删元素后移来重排容器内容。"},{"id":3,"text":"替换要删除的元素","explanation":"错误。remove算法不替换元素值，而是通过移动元素将不需要删除的元素放在前面。"}],"answer":[1]},{"id":16,"description":"在 STL 中，哪个容器提供了常数时间的随机访问？","explanation":"vector 容器提供了常数时间的随机访问，因为它在内存中是连续存储的。","choices":[{"id":0,"text":"list","explanation":"错误。list是双向链表，只支持顺序访问，访问第n个元素需要O(n)时间。"},{"id":1,"text":"vector","explanation":"正确。vector的元素在内存中连续存储，通过下标或迭代器可以在O(1)常数时间内访问任意位置的元素。"},{"id":2,"text":"map","explanation":"错误。map是基于红黑树的关联容器，访问元素的时间复杂度为O(log n)。"},{"id":3,"text":"set","explanation":"错误。set是基于红黑树的关联容器，访问元素的时间复杂度为O(log n)。"}],"answer":[1]},{"id":17,"description":"STL 中的 generate 算法主要用于什么？","explanation":"generate 算法用于使用指定的函数生成容器中的元素值，可以用于初始化或重置容器。","choices":[{"id":0,"text":"生成随机数","explanation":"错误。generate算法本身不直接生成随机数，它调用函数对象填充元素，函数对象可以是随机数生成器但不限于此。"},{"id":1,"text":"使用函数生成容器元素","explanation":"正确。generate算法对指定范围内的每个元素调用函数对象（generator），将返回值赋给元素，用于批量生成填充数据。"},{"id":2,"text":"创建新容器","explanation":"错误。generate算法不创建新容器，它作用于已有的迭代器范围，修改现有容器的元素。"},{"id":3,"text":"复制容器元素","explanation":"错误。复制容器元素是copy算法的功能，generate的功能是通过函数对象生成新的元素值。"}],"answer":[1]},{"id":18,"description":"哪个 STL 容器在内存使用上最为高效？","explanation":"array 容器在内存使用上最为高效，因为它不需要额外的内存来存储容器管理信息，且大小固定。","choices":[{"id":0,"text":"vector","explanation":"错误。vector有动态扩容开销，可能分配多于实际需要的内存（capacity &gt; size），有额外内存开销。"},{"id":1,"text":"list","explanation":"错误。list每个节点都有额外的前后指针开销，内存使用效率低于无额外开销的容器。"},{"id":2,"text":"deque","explanation":"错误。deque需要维护多个内存块的指针和管理结构，有额外的管理开销。"},{"id":3,"text":"array","explanation":"正确。array在编译期确定大小，没有动态分配开销、没有指针成员、没有容量管理，内存使用最为高效。"}],"answer":[3]},{"id":19,"description":"STL 中的 reverse 算法主要用于什么？","explanation":"reverse 算法用于反转指定范围内的元素顺序，改变它们的排列方向。","choices":[{"id":0,"text":"反转容器","explanation":"错误。reverse算法不是反转整个容器对象，而是反转指定迭代器范围内的元素。"},{"id":1,"text":"反转指定范围内的元素顺序","explanation":"正确。reverse算法用于反转指定迭代器范围<code class=\"inline-code\">[first, last)</code>内的元素顺序，使其前后颠倒。"},{"id":2,"text":"反转单个元素","explanation":"错误。reverse算法处理的是一个范围内的多个元素，不是反转单个元素。"},{"id":3,"text":"反转迭代器方向","explanation":"错误。反转迭代器方向是使用反向迭代器（reverse_iterator）的功能，不是reverse算法的作用。"}],"answer":[1]}]},"17":{"title":"25程设Ⅱ-周17-理论题","questions":[{"id":0,"description":"STL 中的 <code class=\"inline-code\">stack</code>、<code class=\"inline-code\">queue</code> 和 <code class=\"inline-code\">priority_queue</code> 属于哪一类组件？","explanation":"","choices":[{"id":0,"text":"顺序容器","explanation":"错误。顺序容器是直接存储元素的容器（如vector、list、deque），stack/queue/priority_queue不直接管理存储。"},{"id":1,"text":"关联容器","explanation":"错误。关联容器是基于关键字组织的容器（如set、map），stack/queue/priority_queue不属于此类。"},{"id":2,"text":"容器适配器","explanation":"正确。stack、queue和priority_queue都是容器适配器（Container Adaptor），它们在底层顺序容器之上封装出特定的操作接口。"},{"id":3,"text":"迭代器","explanation":"错误。迭代器是用于遍历容器元素的通用工具，不是容器分类，stack/queue/priority_queue不属于迭代器。"}],"answer":[2]},{"id":1,"description":"容器适配器的主要作用是什么？","explanation":"","choices":[{"id":0,"text":"提供一种完全独立于容器的新存储结构","explanation":"错误。容器适配器不独立于底层容器，它们依赖底层顺序容器来实现实际的数据存储。"},{"id":1,"text":"在顺序容器之上提供不同的功能接口","explanation":"正确。容器适配器在顺序容器（如deque、vector、list）之上提供不同的功能接口，如栈的LIFO或队列的FIFO。"},{"id":2,"text":"替代所有 STL 算法","explanation":"错误。容器适配器与STL算法无关，它们不替代算法，实际上适配器通常不支持迭代器遍历。"},{"id":3,"text":"只用于文件输入输出","explanation":"错误。容器适配器用于提供特定的数据结构接口（栈、队列等），与文件输入输出无关。"}],"answer":[1]},{"id":2,"description":"<code class=\"inline-code\">stack</code> 的元素访问特点是？","explanation":"","choices":[{"id":0,"text":"先进先出 FIFO","explanation":"错误。先进先出（FIFO）是queue（队列）的特征，不是stack的。"},{"id":1,"text":"后进先出 LIFO","explanation":"正确。stack（栈）的元素访问特点是后进先出（LIFO），最后压入的元素最先被弹出。"},{"id":2,"text":"按关键字自动排序","explanation":"错误。按关键字自动排序是关联容器（如map、set）的特征，stack不按关键字排序。"},{"id":3,"text":"随机访问任意位置元素","explanation":"错误。stack只允许访问栈顶元素，不支持随机访问任意位置的元素。"}],"answer":[1]},{"id":3,"description":"<code class=\"inline-code\">queue</code> 的基本访问特点是？","explanation":"","choices":[{"id":0,"text":"在头端插入，在尾端删除","explanation":"错误。在头端插入、尾端删除不是queue的标准操作模式，queue是在尾端插入、头端删除。"},{"id":1,"text":"在尾端插入，在头端删除","explanation":"正确。queue在尾端插入元素（push），在头端删除元素（pop），实现先进先出（FIFO）的特性。"},{"id":2,"text":"在任意位置插入和删除","explanation":"错误。在任意位置插入和删除是list或vector等顺序容器的特征，queue只在两端操作。"},{"id":3,"text":"总是访问最大元素","explanation":"错误。总是访问最大元素是priority_queue（优先队列）的特征，不是普通queue的。"}],"answer":[1]},{"id":4,"description":"默认情况下，<code class=\"inline-code\">priority_queue</code> 中元素优先级通常由什么确定？","explanation":"","choices":[{"id":0,"text":"元素类型的 <code class=\"inline-code\">&lt;</code> 操作","explanation":"正确。默认情况下，priority_queue使用元素类型的<code class=\"inline-code\">&lt;</code>（less）操作确定优先级，最大元素优先级最高。"},{"id":1,"text":"元素的插入时间","explanation":"错误。priority_queue按元素值的优先级出队，与插入时间无关，不同于普通queue的FIFO。"},{"id":2,"text":"元素所在下标","explanation":"错误。priority_queue的元素按堆结构组织，没有传统意义的下标概念，优先级不由下标决定。"},{"id":3,"text":"元素地址大小","explanation":"错误。priority_queue的优先级由元素值的比较决定，与元素的内存地址大小无关。"}],"answer":[0]},{"id":5,"description":"<code class=\"inline-code\">stack</code> 中用于查看栈顶元素但不删除它的操作是？","explanation":"","choices":[{"id":0,"text":"push()","explanation":"错误。<code class=\"inline-code\">push()</code>用于将新元素压入栈中，不是查看栈顶元素的操作。"},{"id":1,"text":"pop()","explanation":"错误。<code class=\"inline-code\">pop()</code>用于弹出（删除）栈顶元素，不是查看操作。"},{"id":2,"text":"top()","explanation":"正确。<code class=\"inline-code\">top()</code>返回栈顶元素的引用但不将其删除，是查看栈顶元素的标准方法。"},{"id":3,"text":"front()","explanation":"错误。<code class=\"inline-code\">front()</code>是queue和deque等容器的方法，stack没有front()方法。"}],"answer":[2]},{"id":6,"description":"<code class=\"inline-code\">queue</code> 中 <code class=\"inline-code\">front()</code> 的作用是？","explanation":"","choices":[{"id":0,"text":"返回队首元素","explanation":"正确。<code class=\"inline-code\">front()</code>返回queue的队首元素（最先入队的元素）的引用，不删除该元素。"},{"id":1,"text":"返回队尾元素","explanation":"错误。返回队尾元素是<code class=\"inline-code\">back()</code>的功能，不是<code class=\"inline-code\">front()</code>的。"},{"id":2,"text":"删除队首元素","explanation":"错误。删除队首元素是<code class=\"inline-code\">pop()</code>的功能，且pop()不返回值。"},{"id":3,"text":"判断队列是否为空","explanation":"错误。判断队列是否为空是<code class=\"inline-code\">empty()</code>的功能，不是<code class=\"inline-code\">front()</code>的。"}],"answer":[0]},{"id":7,"description":"<code class=\"inline-code\">priority_queue</code> 的 <code class=\"inline-code\">pop()</code> 操作本质上会先调用哪类堆操作？","explanation":"","choices":[{"id":0,"text":"sort()","explanation":"错误。<code class=\"inline-code\">sort()</code>是通用排序算法，不是priority_queue的pop操作内部调用的堆操作。"},{"id":1,"text":"find()","explanation":"错误。<code class=\"inline-code\">find()</code>是查找算法，与priority_queue的堆维护操作无关。"},{"id":2,"text":"pop\\_heap()","explanation":"正确。<code class=\"inline-code\">priority_queue</code>的<code class=\"inline-code\">pop()</code>操作内部会先调用<code class=\"inline-code\">pop_heap()</code>将堆顶元素移到末尾再删除，以维护堆结构。"},{"id":3,"text":"count\\_if()","explanation":"错误。<code class=\"inline-code\">count_if()</code>是条件计数算法，与priority_queue的堆操作无关。"}],"answer":[2]},{"id":8,"description":"如果创建适配器对象时不指定底层容器，默认说法正确的是？","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">stack</code> 默认用 <code class=\"inline-code\">vector</code>，<code class=\"inline-code\">queue</code> 默认用 <code class=\"inline-code\">list</code>","explanation":"错误。stack默认使用deque而非vector作为底层容器，queue也不使用list。"},{"id":1,"text":"<code class=\"inline-code\">stack</code> 和 <code class=\"inline-code\">queue</code> 默认用 <code class=\"inline-code\">deque</code>，<code class=\"inline-code\">priority_queue</code> 默认用 <code class=\"inline-code\">vector</code>","explanation":"正确。stack和queue默认都使用deque作为底层容器，priority_queue默认使用vector作为底层容器。"},{"id":2,"text":"三者都默认用 <code class=\"inline-code\">list</code>","explanation":"错误。三者并非都默认使用list，stack和queue默认用deque，priority_queue默认用vector。"},{"id":3,"text":"三者都默认用 <code class=\"inline-code\">map</code>","explanation":"错误。三者都不使用map作为底层容器，map是关联容器，不适合作为适配器的底层存储。"}],"answer":[1]},{"id":9,"description":"<code class=\"inline-code\">stack</code> 的底层容器必须支持哪些操作？","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">front()</code>、<code class=\"inline-code\">pop_front()</code>、<code class=\"inline-code\">insert()</code>","explanation":"错误。<code class=\"inline-code\">front()</code>和<code class=\"inline-code\">pop_front()</code>是queue底层容器需要的操作，stack在尾部操作不需要这些。"},{"id":1,"text":"<code class=\"inline-code\">back()</code>、<code class=\"inline-code\">push_back()</code>、<code class=\"inline-code\">pop_back()</code>","explanation":"正确。stack的底层容器必须支持<code class=\"inline-code\">back()</code>（访问末尾）、<code class=\"inline-code\">push_back()</code>（末尾插入）和<code class=\"inline-code\">pop_back()</code>（末尾删除），因为栈操作都在一端完成。"},{"id":2,"text":"<code class=\"inline-code\">find()</code>、<code class=\"inline-code\">count()</code>、<code class=\"inline-code\">erase()</code>","explanation":"错误。<code class=\"inline-code\">find()</code>和<code class=\"inline-code\">count()</code>是关联容器的操作，stack的底层容器不需要这些。"},{"id":3,"text":"<code class=\"inline-code\">begin()</code>、<code class=\"inline-code\">end()</code>、<code class=\"inline-code\">sort()</code>","explanation":"错误。stack作为容器适配器不提供迭代器，其底层容器不需要<code class=\"inline-code\">begin()</code>/<code class=\"inline-code\">end()</code>来支持stack功能。"}],"answer":[1]},{"id":10,"description":"<pre class=\"code-block\"><code>c1.push(5);<br>cout &lt;&lt; c1.size() &lt;&lt; '\\n';<br>stack&lt;int&gt; c2(c1);<br>cout &lt;&lt; c2.size() &lt;&lt; '\\n';<br>deque&lt;int&gt; deq {3, 1, 4, 1, 5};<br>stack&lt;int&gt; c3(deq);<br>cout &lt;&lt; c3.size() &lt;&lt; '\\n';</code></pre>","explanation":"本题考查 stack 容器的基本操作：push() 入栈、size() 获取大小、拷贝构造、以及用 deque 初始化 stack。","choices":[{"id":0,"text":"0 1 5","explanation":"错误。c1在push(5)后size为1不是0，第一个输出应为1。"},{"id":1,"text":"1 1 5","explanation":"正确。c1.push(5)后size=1输出1；c2拷贝自c1，size=1输出1；c3从5个元素的deque构造，size=5输出5。"},{"id":2,"text":"1 5 5","explanation":"错误。c1在push(5)后的size是1不是5，c2拷贝c1后size也是1不是5。"},{"id":3,"text":"5 1 1","explanation":"错误。c1的size不会是5，push只压入了一个元素；c2的size是1不是拷贝后的c1。"}],"answer":[1]},{"id":11,"description":"在课件的回文判断程序中，如果字符串长度为奇数，后半部分比较起点应设为？","explanation":"","choices":[{"id":0,"text":"length / 2","explanation":"错误。<code class=\"inline-code\">length / 2</code>指向的是字符串的中间字符（如长度5时index=2），后半部分应从中间字符之后开始比较。"},{"id":1,"text":"length / 2 + 1","explanation":"正确。对于奇数长度字符串，中间字符不需要比较（它自身对称），后半部分的比较起点应设为<code class=\"inline-code\">length / 2 + 1</code>。例如长度5时，后半部分从index 3开始。"},{"id":2,"text":"length - 1","explanation":"错误。<code class=\"inline-code\">length - 1</code>是字符串的最后一个字符位置，不是后半部分的起点。"},{"id":3,"text":"0","explanation":"错误。0是字符串的起始位置，代表前半部分的起点，不是后半部分的比较起点。"}],"answer":[1]},{"id":12,"description":"输入迭代器的主要功能是？","explanation":"","choices":[{"id":0,"text":"只写","explanation":"错误。只写是输出迭代器（Output Iterator）的功能，不是输入迭代器的。"},{"id":1,"text":"只读","explanation":"正确。输入迭代器（Input Iterator）的主要功能是只读遍历，支持单向读取元素但不能修改。"},{"id":2,"text":"同时随机读写","explanation":"错误。同时随机读写是随机访问迭代器（Random Access Iterator）的功能，输入迭代器只支持单向顺序读取。"},{"id":3,"text":"只能删除元素","explanation":"错误。删除元素不是迭代器的功能，迭代器用于访问和遍历元素，删除由容器的erase方法完成。"}],"answer":[1]},{"id":13,"description":"<code class=\"inline-code\">forward_list</code> 的迭代器支持哪种典型操作？","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">++</code>，但不支持 <code class=\"inline-code\">--</code>","explanation":"正确。<code class=\"inline-code\">forward_list</code>是单向链表，其前向迭代器只支持<code class=\"inline-code\">++</code>前进操作，不支持<code class=\"inline-code\">--</code>后退操作。"},{"id":1,"text":"<code class=\"inline-code\">--</code>，但不支持 <code class=\"inline-code\">++</code>","explanation":"错误。<code class=\"inline-code\">forward_list</code>的前向迭代器支持<code class=\"inline-code\">++</code>，不支持<code class=\"inline-code\">--</code>，描述恰好相反。"},{"id":2,"text":"<code class=\"inline-code\">+=</code>，但不支持 <code class=\"inline-code\">++</code>","explanation":"错误。<code class=\"inline-code\">forward_list</code>的前向迭代器不支持<code class=\"inline-code\">+=</code>（这是随机访问迭代器的功能），但支持<code class=\"inline-code\">++</code>。"},{"id":3,"text":"<code class=\"inline-code\">[]</code> 随机访问","explanation":"错误。<code class=\"inline-code\">forward_list</code>的前向迭代器不支持<code class=\"inline-code\">[]</code>随机访问，只支持顺序遍历。"}],"answer":[0]},{"id":14,"description":"下列哪组容器通常提供随机访问迭代器？","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">array</code>、<code class=\"inline-code\">vector</code>、<code class=\"inline-code\">deque</code>","explanation":"正确。<code class=\"inline-code\">array</code>、<code class=\"inline-code\">vector</code>和<code class=\"inline-code\">deque</code>都提供随机访问迭代器（Random Access Iterator），支持<code class=\"inline-code\">[]</code>、<code class=\"inline-code\">+</code>、<code class=\"inline-code\">-</code>等操作。"},{"id":1,"text":"<code class=\"inline-code\">list</code>、<code class=\"inline-code\">set</code>、<code class=\"inline-code\">map</code>","explanation":"错误。list提供双向迭代器，set和map提供双向迭代器，都不是随机访问迭代器。"},{"id":2,"text":"<code class=\"inline-code\">forward_list</code>、<code class=\"inline-code\">list</code>、<code class=\"inline-code\">set</code>","explanation":"错误。forward_list提供前向迭代器，list和set提供双向迭代器，都不支持随机访问。"},{"id":3,"text":"<code class=\"inline-code\">map</code>、<code class=\"inline-code\">multimap</code>、<code class=\"inline-code\">set</code>","explanation":"错误。map、multimap和set提供双向迭代器（Bidirectional Iterator），不支持随机访问。"}],"answer":[0]},{"id":15,"description":"C++11 范围 <code class=\"inline-code\">for</code> 循环可用于下列哪类对象？","explanation":"","choices":[{"id":0,"text":"只有 <code class=\"inline-code\">map</code>","explanation":"错误。范围for循环不限于map，可以用于任何提供了begin()/end()接口的容器或数组。"},{"id":1,"text":"只有 <code class=\"inline-code\">vector</code>","explanation":"错误。范围for循环不限于vector，适用范围远大于单一容器类型。"},{"id":2,"text":"<code class=\"inline-code\">array</code>、有 <code class=\"inline-code\">begin()/end()</code> 的对象或花括号初始化列表","explanation":"正确。C++11范围for循环可用于<code class=\"inline-code\">array</code>、任何具有<code class=\"inline-code\">begin()/end()</code>方法的对象以及花括号初始化列表。"},{"id":3,"text":"只能用于普通数组，不能用于 STL 容器","explanation":"错误。范围for循环不仅可以用于普通数组，也广泛支持所有STL容器和自定义的具有begin/end接口的类型。"}],"answer":[2]},{"id":16,"description":"关于迭代器失效，下列说法正确的是？","explanation":"","choices":[{"id":0,"text":"只读方法一定会使迭代器失效","explanation":"错误。只读方法（如访问元素）通常不会使迭代器失效，修改容器结构的操作才可能导致失效。"},{"id":1,"text":"修改容器内容的方法可能导致迭代器或引用失效","explanation":"正确。修改容器内容的方法（如insert、erase、push_back导致扩容等）可能导致迭代器或引用失效，使用时需注意。"},{"id":2,"text":"STL 中迭代器永远不会失效","explanation":"错误。STL中迭代器在很多操作后可能失效，如vector扩容后所有迭代器失效，这是常见的编程陷阱。"},{"id":3,"text":"只有 <code class=\"inline-code\">cout</code> 会导致迭代器失效","explanation":"错误。cout是输出流，使用cout输出迭代器指向的值不会导致迭代器失效。"}],"answer":[1]},{"id":17,"description":"下面代码的主要问题是什么？<br><br><pre class=\"code-block\"><code>for (auto it = ivv1.begin(); it != ivv1.end(); it++) {\n    if (*it == 3) ivv1.erase(it);\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">erase()</code> 会返回字符串","explanation":"错误。vector的<code class=\"inline-code\">erase()</code>返回的是指向被删除元素之后位置的迭代器，不是字符串。"},{"id":1,"text":"<code class=\"inline-code\">erase()</code> 后原来的迭代器可能失效，继续 <code class=\"inline-code\">it++</code> 有风险","explanation":"正确。vector的<code class=\"inline-code\">erase()</code>会使当前及之后的迭代器失效，在erase后继续<code class=\"inline-code\">it++</code>会导致未定义行为。正确做法是使用erase的返回值更新迭代器。"},{"id":2,"text":"<code class=\"inline-code\">vector</code> 不能使用 <code class=\"inline-code\">begin()</code>","explanation":"错误。vector完全支持<code class=\"inline-code\">begin()</code>和<code class=\"inline-code\">end()</code>方法，这是所有标准容器的基本接口。"},{"id":3,"text":"<code class=\"inline-code\">if</code> 语句不能判断整数","explanation":"错误。if语句可以正常判断整数值，<code class=\"inline-code\">if (*it == value)</code>是完全合法的语法。"}],"answer":[1]},{"id":18,"description":"在下面代码中，<code class=\"inline-code\">sort</code> 的第三个参数是什么？<br><br><pre class=\"code-block\"><code>sort(vec.begin(), vec.end(), [](int a, int b) { return a &gt; b; });</code></pre>","explanation":"","choices":[{"id":0,"text":"普通整数变量","explanation":"错误。sort的第三个参数是用于自定义比较的函数对象，不是普通整数变量。"},{"id":1,"text":"文件指针","explanation":"错误。sort的第三个参数是自定义比较函数或函数对象，与文件指针无关。"},{"id":2,"text":"Lambda 表达式","explanation":"正确。sort的第三个参数<code class=\"inline-code\">[](int a, int b) { return a &gt; b; }</code>是Lambda表达式，用来自定义排序规则（此处为降序）。"},{"id":3,"text":"STL 容器","explanation":"错误。sort的第三个参数是比较函数，不是STL容器。容器是sort的第一、二个参数（迭代器范围）所引用的对象。"}],"answer":[2]},{"id":19,"description":"为什么建议工程项目中不要使用 <code class=\"inline-code\">#include &lt;bits/stdc++.h&gt;</code>？","explanation":"","choices":[{"id":0,"text":"因为它只能在 Python 中使用","explanation":"错误。<code class=\"inline-code\">&lt;bits/stdc++.h&gt;</code>是C++的非标准头文件，不能在Python中使用。"},{"id":1,"text":"因为它会包含大量标准库内容，可能显著增加编译负担","explanation":"正确。<code class=\"inline-code\">&lt;bits/stdc++.h&gt;</code>会包含整个C++标准库的所有头文件，导致编译时间大幅增加，在工程项目中应避免使用。"},{"id":2,"text":"因为它不能包含 STL 容器","explanation":"错误。<code class=\"inline-code\">&lt;bits/stdc++.h&gt;</code>恰恰会包含所有STL容器的头文件，问题不在于缺少包含。"},{"id":3,"text":"因为它会自动删除源代码","explanation":"错误。<code class=\"inline-code\">&lt;bits/stdc++.h&gt;</code>不会删除源代码，其问题是编译性能差和不可移植。"}],"answer":[1]}]}};
const LET = ['A','B','C','D','E','F'];
let curWeek = null, curMode = 'review', shuffleOn = false;
let curQuestions = [], ans = {}, submitted = false, isExam = false;

// ─────── Build Sidebar Navigation ───────
function buildNav(){
  const nav = document.getElementById('weekNav');
  nav.innerHTML = '';
  const weeks = Object.keys(W).sort((a,b)=>+a-+b);
  weeks.forEach(w => {
    const cnt = W[w].questions.length;
    const btn = document.createElement('button');
    btn.className = 'week-btn';
    btn.id = 'wt-' + w;
    btn.innerHTML = `<span class="wlabel">第 ${w} 周</span><span class="wcnt" id="wc-${w}">${cnt}</span>`;
    btn.onclick = () => selectWeek(w);
    nav.appendChild(btn);
    updateSidebarCount(w);
  });
}

// ─────── Select Week ───────
function saveState(){
  try { localStorage.setItem('quiz_state', JSON.stringify({week:curWeek,mode:curMode,shuffle:shuffleOn})); } catch(e){}
}

// ─────── Select Week ───────
function selectWeek(w){
  isExam = false;
  saveProgress();
  document.querySelectorAll('.week-btn').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('wt-'+w);
  if(btn) btn.classList.add('active');
  curWeek = w;
  ans = {}; submitted = false;
  if(!shuffleOn) loadWeekProgress(w);
  curQuestions = [...W[w].questions];
  if(shuffleOn) shuffle(curQuestions);
  showTopBar(W[w].title);
  renderAll();
  saveState();
}

// ─────── Start Exam Mode ───────
function startExamMode(){
  isExam = true;
  document.querySelectorAll('.week-btn').forEach(b=>b.classList.remove('active'));
  curWeek = 'exam';
  ans = {}; submitted = false;
  // collect all questions from all weeks
  const all = [];
  Object.keys(W).forEach(w => W[w].questions.forEach(q => all.push({...q, _week: w})));
  // sample 50, weighted evenly across weeks
  const weeks = Object.keys(W);
  const perWeek = Math.ceil(50 / weeks.length);
  let pool = [];
  weeks.forEach(w => {
    const qs = [...W[w].questions].sort(()=>Math.random()-.5);
    pool.push(...qs.slice(0, perWeek).map(q=>({...q, _week:w})));
  });
  pool.sort(()=>Math.random()-.5);
  curQuestions = pool.slice(0, 50);
  showTopBar('🎯 考试模式 · 综合50题');
  renderAll();
  saveState();
}

// ─────── Toggle shuffle ───────
function toggleShuffle(){
  shuffleOn = !shuffleOn;
  const btn = document.getElementById('shuffleGlobalBtn');
  if(shuffleOn){ btn.classList.add('active'); btn.querySelector('span').textContent='已开启随机'; }
  else { btn.classList.remove('active'); btn.querySelector('span').textContent='随机顺序'; }
  try { localStorage.setItem('quiz_shuffle', shuffleOn?'true':'false'); } catch(e){}
  saveState();
  if(curWeek && curWeek!=='exam'){
    const saved = ans; ans = {}; submitted = false;
    curQuestions = [...W[curWeek].questions];
    if(shuffleOn) shuffle(curQuestions);
    ans = saved;
    renderAll();
  }
}
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} }

// ─────── LocalStorage 进度保存 ───────
function saveProgress(){
  try {
    if(!curWeek || curWeek==='exam' || curMode==='exam' || shuffleOn) return;
    const data = { ans, submitted, ts: Date.now() };
    localStorage.setItem('quiz_week_'+curWeek, JSON.stringify(data));
    localStorage.setItem('quiz_lastWeek', curWeek);
    updateSidebarCount(curWeek);
  } catch(e){}
}
function loadWeekProgress(w){
  try {
    const raw = localStorage.getItem('quiz_week_'+w);
    if(!raw) return false;
    const data = JSON.parse(raw);
    ans = data.ans || {};
    submitted = !!data.submitted;
    return true;
  } catch(e){ return false; }
}
function updateSidebarCount(w){
  const wc = document.getElementById('wc-'+w);
  if(!wc || !W[w]) return;
  const total = W[w].questions.length;
  const raw = localStorage.getItem('quiz_week_'+w);
  if(!raw){ wc.textContent = total; return; }
  try {
    const data = JSON.parse(raw);
    const done = Object.keys(data.ans||{}).filter(k=>(data.ans[k]||[]).length>0).length;
    wc.textContent = done>0 ? done+'/'+total : total;
  } catch(e){ wc.textContent = total; }
}

// ─────── Mode ───────
function setMode(m){
  curMode = m;
  submitted = false;
  document.getElementById('btnReview').classList.toggle('active', m==='review');
  document.getElementById('btnExam').classList.toggle('active', m==='exam');
  try { localStorage.setItem('quiz_mode', m); } catch(e){}
  saveState();
  const mBar = document.getElementById('modeBar');
  mBar.className = 'mode-bar ' + m;
  document.getElementById('modeTxt').textContent = m==='review'
    ? '复习模式 — 点击选项后直接显示正确答案'
    : '答题模式 — 完成后点击提交查看成绩';
  const submitBtn = document.getElementById('btnSubmit');
  const resetBtn = document.getElementById('btnReset');
  submitBtn.style.display = m==='exam' ? '' : 'none';
  resetBtn.style.display = m==='exam' ? '' : 'none';
  document.getElementById('progWrap').style.display = m==='exam' ? '' : 'none';
  renderAll();
}

function showTopBar(title){
  const tb = document.getElementById('topBar');
  tb.style.display = 'flex';
  document.getElementById('weekTitle').textContent = title;
  const mBar = document.getElementById('modeBar');
  mBar.style.display = 'flex';
  document.getElementById('modeTxt').textContent = curMode==='review'
    ? '复习模式 — 点击选项后直接显示正确答案'
    : '答题模式 — 完成后点击提交查看成绩';
  document.getElementById('btnReview').classList.toggle('active', curMode==='review');
  document.getElementById('btnExam').classList.toggle('active', curMode==='exam');
  document.getElementById('btnSubmit').style.display = curMode==='exam' ? '' : 'none';
  document.getElementById('btnReset').style.display = curMode==='exam' ? '' : 'none';
  document.getElementById('progWrap').style.display = curMode==='exam' ? '' : 'none';
}

// ─────── Render Questions ───────
function renderAll(){
  const wrap = document.getElementById('qWrap');
  wrap.innerHTML = '';
  curQuestions.forEach((q,i) => wrap.appendChild(buildCard(q, i)));
  updateProg();
}

function buildCard(q, idx){
  const card = document.createElement('div');
  card.className = 'qcard';
  card.id = 'qc-' + q.id + '_' + idx;
  const isMulti = (q.answer||[]).length > 1;
  const typeTag = isMulti ? '<span style="background:#fff3e0;color:#e65100;font-size:11px;padding:2px 7px;border-radius:4px;font-weight:700">多选</span>' : '';
  let weekTag = q._week ? `<span style="background:#e8f0fe;color:#1a73e8;font-size:11px;padding:2px 7px;border-radius:4px;font-weight:700;margin-left:6px">第${q._week}周</span>` : '';
  const confirmBtn = isMulti ? `<button class="multi-confirm" id="mc-${q.id}_${idx}" onclick="confirmMulti('${q.id}',${idx})">确认提交</button>` : '';
  card.innerHTML = `
    <div class="qnum">第 ${idx+1} 题 ${typeTag}${weekTag}</div>
    <div class="qdesc">${processDesc(q.description)}</div>
    <div class="choices" id="cs-${q.id}_${idx}"></div>
    ${confirmBtn}
    <div class="ans-reveal" id="ar-${q.id}_${idx}"></div>
    <div class="qstatus" id="qs-${q.id}_${idx}"></div>
  `;
  const cs = card.querySelector('#cs-' + q.id + '_' + idx);
  (q.choices||[]).forEach((c,ci) => {
    const el = document.createElement('div');
    el.className = 'choice-item';
    el.id = `ch-${q.id}_${idx}-${c.id}`;
    el.innerHTML = `<div class="choice-lbl">${LET[ci]}</div><div class="choice-txt">${processDesc(c.text)}</div>`;
    el.onclick = () => selectChoice(q, idx, c.id, isMulti);
    cs.appendChild(el);
  });
  // Restore answer state — always show full feedback for saved answers
  const ua = ans[q.id+'_'+idx];
  if(ua && ua.length>0){
    card.classList.add('answered');
    ua.forEach(aid=>{
      const el = document.getElementById(`ch-${q.id}_${idx}-${aid}`);
      if(el) el.classList.add('selected');
    });
    showAnswerReveal(q, idx, ua, card);
    if(isMulti){
      const mc = document.getElementById('mc-' + q.id + '_' + idx);
      if(mc){ mc.disabled = true; mc.textContent = '已提交'; }
    }
  }
  return card;
}

function processDesc(html){
  if(!html) return '';
  // Remove markdown-like # heading markers
  html = html.replace(/^#+ /gm, '');
  return html;
}

function selectChoice(q, idx, cid, isMulti){
  if(submitted) return;
  const key = q.id + '_' + idx;
  if(!ans[key]) ans[key] = [];
  if(isMulti){
    const pos = ans[key].indexOf(cid);
    if(pos >= 0) ans[key].splice(pos,1);
    else ans[key].push(cid);
  } else {
    ans[key] = [cid];
  }
  // update UI
  const cs = document.getElementById('cs-' + q.id + '_' + idx);
  if(!cs) return;
  cs.querySelectorAll('.choice-item').forEach(el=>el.classList.remove('selected'));
  ans[key].forEach(aid=>{
    const el = document.getElementById(`ch-${q.id}_${idx}-${aid}`);
    if(el) el.classList.add('selected');
  });
  const card = document.getElementById('qc-' + q.id + '_' + idx);
  if(card) card.classList.toggle('answered', ans[key].length>0);
  if(curMode==='review'){
    if(isMulti){
      // For multi-select: show/hide confirm button, don't reveal yet
      const mc = document.getElementById('mc-' + q.id + '_' + idx);
      if(mc){
        mc.classList.toggle('visible', ans[key].length > 0);
        mc.disabled = false;
      }
    } else {
      showAnswerReveal(q, idx, ans[key], card);
    }
  }
  updateProg();
  // Update sidebar count
  saveProgress();
}

function confirmMulti(qid, idx){
  const key = qid + '_' + idx;
  const ua = ans[key] || [];
  if(ua.length === 0) return;
  const qidNum = Number(qid);
  const q = curQuestions.find(x => x.id === qidNum || x.id === qid);
  if(!q) return;
  const mc = document.getElementById('mc-' + qid + '_' + idx);
  if(mc){ mc.disabled = true; mc.textContent = '已提交'; }
  const card = document.getElementById('qc-' + qid + '_' + idx);
  showAnswerReveal(q, idx, ua, card);
  updateProg();
  saveProgress();
}

function showAnswerReveal(q, idx, ua, card){
  const ar = card ? card.querySelector('#ar-' + q.id + '_' + idx) : document.getElementById('ar-' + q.id + '_' + idx);
  if(!ar) return;
  const ca = q.answer||[];
  const ok = JSON.stringify([...ua].sort((a,b)=>a-b)) === JSON.stringify([...ca].sort((a,b)=>a-b));
  const aLetters = ca.map(aid=>{
    const ci = (q.choices||[]).findIndex(c=>c.id===aid);
    return ci>=0 ? LET[ci] : aid;
  }).join('、');
  ar.className = 'ans-reveal show';
  let html = `<div class="ans-label ${ok?'':'wrong'}">${ok?'✅ 回答正确！':'❌ 回答错误'} &nbsp;正确答案：${aLetters}</div>`;
  if(q.explanation && q.explanation.trim()){
    html += `<div class="expl">💡 ${q.explanation}</div>`;
  }
  // Show each choice explanation
  const hasChoiceExp = (q.choices||[]).some(c => c.explanation && c.explanation.trim());
  if(hasChoiceExp){
    html += `<div class="choice-explanations"><div class="ce-title">📝 选项解析</div>`;
    (q.choices||[]).forEach((c,ci)=>{
      const isCorrect = ca.includes(c.id);
      const isUserAns = ua.includes(c.id);
      let statusClass = '';
      let statusIcon = '';
      if(isCorrect){ statusClass = 'ce-correct'; statusIcon = '✅'; }
      else if(isUserAns){ statusClass = 'ce-wrong'; statusIcon = '❌'; }
      else { statusClass = 'ce-normal'; statusIcon = '○'; }
      html += `<div class="choice-exp ${statusClass}">`;
      html += `<div class="ce-header"><span class="ce-icon">${statusIcon}</span><span class="ce-label">${LET[ci]}. ${c.text}</span></div>`;
      if(c.explanation && c.explanation.trim()){
        html += `<div class="ce-text">${c.explanation}</div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  }
  ar.innerHTML = html;
  // Color choices (use card scope for DOM-independent lookup)
  (q.choices||[]).forEach((c,ci)=>{
    const el = card ? card.querySelector(`#ch-${q.id}_${idx}-${c.id}`) : document.getElementById(`ch-${q.id}_${idx}-${c.id}`);
    if(!el) return;
    el.classList.remove('c-correct','c-wrong');
    if(ca.includes(c.id)) el.classList.add('c-correct');
    else if(ua.includes(c.id)) el.classList.add('c-wrong');
  });
}

function updateProg(){
  if(curWeek && curWeek!=='exam'){
    const total = curQuestions.length;
    const done = curQuestions.filter((_,i)=>{
      const k = curQuestions[i].id+'_'+i;
      return ans[k]&&ans[k].length>0;
    }).length;
    const wc = document.getElementById('wc-'+curWeek);
    if(wc) wc.textContent = done+'/'+total;
  }
  if(curMode!=='exam') return;
  const total = curQuestions.length;
  const done = curQuestions.filter((_,i)=>{
    const k = curQuestions[i].id+'_'+i;
    return ans[k]&&ans[k].length>0;
  }).length;
  document.getElementById('progCount').textContent = done+' / '+total;
  document.getElementById('progFill').style.width = (done/total*100).toFixed(1)+'%';
}

// ─────── Submit ───────
function submitQuiz(){
  if(submitted) return;
  submitted = true;
  let correct=0, wrong=0, skip=0;
  const rows = [];
  curQuestions.forEach((q,i)=>{
    const key = q.id+'_'+i;
    const ua = ans[key]||[];
    const ca = q.answer||[];
    const card = document.getElementById('qc-'+q.id+'_'+i);
    const statusEl = document.getElementById('qs-'+q.id+'_'+i);
    if(!ua||ua.length===0){
      skip++;
      rows.push({n:i+1,st:'skip',txt:q.description.replace(/<[^>]+>/g,'').substring(0,50)});
      if(card){
        card.style.borderColor='#fbbc04';
        // Show correct answer & explanation for skipped questions
        const aLetters = ca.map(aid=>{
          const ci = (q.choices||[]).findIndex(c=>c.id===aid);
          return ci>=0 ? LET[ci] : aid;
        }).join('、');
        const arEl = card.querySelector('#ar-'+q.id+'_'+i);
        if(arEl){
          let rhtml = '<div class="ans-label">正确答案：'+aLetters+'</div>';
          if(q.explanation && q.explanation.trim()) rhtml += '<div class="expl">💡 '+q.explanation+'</div>';
          const hasCE = (q.choices||[]).some(c=>c.explanation&&c.explanation.trim());
          if(hasCE){
            rhtml += '<div class="choice-explanations"><div class="ce-title">📝 选项解析</div>';
            (q.choices||[]).forEach((c,ci)=>{
              const isC = ca.includes(c.id);
              rhtml += '<div class="choice-exp '+(isC?'ce-correct':'ce-normal')+'">';
              rhtml += '<div class="ce-header"><span class="ce-icon">'+(isC?'✅':'○')+'</span><span class="ce-label">'+LET[ci]+'. '+c.text+'</span></div>';
              if(c.explanation&&c.explanation.trim()) rhtml += '<div class="ce-text">'+c.explanation+'</div>';
              rhtml += '</div>';
            });
            rhtml += '</div>';
          }
          arEl.className = 'ans-reveal show';
          arEl.innerHTML = rhtml;
        }
        // Color correct choices green
        (q.choices||[]).forEach((c)=>{
          const el = card.querySelector('#ch-'+q.id+'_'+i+'-'+c.id);
          if(el && ca.includes(c.id)) el.classList.add('c-correct');
        });
        if(statusEl){statusEl.textContent='未答';statusEl.style.color='#fbbc04';}
      }
    } else {
      const ok = JSON.stringify([...ua].sort((a,b)=>a-b))===JSON.stringify([...ca].sort((a,b)=>a-b));
      if(ok){correct++;rows.push({n:i+1,st:'ok',txt:q.description.replace(/<[^>]+>/g,'').substring(0,50)});}
      else{wrong++;rows.push({n:i+1,st:'err',txt:q.description.replace(/<[^>]+>/g,'').substring(0,50)});}
      if(card){card.classList.remove('answered');card.classList.add(ok?'card-correct':'card-wrong');}
      if(statusEl){statusEl.textContent=ok?'✅ 正确':'❌ 错误';statusEl.style.color=ok?'#34a853':'#ea4335';}
      // Show correct/wrong colors on choices
      (q.choices||[]).forEach((c,ci)=>{
        const el = card ? card.querySelector(`#ch-${q.id}_${i}-${c.id}`) : document.getElementById(`ch-${q.id}_${i}-${c.id}`);
        if(!el) return;
        if(ca.includes(c.id)) el.classList.add('c-correct');
        else if(ua.includes(c.id)) el.classList.add('c-wrong');
      });
      // Show full answer reveal with explanations
      showAnswerReveal(q, i, ua, card);
    }
  });
  const total = curQuestions.length;
  const pct = Math.round(correct/total*100);
  const sc = document.getElementById('scoreCircle');
  sc.className = 'score-circle '+(pct>=90?'sc-ex':pct>=70?'sc-gd':pct>=50?'sc-ok':'sc-lo');
  document.getElementById('sNum').textContent = correct+'/'+total;
  document.getElementById('sPct').textContent = pct+'%';
  document.getElementById('sTitle').textContent = isExam?'考试模式 成绩报告':'第'+curWeek+'周 成绩报告';
  document.getElementById('sTot').textContent = total;
  document.getElementById('sOk').textContent = correct;
  document.getElementById('sErr').textContent = wrong+skip;
  const failRows = rows.filter(r=>r.st!=='ok');
  document.getElementById('rList').innerHTML = failRows.length===0
    ? '<div style="text-align:center;padding:20px;color:#34a853;font-weight:700">🎉 全部答对！太厉害了！</div>'
    : failRows.map(r=>`<div class="r-row">
        <span>${r.st==='err'?'❌':'⬜'}</span>
        <strong style="flex-shrink:0">第${r.n}题</strong>
        <span style="color:#888;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.txt}…</span>
        <span style="color:${r.st==='err'?'#ea4335':'#aaa'};font-size:11px">${r.st==='err'?'答错':'未答'}</span>
      </div>`).join('');
  document.getElementById('modal').classList.add('show');
  saveProgress();
}

function closeModal(){ document.getElementById('modal').classList.remove('show'); }
function resetFromModal(){ closeModal(); resetQuiz(); }
function resetQuiz(){
  ans = {}; submitted = false;
  saveProgress();
  renderAll();
  document.getElementById('btnReset').style.display='none';
}

// ─────── Init ───────
try {
  const savedShuffle = localStorage.getItem('quiz_shuffle');
  if(savedShuffle === 'true'){
    shuffleOn = true;
    const sb = document.getElementById('shuffleGlobalBtn');
    if(sb){ sb.classList.add('active'); sb.querySelector('span').textContent='已开启随机'; }
  }
  const savedMode = localStorage.getItem('quiz_mode');
  if(savedMode === 'exam'){
    curMode = 'exam';
    document.getElementById('btnReview').classList.remove('active');
    document.getElementById('btnExam').classList.add('active');
  }
} catch(e){}
buildNav();
try {
  const savedState = localStorage.getItem('quiz_state');
  if(savedState){
    const st = JSON.parse(savedState);
    if(st.week === 'exam'){ startExamMode(); }
    else if(st.week && W[st.week]){
      selectWeek(st.week);
    }
  }
} catch(e){}
window.addEventListener('beforeunload', saveProgress);
document.addEventListener('visibilitychange', ()=>{ if(document.hidden) saveProgress(); });
setInterval(()=>{ if(curWeek && curWeek!=='exam' && !shuffleOn) saveProgress(); }, 10000);
</script>
