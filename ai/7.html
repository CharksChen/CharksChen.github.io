r":[2]},{"id":15,"description":"下列C++代码的输出是什么<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\nclass A {\npublic:\n    A() { cout &lt;&lt; &quot;A &quot;; }\n    ~A() { cout &lt;&lt; &quot;~A &quot;; }\n};\nvoid func() {\n    static A a;\n}\nint main() {\n    func();\n    func();\n    return 0;\n}</code></pre>","explanation":"static 对象只初始化一次，析构函数在程序结束时调用","choices":[{"id":0,"text":"<code class=\"inline-code\">A ~A</code> <code class=\"inline-code\">A</code> <code class=\"inline-code\">~A</code>","explanation":"static局部对象只构造一次，第二次调用func()不会再次构造，不会出现\"A A\"。"},{"id":1,"text":"<code class=\"inline-code\">A</code> <code class=\"inline-code\">~A</code>","explanation":"正确。<code class=\"inline-code\">static A a</code>只在第一次调用func()时构造一次，输出\"A \"；程序结束时析构，输出\"~A \"。第二次调用func()不会再构造。"},{"id":2,"text":"<code class=\"inline-code\">A A</code> <code class=\"inline-code\">~A</code> <code class=\"inline-code\">~A</code>","explanation":"static局部对象只构造一次、析构一次，不会出现两次A和两次~A。"},{"id":3,"text":"编译错误","explanation":"代码语法正确，static局部对象是合法的，可以正常编译。"}],"answer":[1]},{"id":16,"description":"下列哪个选项是程序的输出：<br><br><pre class=\"code-block\"><code>class CDummy\n{\n    public:\n    int isitme (CDummy&amp; param);\n};\n\nint CDummy::isitme (CDummy&amp; param)\n{\n    if (&amp;param == this)\n        return true;\n    else\n        return false;\n}\n\nint main ()\n{\n    CDummy a;\n    CDummy *b = &amp;a;\n    if (b-&gt;isitme(a)) {\n        cout &lt;&lt; &quot;execute&quot;;\n    }\n    else\n    {\n        cout&lt;&lt;&quot;not execute&quot;;\n    }\n    return 0;\n}</code></pre>","explanation":"传值调用拷贝构造，返回值拷贝","choices":[{"id":0,"text":"&quot;execute&quot;","explanation":"正确。<code class=\"inline-code\">b</code>指向<code class=\"inline-code\">a</code>，调用<code class=\"inline-code\">b-&gt;isitme(a)</code>时<code class=\"inline-code\">this</code>为<code class=\"inline-code\">&amp;a</code>，参数<code class=\"inline-code\">param</code>也引用<code class=\"inline-code\">a</code>， x = 3*2 = 6</code>。obj2.x始终未改仍为10。"},{"id":1,"text":"x = 10  x = 10","explanation":"obj1.x经过链式调用后最终被设为6，而不是10。第一次setX将x设为20，第二次setX将x设为6。"},{"id":2,"text":"x = 6  x = 6","explanation":"obj2.x在整个过程中没有被修改，始终保持初始值10，不会是6。"},{"id":3,"text":"x = 3  x = 10","explanation":"setX中执行<code class=\"inline-code\">this-&gt;x = x * 2</code>，最后一次调用参数为3，结果为6而非3。"}],"answer":[0]},{"id":19,"description":"下列C++代码的输出是什么<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass MyClass {\nprivate:\n    int id;\n    static int count; // 静态成员变量\n\npublic:\n    MyClass(int id){\n        this-&gt;id=id;\n        count++;\n        cout &lt;&lt; &quot;Constructor: Object &quot; &lt;&lt; this-&gt;id &lt;&lt; &quot; created. Total objects: &quot; &lt;&lt; count &lt;&lt; endl;\n    }\n\n    ~MyClass() {\n        count--;\n        cout &lt;&lt; &quot;Destructor: Object &quot; &lt;&lt; this-&gt;id &lt;&lt; &quot; destroyed. Total objects: &quot; &lt;&lt; count &lt;&lt; endl;\n    }\n\n    void showId() const {\n        cout &lt;&lt; &quot;Object ID: &quot; &lt;&lt; this-&gt;id &lt;&lt; endl;\n    }\n\n    static int getCount() { // 静态成员函数\n        return count;\n    }\n};\n\nint MyClass::count = 0; // 初始化静态成员变量\n\nint main() {\n    MyClass obj1(1);\n    {\n        MyClass obj2(2);\n        obj2.showId();\n    }\n    cout &lt;&lt; &quot;Total objects after block: &quot; &lt;&lt; MyClass::getCount() &lt;&lt; endl;\n    return 0;\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"Constructor: Object 1 created. Total objects: 1<br>Constructor: Object 2 created. Total objects: 2<br>Object ID: 2<br>Destructor: Object 2 destroyed. Total objects: 1<br>Total objects after block: 1<br>Destructor: Object 1 destroyed. Total objects: 0","explanation":"正确。obj1先构造(count=1)；内层作用域中obj2构造(count=2)并输出ID；obj2离开作用域析构(count=1)；通过getCount()输出1；最后obj1析构(count=0)。"},{"id":1,"text":"Constructor: Object 1 created. Total objects: 1<br>Constructor: Object 2 created. Total objects: 2<br>Object ID: 2<br>Destructor: Object 2 destroyed. Total objects: 1<br>Total objects after block: 0<br>Destructor: Object 1 destroyed. Total objects: 0","explanation":"getCount()在obj2析构后、obj1析构前调用，此时count为1而非0。obj1的析构还未发生。"},{"id":2,"text":"Constructor: Object 1 created. Total objects: 1<br>Constructor: Object 2 created. Total objects: 2<br>Object ID: 2<br>Destructor: Object 2 destroyed. Total objects: 1<br>Total objects after block: 2<br>Destructor: Object 1 destroyed. Total objects: 0","explanation":"obj2已析构，count从2减为1，getCount()应返回1而非2。"},{"id":3,"text":"Constructor: Object 1 created. Total objects: 1<br>Constructor: Object 2 created. Total objects: 2<br>Object ID: 2<br>Destructor: Object 2 destroyed. Total objects: 1<br>Total objects after block: 1<br>Destructor: Object 1 destroyed. Total objects: -1","explanation":"obj1析构时count从1减为0，不会变为-1。count的增减是配对的。"}],"answer":[0]}]},"5":{"title":"25程设Ⅱ-周5-理论题","questions":[{"id":0,"description":"关于 C/C++ 程序内存布局，下列说法正确的是","explanation":"函数参数、自动变量通常在栈区；动态变量（对象）在堆区；字符串字面量所在资源区不可改","choices":[{"id":0,"text":"自动变量通常存放在堆区","explanation":"自动变量（局部变量）存放在栈区，而非堆区。堆区用于动态分配的内存。"},{"id":1,"text":"动态变量通常存放在栈区","explanation":"动态变量（通过new/malloc分配的）存放在堆区，而非栈区。"},{"id":2,"text":"自动变量通常存放在栈区","explanation":"正确。自动变量即局部变量，存放在栈区，由编译器自动管理分配和释放。"},{"id":3,"text":"字符串字面量通常可以随意修改","explanation":"字符串字面量通常存储在只读数据区，尝试修改会导致未定义行为（通常是段错误），不能随意修改。"}],"answer":[2]},{"id":1,"description":"下列代码中，最可能导致运行错误的是？<br><br><pre class=\"code-block\"><code>char *s1 = &quot;Literal&quot;;\nchar s2[] = &quot;Literal&quot;;</code></pre>","explanation":"这里 s1 是一个指针，它指向一个字符串字面量（String Literal）。<br>在 C/C++ 中，字符串字面量通常存储在程序的只读数据段（.rodata）或常量区。这意味着这块内存是不可修改的。","choices":[{"id":0,"text":"读取 <code class=\"inline-code\">s1[0]</code>","explanation":"读取<code class=\"inline-code\">s1[0]</code>是合法的，只是读取字符指针指向的内容，不会出错。"},{"id":1,"text":"输出 <code class=\"inline-code\">s2</code>","explanation":"输出<code class=\"inline-code\">s2</code>是合法的，s2是字符数组，内容可以正常输出。"},{"id":2,"text":"修改 <code class=\"inline-code\">s2[0] = &#x27;X&#x27;</code>","explanation":"<code class=\"inline-code\">s2</code>是字符数组，存储在栈上，内容可修改，<code class=\"inline-code\">s2[0] = 'X'</code>是合法的。"},{"id":3,"text":"修改 <code class=\"inline-code\">s1[0] = &#x27;X&#x27;</code>","explanation":"正确。<code class=\"inline-code\">s1</code>是指向字符串字面量的指针，字面量存储在只读区，通过<code class=\"inline-code\">s1[0] = 'X'</code>修改会导致未定义行为（通常是段错误）。"}],"answer":[3]},{"id":2,"description":"关于 <code class=\"inline-code\">new</code> 运算符，下列说法错误的是","explanation":"new 返回该类型的指针，不是 void*；若内存分配失败，抛出异常，不是 NULL","choices":[{"id":0,"text":"<code class=\"inline-code\">new</code> 返回对应类型的指针","explanation":"正确说法。<code class=\"inline-code\">new</code>运算符返回对应类型的指针，如<code class=\"inline-code\">new int</code>返回<code class=\"inline-code\">int*</code>。"},{"id":1,"text":"<code class=\"inline-code\">new</code> 分配失败时返回 <code class=\"inline-code\">NULL</code>","explanation":"错误说法，即本题答案。标准C++中<code class=\"inline-code\">new</code>分配失败时抛出<code class=\"inline-code\">std::bad_alloc</code>异常，而非返回NULL。只有使用<code class=\"inline-code\">new(nothrow)</code>才会返回NULL。"},{"id":2,"text":"<code class=\"inline-code\">new</code> 可以动态创建单个对象","explanation":"正确说法。<code class=\"inline-code\">new</code>可以动态创建单个对象，如<code class=\"inline-code\">new int(5)</code>。"},{"id":3,"text":"<code class=\"inline-code\">new</code> 可以动态创建数组","explanation":"正确说法。<code class=\"inline-code\">new</code>也可以动态创建数组，如<code class=\"inline-code\">new int[10]</code>。"}],"answer":[1]},{"id":3,"description":"执行下面代码后，正确的释放方式是<br><br><pre class=\"code-block\"><code>int *p = new int[10];</code></pre>","explanation":"动态分配的是数组，必须用 delete[] 释放。","choices":[{"id":0,"text":"delete p;","explanation":"<code class=\"inline-code\">delete p</code>用于释放单个对象，用<code class=\"inline-code\">new[]</code>分配的数组必须用<code class=\"inline-code\">delete[]</code>释放。"},{"id":1,"text":"free(p);","explanation":"<code class=\"inline-code\">free</code>是C语言的释放函数，不会调用析构函数。C++中应使用<code class=\"inline-code\">delete[]</code>。"},{"id":2,"text":"delete []p;","explanation":"正确。用<code class=\"inline-code\">new int[10]</code>分配的数组必须用<code class=\"inline-code\">delete []p</code>释放，以确保正确释放所有元素。"},{"id":3,"text":"不需要释放","explanation":"动态分配的内存必须手动释放，否则会造成内存泄漏。"}],"answer":[2]},{"id":4,"description":"关于 <code class=\"inline-code\">delete</code>，下列说法正确的是","explanation":"delete 释放后，指针的值仍是原来地址，但指针已无效；重复释放会出错。对象指针被 delete 时还会调用析构函数。","choices":[{"id":0,"text":"<code class=\"inline-code\">delete</code> 后指针会自动变成 <code class=\"inline-code\">nullptr</code>","explanation":"<code class=\"inline-code\">delete</code>后指针不会自动变成<code class=\"inline-code\">nullptr</code>，它仍保留原来的地址值，成为悬空指针。"},{"id":1,"text":"<code class=\"inline-code\">delete</code> 后指针仍保留原地址值，但已经失效","explanation":"正确。<code class=\"inline-code\">delete</code>只释放指针指向的内存，指针变量本身的值不会改变，仍保留原地址，但该地址已经无效。"},{"id":2,"text":"<code class=\"inline-code\">delete</code> 不能释放对象","explanation":"<code class=\"inline-code\">delete</code>可以释放对象，对于类对象还会调用析构函数。"},{"id":3,"text":"<code class=\"inline-code\">delete[]</code> 不会调用析构函数","explanation":"<code class=\"inline-code\">delete[]</code>会依次调用数组中每个对象的析构函数，并非不会调用。"}],"answer":[1]},{"id":5,"description":"下列代码的输出结果是<br><br><pre class=\"code-block\"><code>int *p = new int[5]{1,3,5};\nfor(int i = 0; i &lt; 5; i++)\n    cout &lt;&lt; p[i] &lt;&lt; &quot; &quot;;\ndelete []p;</code></pre>","explanation":"数组用常量初始化列表时，若初始化项不足，后面的元素补零。","choices":[{"id":0,"text":"1 3 5 1 3","explanation":"未显式初始化的元素会被值初始化为0，不会保留随机值或重复已初始化的值。"},{"id":1,"text":"1 3 5 0 0","explanation":"正确。C++中<code class=\"inline-code\">new int[5]{1,3,5}</code>只初始化前3个元素为1、3、5，后2个元素被值初始化为0。"},{"id":2,"text":"1 3 5","explanation":"循环遍历了5个元素，不仅仅是前3个，后2个为0也会被输出。"},{"id":3,"text":"运行时报错","explanation":"代码语法正确，<code class=\"inline-code\">new</code>配合初始化列表是合法的C++语法，不会报错。"}],"answer":[1]},{"id":6,"description":"关于下面代码：<br><br><pre class=\"code-block\"><code>int *p = new int[3]{1,2,3};\ndelete p;</code></pre>","explanation":"如果动态分配了数组却用 delete p 释放，编译时可能没问题，运行时也可能不立刻报错，但实际上释放不完整，是错误写法","choices":[{"id":0,"text":"这是正确写法","explanation":"用<code class=\"inline-code\">new[]</code>分配的数组应使用<code class=\"inline-code\">delete[]</code>释放，用<code class=\"inline-code\">delete p</code>是未定义行为。"},{"id":1,"text":"应该改为 <code class=\"inline-code\">delete []p;</code>","explanation":"正确。<code class=\"inline-code\">new int[3]</code>使用数组形式分配，必须用<code class=\"inline-code\">delete []p</code>匹配释放，否则是未定义行为。"},{"id":2,"text":"编译一定报错","explanation":"<code class=\"inline-code\">delete p</code>在语法层面可以编译通过，但运行时是未定义行为，并非编译一定报错。"},{"id":3,"text":"<code class=\"inline-code\">delete p;</code> 与 <code class=\"inline-code\">delete []p;</code> 等价","explanation":"<code class=\"inline-code\">delete p</code>和<code class=\"inline-code\">delete []p</code>不等价，前者只释放单个对象，后者正确释放整个数组。"}],"answer":[1]},{"id":7,"description":"对象指针访问成员时，正确写法是","explanation":"对象用 . 访问成员，指针用 -&gt; 访问成员","choices":[{"id":0,"text":"p.Print();","explanation":"<code class=\"inline-code\">p.Print()</code>语法错误，<code class=\"inline-code\">p</code>是指针，不能直接用<code class=\"inline-code\">.</code>运算符访问成员。"},{"id":1,"text":"p-&gt;Print();","explanation":"正确。对象指针通过<code class=\"inline-code\">-&gt;</code>运算符访问成员，<code class=\"inline-code\">p-&gt;Print()</code>等价于<code class=\"inline-code\">(*p).Print()</code>。"},{"id":2,"text":"*p.Print();","explanation":"<code class=\"inline-code\">*p.Print()</code>由于运算符优先级，会被解析为<code class=\"inline-code\">*(p.Print())</code>，而指针不能用<code class=\"inline-code\">.</code>调用。"},{"id":3,"text":"&amp;p-&gt;Print();","explanation":"<code class=\"inline-code\">&amp;p-&gt;Print()</code>取的是成员函数返回值的地址，不是正确的成员访问方式。"}],"answer":[1]},{"id":8,"description":"对于下面代码：<br><br><pre class=\"code-block\"><code>Text str(&quot;hello&quot;);// 创建对象\nText* p = &amp;str;</code></pre><br><br>下列说法正确的是","explanation":"栈上对象会自动析构，取其地址赋给指针后，用 -&gt; 访问即可，但不能对这个地址做 delete","choices":[{"id":0,"text":"<code class=\"inline-code\">str</code> 在堆上","explanation":"<code class=\"inline-code\">str</code>是局部对象，存储在栈上，而非堆上。只有用<code class=\"inline-code\">new</code>创建的对象才在堆上。"},{"id":1,"text":"<code class=\"inline-code\">p</code> 指向的对象需要手动 <code class=\"inline-code\">delete</code>","explanation":"<code class=\"inline-code\">p</code>指向栈上的<code class=\"inline-code\">str</code>，对栈对象执行<code class=\"inline-code\">delete</code>是未定义行为，不需要也不应该手动delete。"},{"id":2,"text":"<code class=\"inline-code\">str</code> 在栈上，离开作用域会自动析构","explanation":"正确。<code class=\"inline-code\">str</code>是栈上局部对象，离开作用域后会自动调用析构函数销毁，无需手动管理。"},{"id":3,"text":"<code class=\"inline-code\">p</code> 是悬空指针","explanation":"<code class=\"inline-code\">p</code>指向有效的栈对象<code class=\"inline-code\">str</code>，在该作用域内不是悬空指针。"}],"answer":[2]},{"id":9,"description":"下列哪一句最能体现“堆上对象不会自动析构”？","explanation":"new Text(&quot;on heap 1&quot;) 创建的对象在堆上，不会自动析构，必须显式 delete。","choices":[{"id":0,"text":"Text str(&quot;abc&quot;);","explanation":"这是栈上对象，离开作用域会自动析构，不能体现堆上对象不自动析构的特点。"},{"id":1,"text":"Text &amp;r = str;","explanation":"这是引用，引用本身不创建新对象，不涉及堆分配和析构问题。"},{"id":2,"text":"Text \\*p = new Text(&quot;abc&quot;);","explanation":"正确。<code class=\"inline-code\">new Text(\"abc\")</code>在堆上创建对象，返回指针。堆上对象不会自动析构，必须手动<code class=\"inline-code\">delete</code>，最能体现该特性。"},{"id":3,"text":"Text arr[3];","explanation":"这是栈上的对象数组，离开作用域后会自动析构，不体现堆的特点。"}],"answer":[2]},{"id":10,"description":"关于野指针问题，下列说法正确的是","explanation":"两个指针指向同一块动态空间时，只要其中一个 delete 了，这块空间就失效了，另一个也一起失效。再次访问或再次释放都错误。","choices":[{"id":0,"text":"两个指针指向同一块动态内存时，删除其中一个不会影响另一个","explanation":"两个指针指向同一块内存，删除其中一个后，另一个仍指向已释放的地址，会变为悬空指针，会受影响。"},{"id":1,"text":"删除一个指针后，另一个指向同一地址的指针也会失效","explanation":"正确。删除一个指针释放了该地址的内存，另一个指向同一地址的指针变为悬空指针，再解引用是未定义行为。"},{"id":2,"text":"删除一个指针后仍可正常解引用","explanation":"删除后内存已释放，再解引用是未定义行为，可能崩溃或读到垃圾数据，不能正常访问。"},{"id":3,"text":"重复 <code class=\"inline-code\">delete</code> 同一块空间是安全的","explanation":"重复<code class=\"inline-code\">delete</code>同一块内存是未定义行为（double free），可能导致程序崩溃。"}],"answer":[1]},{"id":11,"description":"下面哪种情况会造成内存泄漏？","explanation":"int* p = new int(7); p = nullptr; 会造成内存泄漏，因为原先那块动态空间失去了唯一指针，无法再释放。","choices":[{"id":0,"text":"<pre class=\"code-block\"><code>int *p = new int(7);\ndelete p;</code></pre>","explanation":"先new后delete，内存被正确释放，不存在内存泄漏。"},{"id":1,"text":"<pre class=\"code-block\"><code>int *p = new int(7);\np = nullptr;</code></pre>","explanation":"正确。将指针赋为nullptr后，原来指向的堆内存地址丢失，无法再调用delete释放，造成内存泄漏。"},{"id":2,"text":"<pre class=\"code-block\"><code>int x = 7;\nint *p = &amp;x;</code></pre>","explanation":"<code class=\"inline-code\">x</code>是栈上变量，<code class=\"inline-code\">p</code>只是指向栈变量的指针，不涉及堆内存分配，不存在泄漏。"},{"id":3,"text":"<pre class=\"code-block\"><code>int *p = new int(7);\ncout &lt;&lt; *p;\ndelete p;</code></pre>","explanation":"先使用再delete，内存被正确释放，不存在泄漏。"}],"answer":[1]},{"id":12,"description":"下列关于内存泄漏的说法错误的是","explanation":"内存泄漏会导致资源耗尽。虽然某些环境下程序结束后操作系统会回收内存，但从程序设计和长期运行角度看，泄漏依然是错误。","choices":[{"id":0,"text":"指针离开作用域前若未释放动态空间，可能造成泄漏","explanation":"正确说法。如果指针在离开作用域之前没有释放其指向的动态内存，就会造成内存泄漏。"},{"id":1,"text":"异常导致 <code class=\"inline-code\">delete</code> 未执行，也可能造成泄漏","explanation":"正确说法。如果程序在delete之前抛出异常导致delete未执行，动态内存不会被释放，造成泄漏。"},{"id":2,"text":"只要程序结束，内存泄漏就一定不是问题","explanation":"错误说法，即本题答案。虽然操作系统会在进程结束时回收内存，但在长时间运行的程序中，内存泄漏会逐渐耗尽可用内存，是严重问题。"},{"id":3,"text":"丢失指向动态空间的指针会造成泄漏","explanation":"正确说法。丢失了指向动态内存的唯一指针后，无法再释放该内存，造成泄漏。"}],"answer":[2]},{"id":13,"description":"关于 <code class=\"inline-code\">=default</code>，下列说法正确的是","explanation":"=default 仅用于编译器可自动生成的特殊成员函数，如默认构造、析构、拷贝构造、赋值运算等；不能用于普通函数，也不能用于带默认实参的这种构造形式。","choices":[{"id":0,"text":"可以用于任意普通成员函数","explanation":"<code class=\"inline-code\">=default</code>只能用于特殊成员函数（默认构造、拷贝构造、析构等），不能用于任意普通成员函数。"},{"id":1,"text":"可以用于让编译器生成特殊成员函数","explanation":"正确。<code class=\"inline-code\">=default</code>用于显式要求编译器自动生成特殊成员函数的默认实现。"},{"id":2,"text":"使用 <code class=\"inline-code\">=default</code> 后还要自己写函数体","explanation":"使用<code class=\"inline-code\">=default</code>就是让编译器生成函数体，不需要程序员自己再写。"},{"id":3,"text":"<code class=\"inline-code\">B(int=0)=default;</code> 一定合法","explanation":"<code class=\"inline-code\">B(int=0)=default;</code>语法错误。<code class=\"inline-code\">=default</code>只能用于无参的特殊成员函数签名。"}],"answer":[1]},{"id":14,"description":"当一个类已经声明了有参构造函数时，编译器","explanation":"当我们声明有参构造函数时，编译器不会创建默认构造函数。","choices":[{"id":0,"text":"一定还会自动生成默认构造函数","explanation":"当类已经声明了有参构造函数时，编译器不会再自动生成默认构造函数，需要程序员自己定义。"},{"id":1,"text":"不会自动生成默认构造函数","explanation":"正确。一旦类中定义了任何构造函数（有参的），编译器就不会再自动生成默认（无参）构造函数。"},{"id":2,"text":"一定不生成析构函数","explanation":"编译器仍会自动生成默认析构函数，它与是否定义了有参构造函数无关。"},{"id":3,"text":"一定不生成拷贝构造函数","explanation":"编译器仍可能自动生成拷贝构造函数，它与是否定义有参构造函数无直接关系。"}],"answer":[1]},{"id":15,"description":"<code class=\"inline-code\">=delete</code> 的主要作用是","explanation":"如果函数用 = delete 定义为弃置函数，则任何对它的使用都是非良构的，也就是程序无法编译。其作用就是显式禁用该函数。","choices":[{"id":0,"text":"释放堆空间","explanation":"<code class=\"inline-code\">=delete</code>与释放堆空间无关，释放堆空间应使用<code class=\"inline-code\">delete</code>运算符。"},{"id":1,"text":"禁止某个函数被使用","explanation":"正确。<code class=\"inline-code\">=delete</code>用于显式删除某个函数，禁止其被调用，常用于禁用拷贝构造或赋值运算。"},{"id":2,"text":"让函数更快","explanation":"<code class=\"inline-code\">=delete</code>与函数性能无关，它的作用是禁止函数被调用。"},{"id":3,"text":"替代析构函数","explanation":"<code class=\"inline-code\">=delete</code>不是替代析构函数的工具，它是用来禁用任意函数的声明。"}],"answer":[1]},{"id":16,"description":"下面代码中被禁用的是<br><br><pre class=\"code-block\"><code>class A {\npublic:\n    A(int x): m(x) {}\n    A(const A&amp;) = delete;\n    A&amp; operator=(const A&amp;) = delete;\n    int m;\n};</code></pre>","explanation":"代码中明确把复制构造函数和复制赋值运算符写成了 =delete，所以它们被禁止使用。","choices":[{"id":0,"text":"默认构造","explanation":"该类有自定义的有参构造函数<code class=\"inline-code\">A(int x)</code>，默认构造函数确实不存在，但被禁用的不是默认构造。"},{"id":1,"text":"析构函数","explanation":"析构函数没有被<code class=\"inline-code\">=delete</code>标记，编译器会自动生成默认析构函数。"},{"id":2,"text":"拷贝构造和拷贝赋值","explanation":"正确。代码中<code class=\"inline-code\">A(const A&amp;) = delete</code>禁用了拷贝构造函数，<code class=\"inline-code\">A&amp; operator=(const A&amp;) = delete</code>禁用了拷贝赋值运算符。"},{"id":3,"text":"成员变量初始化","explanation":"成员变量<code class=\"inline-code\">m</code>通过构造函数初始化列表正常初始化，没有被禁用。"}],"answer":[2]},{"id":17,"description":"关于删除函数，下列说法正确的是","explanation":"删除函数的定义必须是函数的首次声明。","choices":[{"id":0,"text":"删除函数可以先声明，之后再定义为 <code class=\"inline-code\">=delete</code>","explanation":"<code class=\"inline-code\">=delete</code>必须在函数的首次声明处使用，不能先声明后在定义处标记为<code class=\"inline-code\">=delete</code>。"},{"id":1,"text":"被删除函数运行时会报错","explanation":"被删除的函数在编译阶段就会被拒绝调用，不会到运行时才报错。"},{"id":2,"text":"删除函数定义必须是函数的首次声明","explanation":"正确。C++标准要求<code class=\"inline-code\">=delete</code>必须在函数的首次声明中使用，不能先正常声明再在后续定义为删除。"},{"id":3,"text":"<code class=\"inline-code\">=delete</code> 只能用于构造函数","explanation":"<code class=\"inline-code\">=delete</code>可以用于任何函数，不仅限于构造函数，也可用于拷贝赋值、转换函数等。"}],"answer":[2]},{"id":18,"description":"关于成员初始化器列表，下列说法正确的是","explanation":"成员初始化器列表位于“构造函数名字、参数列表和函数体之间”，以冒号开头","choices":[{"id":0,"text":"它写在函数体内部","explanation":"成员初始化器列表写在构造函数参数列表之后、函数体之前，不是在函数体内部。"},{"id":1,"text":"它写在构造函数参数列表和函数体之间","explanation":"正确。成员初始化列表以冒号开头，写在构造函数的参数列表和函数体之间，如<code class=\"inline-code\">A(int x) : m(x) {}</code>。"},{"id":2,"text":"它只能初始化一个成员","explanation":"成员初始化列表可以同时初始化多个成员，用逗号分隔，如<code class=\"inline-code\">: a(1), b(2), c(3)</code>。"},{"id":3,"text":"它只能用于内置类型","explanation":"成员初始化列表可以初始化任何类型的成员，包括类类型、内置类型、引用、const成员等。"}],"answer":[1]},{"id":19,"description":"下列哪种成员必须使用初始化器列表进行初始化？","explanation":"以下情况必须使用初始化器列表：常量成员、引用类型成员、没有无参构造函数的类成员。这里最典型的是 const 成员和引用成员。","choices":[{"id":0,"text":"普通局部变量","explanation":"普通局部变量与成员初始化列表无关，它们是在函数体内定义的。"},{"id":1,"text":"<code class=\"inline-code\">const</code> 成员或引用成员","explanation":"正确。<code class=\"inline-code\">const</code>成员和引用成员必须在成员初始化列表中初始化，因为它们一旦进入构造函数体后就不能再被赋值。"},{"id":2,"text":"所有 <code class=\"inline-code\">int</code> 成员","explanation":"普通<code class=\"inline-code\">int</code>成员可以在构造函数体内赋值，不强制使用初始化列表。"},{"id":3,"text":"静态成员函数","explanation":"静态成员函数不是数据成员，不涉及初始化列表。静态成员变量在类外初始化。"}],"answer":[1]}]},"7":{"title":"25程设Ⅱ-周7-理论题","questions":[{"id":0,"description":"关于C++中对象的存储与释放，下列说法正确的是","explanation":"","choices":[{"id":0,"text":"用<code class=\"inline-code\">new</code>创建的对象通常位于栈区，离开作用域后会自动释放","explanation":"<code class=\"inline-code\">new</code>创建的对象位于堆区，不会自动释放，需要手动<code class=\"inline-code\">delete</code>。"},{"id":1,"text":"局部对象通常位于堆区，必须使用<code class=\"inline-code\">delete</code>才能释放","explanation":"局部对象通常位于栈区，离开作用域后自动释放，不需要<code class=\"inline-code\">delete</code>。"},{"id":2,"text":"用<code class=\"inline-code\">new</code>创建的对象需要显式释放，否则可能造成内存泄漏","explanation":"正确。用<code class=\"inline-code\">new</code>在堆上创建的对象不会自动释放，必须使用<code class=\"inline-code\">delete</code>显式释放，否则可能造成内存泄漏。"},{"id":3,"text":"对指针执行<code class=\"inline-code\">delete</code>后，指针会自动变为 <code class=\"inline-code\">nullptr</code>","explanation":"对指针执行<code class=\"inline-code\">delete</code>后，指针不会自动变为<code class=\"inline-code\">nullptr</code>，仍保留原地址值。"}],"answer":[2]},{"id":1,"description":"有关下列代码说法正确的是<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nint main() {\nint* p = new int(5);\nint* q = p;\ndelete p;\nreturn 0;\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">q</code>会自动变为<code class=\"inline-code\">nullptr</code>","explanation":"<code class=\"inline-code\">delete p</code>只释放p指向的内存，不会改变q的值，q不会自动变为<code class=\"inline-code\">nullptr</code>。"},{"id":1,"text":"此时<code class=\"inline-code\">q</code>仍然指向原地址值，但该地址已经失效","explanation":"正确。p和q指向同一地址，delete p释放了该地址的内存，但q仍保留原地址值，此时q成为悬空指针，该地址已失效。"},{"id":2,"text":"此时仍可通过<code class=\"inline-code\">*q</code>安全访问原来的值<code class=\"inline-code\">5</code>","explanation":"delete后内存已释放，通过<code class=\"inline-code\">*q</code>访问是未定义行为，不能保证安全读到5。"},{"id":3,"text":"此时再次执行<code class=\"inline-code\">delete q</code>一定是安全的","explanation":"再次执行<code class=\"inline-code\">delete q</code>等同于double free，是未定义行为，可能导致程序崩溃。"}],"answer":[1]},{"id":2,"description":"关于构造函数的成员初始化列表，下列说法正确的是","explanation":"","choices":[{"id":0,"text":"成员初始化列表中的初始化发生在构造函数体执行之后","explanation":"成员初始化列表的初始化在进入构造函数体之前就已完成，而非在构造函数体执行之后。"},{"id":1,"text":"在构造函数体内对成员赋值，与成员初始化列表初始化完全等价","explanation":"两者不完全等价。对于const成员和引用成员，只能在初始化列表中初始化；在构造函数体内是赋值操作，不是初始化。"},{"id":2,"text":"成员初始化列表中的初始化发生在进入构造函数体之前","explanation":"正确。成员初始化列表的初始化发生在进入构造函数体之前，先初始化所有列出的成员，然后再执行函数体内的代码。"},{"id":3,"text":"所有成员都必须在构造函数体内赋值，不能在初始化列表中处理","explanation":"并非所有成员都必须在构造函数体内赋值，许多成员更适合在初始化列表中初始化。"}],"answer":[2]},{"id":3,"description":"设有如下定义：<br><br><pre class=\"code-block\"><code>int a = 10, b = 20;\nconst int* p1 = &amp;a;\nint* const p2 = &amp;a;</code></pre><br>下列说法正确的是","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">p1</code>和<code class=\"inline-code\">p2</code>都不能修改所指向的值","explanation":"<code class=\"inline-code\">p1</code>是指向const的指针，不能通过它修改值但可以改指向；<code class=\"inline-code\">p2</code>是指针常量，可以修改值但不能改指向。两者能力不同。"},{"id":1,"text":"<code class=\"inline-code\">p1</code>不能通过它修改所指向的值，但可以改为指向别处；<code class=\"inline-code\">p2</code> 可以通过它修改所指向的值，但不能改为指向别处","explanation":"正确。<code class=\"inline-code\">const int* p1</code>表示不能通过p1修改所指向的值，但p1可以指向别处；<code class=\"inline-code\">int* const p2</code>表示p2不能改指向，但可以通过p2修改值。"},{"id":2,"text":"<code class=\"inline-code\">p1</code>不能改为指向别处，但可以通过它修改所指向的值；<code class=\"inline-code\">p2</code>正好相反","explanation":"说反了。<code class=\"inline-code\">p1</code>（指向const的指针）不能修改值但能改指向；<code class=\"inline-code\">p2</code>（指针常量）能修改值但不能改指向。"},{"id":3,"text":"<code class=\"inline-code\">p1</code>和<code class=\"inline-code\">p2</code>都既不能修改指向，也不能修改所指向的值","explanation":"p1和p2各自有一部分能力受限，不是两者都既不能修改指向又不能修改所指向的值。"}],"answer":[1]},{"id":4,"description":"关于普通类对象在内存中的组成，下列说法正确的是","explanation":"","choices":[{"id":0,"text":"对象中包含该类所有成员函数的代码副本","explanation":"成员函数的代码只有一份，由所有对象共享，不会在每个对象中存储副本。"},{"id":1,"text":"类的静态数据成员属于每个对象各自独立拥有的一份数据","explanation":"静态数据成员属于整个类，被所有对象共享，不是每个对象各自独立拥有。"},{"id":2,"text":"普通对象通常包含其非静态数据成员所需的存储空间","explanation":"正确。普通类对象的内存组成主要包括其非静态数据成员所需的存储空间，成员函数和静态成员不在对象内部。"},{"id":3,"text":"不同对象之间会共享各自的非静态数据成员","explanation":"不同对象的非静态数据成员是各自独立的，不会共享。"}],"answer":[2]},{"id":5,"description":"下列代码的输出结果是<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass Test {\npublic:\n    Test() { cout &lt;&lt; &quot;C &quot;; }\n    ~Test() { cout &lt;&lt; &quot;D &quot;; }\n};\n\nint main() {\n    Test t1;\n    Test* p = new Test;\n    delete p;\n    return 0;\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">C D C D</code>","explanation":"t1和<code class=\"inline-code\">*p</code>的构造和析构不是交叉进行的。两个构造函数先执行，然后delete p触发一次析构，最后main结束时t1析构。"},{"id":1,"text":"<code class=\"inline-code\">C C D D</code>","explanation":"正确。先构造t1输出\"C \"，再new Test构造堆对象输出\"C \"，然后delete p析构堆对象输出\"D \"，最后t1离开作用域析构输出\"D \"。"},{"id":2,"text":"<code class=\"inline-code\">C C D</code>","explanation":"两个对象各有一次构造和一次析构，应该有4次输出（C C D D），而非3次。"},{"id":3,"text":"<code class=\"inline-code\">C D D C</code>","explanation":"构造顺序是先t1后*p，析构顺序是先*p(delete)后t1(离开作用域)，应为C C D D。"}],"answer":[1]},{"id":6,"description":"关于拷贝构造函数，下列说法正确的是","explanation":"","choices":[{"id":0,"text":"对象已经存在后，再执行赋值语句，一定会调用拷贝构造函数","explanation":"对象已存在后的赋值操作调用的是赋值运算符（<code class=\"inline-code\">operator=</code>），不是拷贝构造函数。"},{"id":1,"text":"用一个已有对象去初始化同类新对象时，通常会调用拷贝构造函数","explanation":"正确。用一个已有对象初始化同类新对象时（如<code class=\"inline-code\">A b = a;</code>），会调用拷贝构造函数。"},{"id":2,"text":"拷贝构造函数的参数必须按值传递","explanation":"拷贝构造函数的参数必须是引用传递（通常为<code class=\"inline-code\">const A&amp;</code>），如果按值传递会导致无限递归。"},{"id":3,"text":"拷贝构造函数只能手动调用，编译器不会自动调用","explanation":"编译器在很多场景下会自动调用拷贝构造函数，如按值传递参数、按值返回对象等。"}],"answer":[1]},{"id":7,"description":"有关下列代码的说法正确的是：<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass A {\nprivate:\n    const int x;\npublic:\n    A() {\n        x = 10;\n    }\n};</code></pre>","explanation":"","choices":[{"id":0,"text":"代码可以正常编译，因为<code class=\"inline-code\">const</code>成员可以先定义再在构造函数体内赋值","explanation":"<code class=\"inline-code\">const</code>成员不能在构造函数体内赋值，因为构造函数体内是赋值操作，而const变量不允许赋值。"},{"id":1,"text":"代码不能通过编译，因为<code class=\"inline-code\">const</code>数据成员必须在成员初始化列表中初始化","explanation":"正确。<code class=\"inline-code\">const</code>数据成员只能通过成员初始化列表初始化，在构造函数体内使用<code class=\"inline-code\">x = 10</code>赋值会编译错误。"},{"id":2,"text":"代码不能通过编译，因为类中不能定义<code class=\"inline-code\">const</code>数据成员","explanation":"类中可以定义<code class=\"inline-code\">const</code>数据成员，只是必须通过初始化列表初始化。"},{"id":3,"text":"代码可以正常编译，但运行时会报error","explanation":"代码无法通过编译，编译阶段就会报错，不会到运行时。"}],"answer":[1]},{"id":8,"description":"有关下列代码，哪一项说法正确<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass A {\nprivate:\n    int x;\npublic:\n    A(int v) : x(v) {}\n    void f() { cout &lt;&lt; x &lt;&lt; endl; }\n    void g() const { cout &lt;&lt; x &lt;&lt; endl; }\n};\n\nint main() {\n    const A a(10);\n    a.g();\n    a.f();\n    return 0;\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"代码可以正常编译并输出两次<code class=\"inline-code\">10</code>","explanation":"<code class=\"inline-code\">a.f()</code>会编译错误，因为const对象不能调用非const成员函数。"},{"id":1,"text":"代码不能通过编译，因为<code class=\"inline-code\">const</code>对象不能调用任何成员函数","explanation":"const对象可以调用const成员函数（如g()），只是不能调用非const成员函数。"},{"id":2,"text":"代码不能通过编译，因为<code class=\"inline-code\">const</code>对象不能调用非<code class=\"inline-code\">const</code>成员函数<code class=\"inline-code\">f()</code>","explanation":"正确。<code class=\"inline-code\">a</code>是const对象，<code class=\"inline-code\">f()</code>是非const成员函数，const对象不能调用非const成员函数，编译错误。"},{"id":3,"text":"代码不能通过编译，因为<code class=\"inline-code\">const</code>成员函数<code class=\"inline-code\">g()</code>不能访问数据成员 <code class=\"inline-code\">x</code>","explanation":"const成员函数<code class=\"inline-code\">g()</code>可以访问数据成员x（只读访问），只是不能修改x。"}],"answer":[2]},{"id":9,"description":"下面程序的输出结果是<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass Counter {\nprivate:\n    static int cnt;\npublic:\n    Counter() { cnt++; }\n    void show() const { cout &lt;&lt; cnt &lt;&lt; &quot; &quot;; }\n};\n\nint Counter::cnt = 0;\n\nint main() {\n    Counter a;\n    Counter b;\n    a.show();\n    b.show();\n    return 0;\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">1 1</code>","explanation":"两个对象构造后cnt变为2，show()输出的是当前cnt值2，不是1。"},{"id":1,"text":"<code class=\"inline-code\">1 2</code>","explanation":"两次show()调用时cnt都已经是2（两个对象都已构造完毕），不会一个是1一个是2。"},{"id":2,"text":"<code class=\"inline-code\">2 2</code>","explanation":"正确。构造a时cnt变为1，构造b时cnt变为2。之后调用a.show()和b.show()时cnt均为2，输出\"2 2\"。"},{"id":3,"text":"编译错误","explanation":"代码语法正确，静态成员变量定义和使用方式均合法，可以正常编译。"}],"answer":[2]},{"id":10,"description":"下面程序运行过程中拷贝构造函数一共会被调用几次<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass A {\npublic:\n    A() {}\n    A(const A&amp; other) {\n        cout &lt;&lt; &quot;copy &quot;;\n    }\n};\n\nvoid fun(A x) {\n    A y = x;\n}\n\nint main() {\n    A a;\n    fun(a);\n    return 0;\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"0","explanation":"函数fun的参数x按值传递会调用一次拷贝构造，函数体内<code class=\"inline-code\">A y = x</code>又调用一次，共2次。"},{"id":1,"text":"1","explanation":"忽略了按值传递参数时也会调用拷贝构造函数，实际调用次数不止1次。"},{"id":2,"text":"2","explanation":"正确。第一次调用：<code class=\"inline-code\">fun(a)</code>按值传递参数，用a拷贝构造x；第二次调用：函数体内<code class=\"inline-code\">A y = x</code>用x拷贝构造y。共2次。"},{"id":3,"text":"3","explanation":"只有两处触发拷贝构造（参数传递和y=x），不是3次。"}],"answer":[2]},{"id":11,"description":"有关下列代码说法正确的是<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass A {\npublic:\n    A(int x) {}\n};\n\nint main() {\n    A* p = new A[3];\n    delete[] p;\n    return 0;\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"代码可以正常编译，因为<code class=\"inline-code\">new A[3]</code>会自动调用<code class=\"inline-code\">A(int)</code>三次","explanation":"类A只有带参构造函数<code class=\"inline-code\">A(int x)</code>，没有默认构造函数，<code class=\"inline-code\">new A[3]</code>需要调用默认构造函数，因此编译失败。"},{"id":1,"text":"代码不能通过编译，因为创建对象数组时需要能够调用默认构造函数","explanation":"正确。<code class=\"inline-code\">new A[3]</code>创建对象数组时需要调用默认构造函数，但类A只有<code class=\"inline-code\">A(int)</code>没有默认构造函数，编译失败。"},{"id":2,"text":"代码不能通过编译，因为对象数组不能用<code class=\"inline-code\">delete[]</code>释放","explanation":"对象数组可以用<code class=\"inline-code\">delete[]</code>释放，这不是编译错误的原因。"},{"id":3,"text":"代码可以正常编译，但<code class=\"inline-code\">delete[] p</code>一定会运行错误","explanation":"代码无法通过编译，不会到运行阶段。问题在于编译时找不到默认构造函数。"}],"answer":[1]},{"id":12,"description":"关于C++中的<code class=\"inline-code\">=delete</code> 和<code class=\"inline-code\">=default</code>，下列说法正确的是","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">=delete</code>表示该函数由编译器自动生成默认实现","explanation":"<code class=\"inline-code\">=delete</code>是禁止函数被调用，而非让编译器自动生成默认实现。"},{"id":1,"text":"<code class=\"inline-code\">=default</code>表示该函数不可被调用","explanation":"<code class=\"inline-code\">=default</code>是让编译器生成默认实现，函数可以被正常调用，并非不可调用。"},{"id":2,"text":"<code class=\"inline-code\">=delete</code>可用于显式禁止某个函数被调用，<code class=\"inline-code\">=default</code>可用于要求编译器生成默认版本","explanation":"正确。<code class=\"inline-code\">=delete</code>显式禁止函数调用，<code class=\"inline-code\">=default</code>显式要求编译器生成默认版本，两者功能互补。"},{"id":3,"text":"<code class=\"inline-code\">=delete</code>和<code class=\"inline-code\">=default</code>只能用于析构函数","explanation":"两者不仅可用于析构函数，还可用于构造函数、拷贝构造、赋值运算等各种特殊成员函数。"}],"answer":[2]},{"id":13,"description":"下列代码最可能出现的问题是：<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\n#include &lt;cstring&gt;\nusing namespace std;\n\nclass String {\nprivate:\n    char* data;\npublic:\n    String(const char* s) {\n        data = new char[strlen(s) + 1];\n        strcpy(data, s);\n    }\n\n    ~String() {\n        delete[] data;\n    }\n};\n\nint main() {\n    String s1(&quot;hello&quot;);\n    String s2 = s1;\n    return 0;\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"程序一定无法通过编译，因为类中含有指针成员","explanation":"类中含有指针成员本身不是问题，许多类都含有指针成员，可以正常编译。"},{"id":1,"text":"程序运行完全安全，因为系统会自动完成深拷贝","explanation":"编译器自动生成的拷贝构造函数只执行浅拷贝，不会自动实现深拷贝。"},{"id":2,"text":"程序可能因浅拷贝导致多个对象指向同一块内存，析构时发生重复释放","explanation":"正确。<code class=\"inline-code\">String s2 = s1</code>调用编译器生成的默认拷贝构造（浅拷贝），导致s1和s2的data指向同一块内存，析构时会重复释放（double free）。"},{"id":3,"text":"程序中<code class=\"inline-code\">s2 = s1</code>会调用赋值运算符，而不是拷贝构造函数","explanation":"<code class=\"inline-code\">String s2 = s1</code>是初始化语法，调用的是拷贝构造函数，而非赋值运算符。"}],"answer":[2]},{"id":14,"description":"以下程序的输出结果是<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass A {\nprivate:\n    int x;\npublic:\n    A(int v) : x(v) {}\n\n    int get() const {\n        return x;\n    }\n};\n\nvoid show(const A&amp; a) {\n    cout &lt;&lt; a.get() &lt;&lt; endl;\n}\n\nint main() {\n    A a(10);\n    show(a);\n    return 0;\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">0</code>","explanation":"对象a通过<code class=\"inline-code\">A(10)</code>构造，x被初始化为10，get()返回10而非0。"},{"id":1,"text":"<code class=\"inline-code\">10</code>","explanation":"正确。a以参数10构造，<code class=\"inline-code\">show</code>通过const引用接收a并调用const成员函数<code class=\"inline-code\">get()</code>，返回x的值10。"},{"id":2,"text":"编译错误，因为<code class=\"inline-code\">const A&amp;</code>不能绑定到普通对象","explanation":"<code class=\"inline-code\">const A&amp;</code>可以绑定到普通对象，const引用可以绑定到非const对象，这是合法的。"},{"id":3,"text":"编译错误，因为<code class=\"inline-code\">show</code>中不能调用<code class=\"inline-code\">const</code>成员函数","explanation":"const引用的函数可以调用const成员函数，<code class=\"inline-code\">get()</code>是const成员函数，调用合法。"}],"answer":[1]},{"id":15,"description":"以下程序的输出结果是<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass X {\npublic:\n    X(int v) {\n        cout &lt;&lt; v &lt;&lt; &quot; &quot;;\n    }\n};\n\nclass A {\nprivate:\n    X x;\n    X y;\npublic:\n    A() : y(2), x(1) {}\n};\n\nint main() {\n    A a;\n    return 0;\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">1 2</code>","explanation":"正确。成员初始化列表的初始化顺序按成员在类中的声明顺序，而非列表中的书写顺序。x先声明所以先初始化为1，y后声明后初始化为2。"},{"id":1,"text":"<code class=\"inline-code\">2 1</code>","explanation":"虽然初始化列表中y写在前面，但实际按声明顺序初始化，x先于y，所以输出1 2而非2 1。"},{"id":2,"text":"<code class=\"inline-code\">1</code>","explanation":"两个成员x和y都会被初始化并输出，不会是只有1。"},{"id":3,"text":"编译错误","explanation":"代码语法正确，成员初始化列表可以以任意顺序书写，只是初始化顺序按声明顺序。"}],"answer":[0]},{"id":16,"description":"以下程序的输出结果是<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass A {\npublic:\n    A() {}\n    A(const A&amp;) {\n        cout &lt;&lt; &quot;copy &quot;;\n    }\n    A&amp; operator=(const A&amp;) {\n        cout &lt;&lt; &quot;assign &quot;;\n        return *this;\n    }\n};\n\nint main() {\n    A a;\n    A b = a;\n    A c;\n    c = a;\n    return 0;\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">copy assign</code>","explanation":"正确。<code class=\"inline-code\">A b = a</code>是初始化，调用拷贝构造函数输出\"copy \"；<code class=\"inline-code\">c = a</code>是赋值，调用赋值运算符输出\"assign \"。"},{"id":1,"text":"<code class=\"inline-code\">assign copy</code>","explanation":"顺序反了。先执行<code class=\"inline-code\">A b = a</code>调用拷贝构造，再执行<code class=\"inline-code\">c = a</code>调用赋值运算符。"},{"id":2,"text":"<code class=\"inline-code\">copy copy</code>","explanation":"<code class=\"inline-code\">c = a</code>中c已经存在，这是赋值操作而非初始化，调用的是赋值运算符而非拷贝构造。"},{"id":3,"text":"<code class=\"inline-code\">assign assign</code>","explanation":"<code class=\"inline-code\">A b = a</code>是初始化语法，调用拷贝构造函数而非赋值运算符。"}],"answer":[0]},{"id":17,"description":"有关以下代码说法正确的是：<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass A {\npublic:\n    A() = delete;\n    A(int x) {}\n};\n\nint main() {\n    A a;\n    A b(10);\n    return 0;\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"代码可以正常编译，因为<code class=\"inline-code\">A b(10)</code>合法","explanation":"虽然<code class=\"inline-code\">A b(10)</code>合法，但<code class=\"inline-code\">A a;</code>调用了被删除的默认构造函数，编译会失败。"},{"id":1,"text":"代码不能通过编译，因为类中只要出现<code class=\"inline-code\">=delete</code>就会整体失效","explanation":"<code class=\"inline-code\">=delete</code>只影响被标记的那个函数，不会让类中其他函数整体失效。"},{"id":2,"text":"代码不能通过编译，因为<code class=\"inline-code\">A a;</code>试图调用已删除的默认构造函数","explanation":"正确。<code class=\"inline-code\">A()</code>被标记为<code class=\"inline-code\">=delete</code>，而<code class=\"inline-code\">A a;</code>试图调用默认构造函数，因此编译失败。"},{"id":3,"text":"代码不能通过编译，因为<code class=\"inline-code\">A(int)</code>不能与<code class=\"inline-code\">A() = delete</code>同时存在","explanation":"有参构造函数和<code class=\"inline-code\">A() = delete</code>可以同时存在，语法上并不冲突。"}],"answer":[2]},{"id":18,"description":"以下程序的输出结果是<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass A {\nprivate:\n    int x;\n    static int y;\npublic:\n    A(int v) : x(v) {}\n    void setX(int v) { x = v; }\n    static void setY(int v) { y = v; }\n    void show() const { cout &lt;&lt; x &lt;&lt; &quot; &quot; &lt;&lt; y &lt;&lt; endl; }\n};\n\nint A::y = 0;\n\nint main() {\n    A a(1), b(2);\n    A::setY(5);\n    a.show();\n    b.show();\n    return 0;\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"<pre class=\"code-block\"><code>1 0\n2 0</code></pre>","explanation":"静态成员y被<code class=\"inline-code\">setY(5)</code>修改为5，a和b共享y，所以y均为5。a.x=1，b.x=2，结果不会是\"1 0 / 2 0\"。"},{"id":1,"text":"<pre class=\"code-block\"><code>1 5\n2 5</code></pre>","explanation":"正确。a的非静态成员x为1，b的x为2；静态成员y被<code class=\"inline-code\">A::setY(5)</code>设为5，被所有对象共享。因此a.show()输出\"1 5\"，b.show()输出\"2 5\"。"},{"id":2,"text":"<pre class=\"code-block\"><code>5 1\n5 2</code></pre>","explanation":"setX修改的是非静态成员x，setY修改的是静态成员y。a的x为1，b的x为2，y为5，不会输出\"5 1 / 5 2\"。"},{"id":3,"text":"<pre class=\"code-block\"><code>1 5\n1 5</code></pre>","explanation":"a和b的x各自独立（a.x=1, b.x=2），不会都输出1。"}],"answer":[1]},{"id":19,"description":"阅读下列代码。若希望该类在“用一个对象初始化另一个对象”时也能正确工作，最应补充或修改的是哪一项？<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\n#include &lt;cstring&gt;\nusing namespace std;\n\nclass String {\nprivate:\n    char* data;\npublic:\n    String(const char* s) {\n        data = new char[strlen(s) + 1];\n        strcpy(data, s);\n    }\n\n    ~String() {\n        delete[] data;\n    }\n};\n\nint main() {\n    String s1(&quot;hello&quot;);\n    String s2 = s1;\n    return 0;\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"把析构函数删除即可","explanation":"删除析构函数会导致更严重的问题，并不能解决浅拷贝引发的double free问题。"},{"id":1,"text":"把<code class=\"inline-code\">char* data</code>改成<code class=\"inline-code\">int data</code>","explanation":"将data改为int类型完全改变了类的设计，无法实现字符串存储功能。"},{"id":2,"text":"补充拷贝构造函数，在其中重新申请空间并复制字符串内容","explanation":"正确。应补充自定义拷贝构造函数，在其中为新对象重新申请内存并复制字符串内容（深拷贝），避免两个对象的data指向同一块内存。"},{"id":3,"text":"把构造函数参数改成<code class=\"inline-code\">char* s</code>，去掉 <code class=\"inline-code\">const</code>","explanation":"去掉const只是修改了构造函数参数类型，不能解决浅拷贝导致的double free问题。"}],"answer":[2]}]},"8":{"title":"25程设Ⅱ-周8-理论题","questions":[{"id":0,"description":"在 C++ 中，运算符重载本质上是：","explanation":"","choices":[{"id":0,"text":"宏定义替换","explanation":"错误。运算符重载不是宏定义替换，宏定义由预处理器处理，而运算符重载是编译时的函数调用机制。"},{"id":1,"text":"一种特殊的函数调用","explanation":"正确。运算符重载本质上是函数调用，运算符函数是一种特殊的函数，其函数名为<code class=\"inline-code\">operator@</code>，调用时编译器自动将运算表达式转换为函数调用。"},{"id":2,"text":"编译器的内置指令","explanation":"错误。运算符重载是用户自定义的函数，不是编译器内置指令。编译器内置指令如<code class=\"inline-code\">#pragma</code>等。"},{"id":3,"text":"对运算符优先级的修改","explanation":"错误。运算符重载不能改变运算符的优先级，优先级由C++语言规范固定，重载只改变运算符对用户自定义类型的操作行为。"}],"answer":[1]},{"id":1,"description":"下列关于 C++ 运算符重载的说法，正确的是：","explanation":"","choices":[{"id":0,"text":"可以创建新的运算符，如 <code class=\"inline-code\">**</code>","explanation":"错误。C++不允许创建全新的运算符，只能重载已有的运算符（如+、-等），<code class=\"inline-code\">**</code>不是C++合法运算符。"},{"id":1,"text":"可以改变运算符的优先级和结合性","explanation":"错误。运算符重载不能改变运算符的优先级和结合性，这些属性由语言规范固定。"},{"id":2,"text":"运算符重载不能改变运算符的操作数个数","explanation":"正确。运算符重载必须保持原有操作数个数不变，例如双目运算符重载后仍然需要两个操作数。"},{"id":3,"text":"所有的运算符都可以被重载","explanation":"错误。并非所有运算符都可以重载，例如<code class=\"inline-code\">::</code>（作用域解析）、<code class=\"inline-code\">.</code>（成员访问）、<code class=\"inline-code\">?:</code>（三目运算符）、<code class=\"inline-code\">sizeof</code>等不能重载。"}],"answer":[2]},{"id":2,"description":"默认的拷贝构造函数执行的是哪种复制策略？","explanation":"","choices":[{"id":0,"text":"深拷贝 (Deep Copy)","explanation":"错误。深拷贝需要程序员手动实现，为指针成员分配独立内存。默认的拷贝构造函数不会执行深拷贝。"},{"id":1,"text":"浅拷贝 (Shallow Copy)","explanation":"正确。默认的拷贝构造函数执行浅拷贝（逐成员复制），对于指针成员仅复制指针地址，不会复制指向的堆内存。"},{"id":2,"text":"引用计数拷贝","explanation":"错误。引用计数拷贝需要额外维护计数变量，不是默认行为，需要程序员自行实现。"},{"id":3,"text":"写时复制 (Copy-on-Write)","explanation":"错误。写时复制（Copy-on-Write）是一种高级优化策略，需要额外机制支持，不是默认拷贝构造函数的行为。"}],"answer":[1]},{"id":3,"description":"在成员函数重载双目运算符时，左操作数是通过什么隐式传递的？","explanation":"","choices":[{"id":0,"text":"第一个参数","explanation":"错误。成员函数重载双目运算符时，显式参数只有一个（右操作数），左操作数不是通过参数传递的。"},{"id":1,"text":"this指针","explanation":"正确。成员函数重载双目运算符时，左操作数通过隐含的<code class=\"inline-code\">this</code>指针传递，即调用该运算符函数的对象本身。"},{"id":2,"text":"全局变量","explanation":"错误。运算符重载不使用全局变量传递操作数，而是通过<code class=\"inline-code\">this</code>指针和函数参数传递。"},{"id":3,"text":"引用","explanation":"错误。虽然参数可以使用引用类型，但左操作数是通过<code class=\"inline-code\">this</code>指针隐式传递的，而非引用机制。"}],"answer":[1]},{"id":4,"description":"下列**可以作为单目运算符使用**的是：","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">%</code>","explanation":"错误。<code class=\"inline-code\">%</code>（取模运算符）只能作为双目运算符使用，需要两个操作数。"},{"id":1,"text":"<code class=\"inline-code\">=</code>","explanation":"错误。<code class=\"inline-code\">=</code>（赋值运算符）只能作为双目运算符使用，需要左值和右值两个操作数。"},{"id":2,"text":"<code class=\"inline-code\">++</code>","explanation":"正确。<code class=\"inline-code\">++</code>既可以作为前置单目运算符（<code class=\"inline-code\">++a</code>），也可以作为后置单目运算符（<code class=\"inline-code\">a++</code>）。"},{"id":3,"text":"<code class=\"inline-code\">[]</code>","explanation":"错误。<code class=\"inline-code\">[]</code>（下标运算符）是双目运算符，需要对象和下标两个操作数。"}],"answer":[2]},{"id":5,"description":"将运算符重载为类的成员函数时，以下说法正确的是：","explanation":"","choices":[{"id":0,"text":"左操作数必须是该类的对象或其派生类对象","explanation":"正确。运算符重载为成员函数时，左操作数通过<code class=\"inline-code\">this</code>指针传递，因此必须是该类的对象或其派生类对象。"},{"id":1,"text":"右操作数必须是基本数据类型","explanation":"错误。右操作数可以是任意类型，由函数的参数类型决定，不限于基本数据类型。"},{"id":2,"text":"无法访问类的私有成员","explanation":"错误。成员函数可以访问类的所有成员（包括私有成员），运算符重载作为成员函数同样可以访问私有成员。"},{"id":3,"text":"必须声明为 <code class=\"inline-code\">static</code>","explanation":"错误。运算符重载函数通常是非静态成员函数，因为需要通过<code class=\"inline-code\">this</code>指针访问对象数据。<code class=\"inline-code\">static</code>成员函数没有<code class=\"inline-code\">this</code>指针。"}],"answer":[0]},{"id":6,"description":"在重载 <code class=\"inline-code\">operator+</code>时，若将第二个参数声明为 <code class=\"inline-code\">const Integer&amp; Int</code>，这样做的主要目的是：","explanation":"","choices":[{"id":0,"text":"允许传入右值（如 <code class=\"inline-code\">a + 3</code>）","explanation":"错误。<code class=\"inline-code\">const</code>引用的主要目的不是允许传入右值，虽然<code class=\"inline-code\">const</code>引用确实可以绑定临时对象，但这里的核心目的是保护数据和避免拷贝。"},{"id":1,"text":"防止函数内部意外修改 <code class=\"inline-code\">Int</code>对象，并避免不必要的拷贝","explanation":"正确。<code class=\"inline-code\">const</code>防止函数内部修改传入的对象，引用避免拷贝开销，两者结合既保证安全性又提高效率。"},{"id":2,"text":"允许修改 <code class=\"inline-code\">Int</code>对象的值","explanation":"错误。<code class=\"inline-code\">const</code>的作用恰恰相反，它禁止函数内部修改<code class=\"inline-code\">Int</code>对象的值。"},{"id":3,"text":"提高运算符的优先级","explanation":"错误。<code class=\"inline-code\">const</code>和引用都不能改变运算符的优先级，运算符优先级由C++语言规范固定。"}],"answer":[1]},{"id":7,"description":"若 <code class=\"inline-code\">operator+</code> 为成员函数，则 <code class=\"inline-code\">a.operator+(b)</code> 等价于？","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">operator+(a, b)</code>","explanation":"错误。<code class=\"inline-code\">operator+(a, b)</code>是友元函数（非成员函数）的调用形式，而非成员函数的调用形式。"},{"id":1,"text":"<code class=\"inline-code\">a + b</code>","explanation":"正确。<code class=\"inline-code\">a.operator+(b)</code>是<code class=\"inline-code\">a + b</code>的显式调用形式，编译器会将<code class=\"inline-code\">a + b</code>自动转换为该调用。"},{"id":2,"text":"<code class=\"inline-code\">b + a</code>","explanation":"错误。<code class=\"inline-code\">b + a</code>对应的是<code class=\"inline-code\">b.operator+(a)</code>，操作数顺序与原式相反。"},{"id":3,"text":"<code class=\"inline-code\">a.operator+(a, b)</code>","explanation":"错误。成员函数<code class=\"inline-code\">operator+</code>作为双目运算符只需一个显式参数，<code class=\"inline-code\">a.operator+(a, b)</code>参数过多，语法不正确。"}],"answer":[1]},{"id":8,"description":"下列哪种情况**必须**使用友元函数（或非成员函数）来重载运算符？","explanation":"","choices":[{"id":0,"text":"重载 <code class=\"inline-code\">=</code>运算符","explanation":"错误。赋值运算符<code class=\"inline-code\">=</code>必须重载为成员函数，不能使用友元函数。"},{"id":1,"text":"重载 <code class=\"inline-code\">&lt;&lt;</code>运算符用于输出自定义对象","explanation":"正确。重载<code class=\"inline-code\">&lt;&lt;</code>用于输出自定义对象时，左操作数是<code class=\"inline-code\">ostream</code>对象而非本类对象，因此必须使用友元函数或非成员函数。"},{"id":2,"text":"重载 <code class=\"inline-code\">++</code>运算符","explanation":"错误。<code class=\"inline-code\">++</code>运算符可以重载为成员函数，前置和后置版本均可作为成员函数实现。"},{"id":3,"text":"重载 <code class=\"inline-code\">-</code>运算符","explanation":"错误。<code class=\"inline-code\">-</code>运算符可以重载为成员函数，左操作数通过<code class=\"inline-code\">this</code>指针传递即可。"}],"answer":[1]},{"id":9,"description":"在重载双目运算符的成员函数声明中，末尾加上 <code class=\"inline-code\">const</code>（如 <code class=\"inline-code\">T operator+(const T2&amp; b) const;</code>），其作用是：","explanation":"","choices":[{"id":0,"text":"保证函数内部不修改成员变量","explanation":"部分正确但不完整。<code class=\"inline-code\">const</code>成员函数确实不能修改成员变量，但这只是其效果之一，核心作用是允许常量对象调用该函数。"},{"id":1,"text":"允许该函数被常量对象调用","explanation":"正确。成员函数末尾的<code class=\"inline-code\">const</code>修饰<code class=\"inline-code\">this</code>指针为常量指针，使得<code class=\"inline-code\">const</code>对象也能调用该函数。"},{"id":2,"text":"保证右操作数不被修改","explanation":"错误。右操作数是否被修改由参数的<code class=\"inline-code\">const</code>修饰决定，与函数末尾的<code class=\"inline-code\">const</code>无关。"},{"id":3,"text":"将返回值声明为常量","explanation":"错误。末尾的<code class=\"inline-code\">const</code>修饰的是<code class=\"inline-code\">this</code>指针，而非返回值。返回值是否为常量由返回类型决定。"}],"answer":[1]},{"id":10,"description":"在C++中，前置自增运算符（例如 ++a）典型的类内重载函数声明是哪一个？","explanation":"","choices":[{"id":0,"text":"T&amp; operator++();","explanation":"正确。前置自增<code class=\"inline-code\">++a</code>无参数，返回修改后对象的引用<code class=\"inline-code\">T&amp;</code>，以支持链式操作如<code class=\"inline-code\">++(++a)</code>。"},{"id":1,"text":"T operator++(int);","explanation":"错误。<code class=\"inline-code\">T operator++(int)</code>是后置自增<code class=\"inline-code\">a++</code>的重载形式，<code class=\"inline-code\">int</code>是区分前后置的标记参数。"},{"id":2,"text":"void operator++();","explanation":"错误。返回<code class=\"inline-code\">void</code>则无法支持连续运算（如<code class=\"inline-code\">cout &lt;&lt; ++a</code>），前置自增应返回引用以支持链式表达式。"},{"id":3,"text":"T&amp; operator+(int);","explanation":"错误。<code class=\"inline-code\">operator+(int)</code>重载的是加法运算符<code class=\"inline-code\">+</code>，而非自增运算符<code class=\"inline-code\">++</code>。"}],"answer":[0]},{"id":11,"description":"重载后置自增运算符（如 <code class=\"inline-code\">a++</code>）时，参数列表中必须带有一个 <code class=\"inline-code\">int</code> 类型的虚拟形参。这个形参的实际作用是什么？","explanation":"","choices":[{"id":0,"text":"用于指定自增操作的步长大小。","explanation":"错误。该<code class=\"inline-code\">int</code>参数不用于指定步长，自增操作的步长固定为1。"},{"id":1,"text":"仅仅是一个语法约定，用于向编译器区分当前重载的是后置版本而非前置版本。","explanation":"正确。该<code class=\"inline-code\">int</code>参数仅作为区分标记，告诉编译器这是后置版本的重载，与前置版本（无参数）形成区分，实际使用中不传入具体值。"},{"id":2,"text":"用于保存自增前对象的初始值。","explanation":"错误。保存自增前的值是通过在函数内部创建临时副本来实现的，不是通过这个<code class=\"inline-code\">int</code>参数。"},{"id":3,"text":"接收操作数的内存地址。","explanation":"错误。该参数与操作数的内存地址无关，<code class=\"inline-code\">this</code>指针才携带对象的地址信息。"}],"answer":[1]},{"id":12,"description":"为什么前置自增（<code class=\"inline-code\">++a</code>）通常返回左值引用（<code class=\"inline-code\">T&amp;</code>），而后置自增（<code class=\"inline-code\">a++</code>）通常返回右值副本（<code class=\"inline-code\">T</code>）？","explanation":"","choices":[{"id":0,"text":"因为 C++ 编译器强制要求必须这么写，否则会报语法错误。","explanation":"错误。这不是编译器语法强制要求，而是语义和最佳实践的要求。编译器不会因为你返回了值就报错。"},{"id":1,"text":"前置运算需要返回修改后的对象本身；后置运算需要“先用后增”，必须返回一份自增前的历史状态副本。","explanation":"正确。前置自增返回修改后的自身（引用），支持链式运算；后置自增需\"先用后增\"，必须在自增前保存旧值并返回该副本。"},{"id":2,"text":"返回引用会占用更多的内存空间，后置自增为了优化性能所以返回值。","explanation":"错误。返回引用通常更高效（避免拷贝），后置自增返回值是因为语义需要返回旧状态副本，而非内存优化考虑。"},{"id":3,"text":"两者其实都可以返回引用，只是习惯问题。","explanation":"错误。后置自增不能返回引用，因为其返回的是局部临时对象（自增前的副本），返回引用会导致悬空引用。"}],"answer":[1]},{"id":13,"description":"如果开发者没有在类中显式重载赋值运算符（<code class=\"inline-code\">operator=</code>），C++ 编译器会自动提供一个缺省的赋值运算符。这种缺省操作属于哪种拷贝？","explanation":"","choices":[{"id":0,"text":"深拷贝（Deep Copy）","explanation":"错误。深拷贝需要程序员手动实现，为指针成员分配新内存并复制数据。编译器缺省版本不会这样做。"},{"id":1,"text":"移动赋值（Move Assignment）","explanation":"错误。移动赋值是C++11引入的概念，需要显式声明右值引用参数，编译器缺省的赋值运算符是拷贝赋值而非移动赋值。"},{"id":2,"text":"浅拷贝（Shallow Copy）","explanation":"正确。编译器自动生成的缺省赋值运算符执行逐成员的浅拷贝，对指针成员只复制地址而不复制指向的内存。"},{"id":3,"text":"零拷贝（Zero Copy）","explanation":"错误。零拷贝是一种数据传输优化技术（如网络编程中），不是C++赋值运算符的行为。"}],"answer":[2]},{"id":14,"description":"当类的成员变量包含指针（并在堆上动态分配了内存）时，如果使用缺省的赋值运算符（浅拷贝）执行 <code class=\"inline-code\">a = b;</code>，会导致什么最严重的后果？","explanation":"","choices":[{"id":0,"text":"编译无法通过，提示禁止给指针赋值。","explanation":"错误。浅拷贝语法上完全合法，编译器不会禁止指针的赋值操作，编译可以通过。"},{"id":1,"text":"<code class=\"inline-code\">a</code> 和 <code class=\"inline-code\">b</code> 的指针内容会各自独立，互不影响。","explanation":"错误。浅拷贝使两个对象的指针指向同一块内存，而非各自独立。各自独立是深拷贝的效果。"},{"id":2,"text":"会导致 <code class=\"inline-code\">a</code> 原有的内存泄漏，且析构时同一块内存会被释放两次（Double Free），引发段错误。","explanation":"正确。浅拷贝使<code class=\"inline-code\">a</code>和<code class=\"inline-code\">b</code>的指针指向同一块堆内存：<code class=\"inline-code\">a</code>原来的内存无人释放（内存泄漏），析构时两个指针各<code class=\"inline-code\">delete</code>一次（Double Free），导致段错误。"},{"id":3,"text":"会导致程序运行速度大幅度变慢。","explanation":"错误。浅拷贝的主要问题不是速度变慢，而是内存安全问题（内存泄漏和重复释放），可能导致程序崩溃。"}],"answer":[2]},{"id":15,"description":"规范的重载复制赋值运算符（<code class=\"inline-code\">operator=</code>）通常在函数体的最开始执行一项至关重要的判断，这项判断是？","explanation":"","choices":[{"id":0,"text":"检查系统内存是否足够分配","explanation":"错误。C++中<code class=\"inline-code\">new</code>失败时抛出异常，赋值运算符无需手动检查内存是否足够。"},{"id":1,"text":"检查形参对象是否为空。","explanation":"错误。赋值运算符的参数通常是引用（<code class=\"inline-code\">const T&amp;</code>），引用不可能为空，不需要空指针检查。"},{"id":2,"text":"检查是否为自赋值（即 <code class=\"inline-code\">if (this != &amp;other)</code> ）。","explanation":"正确。自赋值检查<code class=\"inline-code\">if (this != &amp;other)</code>至关重要，若不做此判断，在释放旧内存时可能会销毁正在使用的数据，导致未定义行为。"},{"id":3,"text":"检查形参对象的引用计数是否大于零。","explanation":"错误。引用计数是特定设计模式（如智能指针）的机制，不是通用赋值运算符的标准检查项。"}],"answer":[2]},{"id":16,"description":"根据标准规范，实现“深拷贝”赋值运算符时，操作指针成员的正确步骤顺序是什么（假设非自赋值且空间需重分配）？","explanation":"","choices":[{"id":0,"text":"先分配新存储 <code class=\"inline-code\">new int[]</code>，再 <code class=\"inline-code\">delete[]</code> 旧存储，最后执行复制。","explanation":"错误。先<code class=\"inline-code\">new</code>再<code class=\"inline-code\">delete[]</code>旧存储的顺序虽然安全，但该选项描述的步骤不完整，且与标准做法不完全一致。"},{"id":1,"text":"先执行数据复制，再 <code class=\"inline-code\">delete[]</code> 原有存储。","explanation":"错误。如果先复制数据，但还没有分配新内存，无法进行复制；且未释放旧内存就丢失了旧指针。"},{"id":2,"text":"直接通过 <code class=\"inline-code\">new int[]</code> 重新覆盖原指针，不进行 <code class=\"inline-code\">delete</code> 操作以提高性能。","explanation":"错误。不<code class=\"inline-code\">delete</code>旧内存直接覆盖指针会导致内存泄漏，这不是合理的优化。"},{"id":3,"text":"先 <code class=\"inline-code\">delete[]</code> 原有存储，然后根据传入对象的大小分配新存储，最后执行内存复制操作。","explanation":"正确。标准步骤为：先<code class=\"inline-code\">delete[]</code>释放旧内存，再根据源对象大小<code class=\"inline-code\">new</code>分配新内存，最后执行数据复制。前提是已做过自赋值检查。"}],"answer":[3]},{"id":17,"description":"用户自定义的复制赋值运算符通常会将返回值类型设计为对类本身的引用（<code class=\"inline-code\">T&amp;</code>），并返回 <code class=\"inline-code\">*this</code>。这样设计的核心目的是什么？","explanation":"","choices":[{"id":0,"text":"允许连续赋值（例如 <code class=\"inline-code\">a = b = c;</code>）。","explanation":"正确。返回<code class=\"inline-code\">*this</code>的引用使得<code class=\"inline-code\">a = b = c</code>等连续赋值成为可能，因为<code class=\"inline-code\">b = c</code>的结果（<code class=\"inline-code\">b</code>的引用）可以继续赋给<code class=\"inline-code\">a</code>。"},{"id":1,"text":"避免函数返回时调用一次析构函数","explanation":"错误。返回引用确实避免了拷贝构造，但这不是设计为返回引用的核心目的，核心目的是支持连续赋值语义。"},{"id":2,"text":"告诉编译器此时执行的是深拷贝。","explanation":"错误。返回类型与是否为深拷贝无关，深拷贝由函数体内的实现逻辑决定。"},{"id":3,"text":"防止外部代码随意修改对象的私有成员。","explanation":"错误。返回引用反而暴露了对象本身，不能防止外部修改私有成员。访问控制由<code class=\"inline-code\">private</code>/<code class=\"inline-code\">public</code>等访问修饰符控制。"}],"answer":[0]},{"id":18,"description":"在实现复合运算赋值（如 <code class=\"inline-code\">+=</code>）时，课件提到了一种实现思路：先调用已重载的加法（<code class=\"inline-code\">operator+</code>），再将结果赋给自身（<code class=\"inline-code\">*this = this-&gt;operator+(other);</code>）。这种方法的特点是？","explanation":"","choices":[{"id":0,"text":"它比直接修改成员变量（如 <code class=\"inline-code\">x += other.x</code>）更加高效，是唯一推荐做法。","explanation":"错误。这种写法并非更高效，反而会产生临时对象和额外的拷贝赋值开销，不是推荐做法。"},{"id":1,"text":"虽然代码得到了复用，但会因为产生临时对象和额外的拷贝赋值导致效率低于直接修改自身成员。","explanation":"正确。虽然复用了<code class=\"inline-code\">operator+</code>的代码，但<code class=\"inline-code\">operator+</code>会创建临时对象，再通过<code class=\"inline-code\">operator=</code>赋值会产生额外拷贝，效率低于直接修改成员变量。"},{"id":2,"text":"它是实现复合赋值唯一正确的方法。","explanation":"错误。复合赋值有多种正确实现方式，直接修改成员变量（如<code class=\"inline-code\">x += other.x</code>）也是正确且更高效的做法。"},{"id":3,"text":"这种写法在语法上是不被 C++ 编译器允许的。","explanation":"错误。这种写法在语法上完全合法，C++编译器允许在一个成员函数中调用另一个成员函数。"}],"answer":[1]},{"id":19,"description":"假设类 <code class=\"inline-code\">IntArray</code> 有指针成员 <code class=\"inline-code\">int *a</code>。当使用深拷贝策略实现了 <code class=\"inline-code\">operator=</code> 后，执行 <code class=\"inline-code\">a = b;</code>，请问执行完毕后 <code class=\"inline-code\">a</code> 对象的指针（<code class=\"inline-code\">a.a</code>）和 <code class=\"inline-code\">b</code> 对象的指针（<code class=\"inline-code\">b.a</code>）有什么联系？","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">a.a</code> 和 <code class=\"inline-code\">b.a</code> 指向同一个内存地址（共用一处堆空间）。","explanation":"错误。指向同一地址是浅拷贝的结果。深拷贝会为<code class=\"inline-code\">a</code>分配新的内存，两个指针不会指向同一地址。"},{"id":1,"text":"<code class=\"inline-code\">a.a</code> 的指针会变成 nullptr，而数据全部转移给 <code class=\"inline-code\">b.a</code>。","explanation":"错误。深拷贝赋值后<code class=\"inline-code\">a.a</code>不会变为<code class=\"inline-code\">nullptr</code>，而是指向一块新分配的、包含相同数据的内存。"},{"id":2,"text":"<code class=\"inline-code\">b.a</code> 会被释放，<code class=\"inline-code\">a.a</code> 独占数据","explanation":"错误。赋值操作不会影响<code class=\"inline-code\">b.a</code>（源对象），<code class=\"inline-code\">b.a</code>仍然指向原来的有效内存。"},{"id":3,"text":"<code class=\"inline-code\">a.a</code> 和 <code class=\"inline-code\">b.a</code> 指向完全不同的内存地址，但这两块内存中存储的数据内容是相同的","explanation":"正确。深拷贝为<code class=\"inline-code\">a</code>分配新内存并将<code class=\"inline-code\">b</code>的数据复制过来，因此两个指针地址不同但存储的数据内容相同。"}],"answer":[3]}]},"12":{"title":"25程设Ⅱ-周12-理论题","questions":[{"id":0,"description":"在C++中，多态意味着？","explanation":"","choices":[{"id":0,"text":"只具有单一形态的类","explanation":"错误。只具有单一形态不符合\"多态\"的含义，多态强调的是多种行为形态。"},{"id":1,"text":"编译时决定行为的类","explanation":"错误。编译时决定行为属于静态绑定（编译时多态），而多态的完整含义还包括运行时多态。"},{"id":2,"text":"允许对象表现出多种行为形态的特性","explanation":"正确。多态是指同一操作或接口在不同对象上可以表现出不同的行为形态，是面向对象编程的核心特性之一。"},{"id":3,"text":"仅具备静态行为的类","explanation":"错误。仅具备静态行为描述的是非多态的情况，多态恰恰要求对象能表现出动态的多种行为。"}],"answer":[2]},{"id":1,"description":"以下哪个概念允许你在C++中重用已编写的代码？","explanation":"","choices":[{"id":0,"text":"继承","explanation":"正确。继承允许派生类复用基类的成员变量和成员函数，是C++中实现代码重用的主要机制。"},{"id":1,"text":"多态","explanation":"错误。多态关注的是同一接口的不同实现，虽然提高了代码灵活性，但主要目的不是直接重用已有代码。"},{"id":2,"text":"抽象","explanation":"错误。抽象关注的是提取类的共同特征和设计接口，侧重的是设计层面而非直接代码复用。"},{"id":3,"text":"封装","explanation":"错误。封装关注的是隐藏内部实现细节、保护数据安全，其主要目的是信息隐藏而非代码重用。"}],"answer":[0]},{"id":2,"description":"在C++中，虚函数的主要目的是什么？","explanation":"","choices":[{"id":0,"text":"实现运行时多态","explanation":"正确。虚函数的主要目的是实现运行时多态，使得通过基类指针或引用调用函数时，能根据对象的实际类型动态决定调用哪个版本。"},{"id":1,"text":"减少代码量","explanation":"错误。虚函数不一定会减少代码量，有时还需要增加虚函数表和<code class=\"inline-code\">virtual</code>关键字等额外代码。"},{"id":2,"text":"保证数据的安全性","explanation":"错误。保证数据安全性是封装的作用，通过<code class=\"inline-code\">private</code>/<code class=\"inline-code\">protected</code>等访问控制实现。"},{"id":3,"text":"提高代码的执行效率","explanation":"错误。虚函数实际上因为引入了虚函数表的间接寻址，会有轻微的性能开销，不会提高执行效率。"}],"answer":[0]},{"id":3,"description":"虚函数是如何实现动态绑定（或称为迟绑定）的？","explanation":"","choices":[{"id":0,"text":"通过在编译时确定函数地址","explanation":"错误。编译时确定函数地址是静态绑定的特征，动态绑定需要在运行时才确定函数地址。"},{"id":1,"text":"仅在静态类型为基类时使用","explanation":"错误。虚函数的动态绑定不仅在静态类型为基类时使用，关键是运行时根据实际对象类型查找虚函数表。"},{"id":2,"text":"通过在每个类中复制函数代码","explanation":"错误。虚函数不会在每个类中复制函数代码，而是通过虚函数表（vtable）存储函数指针来实现多态。"},{"id":3,"text":"通过在对象中添加指向虚函数表的指针","explanation":"正确。编译器为每个含虚函数的类生成虚函数表（vtable），对象中包含虚函数表指针（vptr），运行时通过vptr查表来确定调用哪个函数。"}],"answer":[3]},{"id":4,"description":"下列关于虚函数的描述，哪一项是错误的","explanation":"","choices":[{"id":0,"text":"虚函数可以在构造函数中被调用","explanation":"此说法正确（不是本题要选的答案）。虚函数可以在构造函数中被调用，但此时调用的是当前类版本而非派生类版本。"},{"id":1,"text":"虚函数可以是静态成员函数","explanation":"此说法错误，是本题正确答案。虚函数不能是静态成员函数，因为静态函数没有<code class=\"inline-code\">this</code>指针，无法通过虚函数表进行动态绑定。"},{"id":2,"text":"虚函数可以在纯虚类中声明","explanation":"此说法正确（不是本题要选的答案）。纯虚函数在抽象类中声明，以<code class=\"inline-code\">= 0</code>结尾。"},{"id":3,"text":"虚函数可以被覆盖（override）在派生类中","explanation":"此说法正确（不是本题要选的答案）。虚函数的核心机制就是在派生类中被覆盖（override）。"}],"answer":[1]},{"id":5,"description":"多态的含义是？","explanation":"","choices":[{"id":0,"text":"同一个接口，多种实现方式","explanation":"正确。多态的核心就是\"同一接口，多种实现\"，通过基类接口调用，实际执行的是具体派生类的实现。"},{"id":1,"text":"不同的接口，相同的实现","explanation":"错误。多态强调的是相同接口（而非不同接口）的不同实现方式。"},{"id":2,"text":"一种特定的编程技巧，提高代码复用","explanation":"错误。多态不仅仅是编程技巧，它是面向对象编程的基本特性之一，有系统的语言机制支持。"},{"id":3,"text":"一种数据结构，用于存储多种类型的数据","explanation":"错误。多态是一种编程机制而非数据结构，虽然某些数据结构可以存储多种类型的数据。"}],"answer":[0]},{"id":6,"description":"在C++中，函数重载是基于什么原则来区分不同版本的函数？","explanation":"","choices":[{"id":0,"text":"函数名相同且参数列表不同","explanation":"正确。函数重载要求函数名相同但参数列表不同（参数个数、类型或顺序），编译器根据调用时的实参来选择匹配版本。"},{"id":1,"text":"函数名不同但返回类型相同","explanation":"错误。函数重载要求函数名相同，而非函数名不同。函数名不同就是完全不同的函数。"},{"id":2,"text":"函数名相同且返回类型不同","explanation":"错误。C++不能仅依靠返回类型不同来区分重载函数，因为调用时可能不使用返回值，编译器无法据此选择。"},{"id":3,"text":"函数名和参数列表都不同","explanation":"错误。函数重载要求函数名相同，如果函数名和参数列表都不同，那就是完全不同的函数了。"}],"answer":[0]},{"id":7,"description":"以下哪些是实现运行时多态的方式？","explanation":"","choices":[{"id":0,"text":"函数重载","explanation":"错误。函数重载在编译时由编译器根据参数匹配决定调用版本，属于编译时多态（静态绑定），而非运行时多态。"},{"id":1,"text":"虚函数","explanation":"正确。虚函数是实现运行时多态的核心机制，通过虚函数表在运行时动态确定调用哪个函数版本。"},{"id":2,"text":"重写（Override）","explanation":"正确。重写（Override）是派生类重新定义基类虚函数的过程，配合虚函数机制实现运行时多态。"},{"id":3,"text":"模板函数","explanation":"错误。模板函数在编译时实例化为具体类型的函数版本，属于编译时多态（静态多态），而非运行时多态。"}],"answer":[1,2]},{"id":8,"description":"关于动态类型，以下哪个说法是正确的？","explanation":"","choices":[{"id":0,"text":"动态类型是在编译时确定的","explanation":"错误。动态类型是运行时对象的实际类型，在编译时确定的是静态类型。"},{"id":1,"text":"动态类型可以通过向下转型来改变","explanation":"错误。动态类型由对象的实际创建类型决定，转型操作不改变对象本身的动态类型。"},{"id":2,"text":"动态类型决定了实际调用哪个函数版本","explanation":"正确。对于虚函数调用，运行时根据对象的动态类型（实际类型）从虚函数表中查找并调用对应的函数版本。"},{"id":3,"text":"动态类型与静态类型总是相同的","explanation":"错误。当基类指针指向派生类对象时，静态类型是基类而动态类型是派生类，两者可以不同。"}],"answer":[2]},{"id":9,"description":"函数重载与函数覆盖（Override）的主要区别是什么？","explanation":"","choices":[{"id":0,"text":"重载仅限于非成员函数，覆盖则是成员函数特有的现象","explanation":"错误。重载既可以发生在同一类中，也可以发生在不同作用域中，不限于非成员函数。"},{"id":1,"text":"重载函数必须有相同的返回类型，覆盖则不必","explanation":"错误。重载函数的返回类型可以相同也可以不同，覆盖函数的返回类型通常相同（或满足协变返回）。"},{"id":2,"text":"覆盖函数必须有相同的函数签名，重载则不必","explanation":"正确。覆盖（Override）要求派生类函数与基类虚函数签名完全相同；而重载只要求函数名相同、参数列表不同即可。"},{"id":3,"text":"重载发生在不同文件中，覆盖必须在同一文件内进行","explanation":"错误。重载和覆盖都可以在同一文件内发生，区别不在于文件组织，而在于作用域和函数签名的要求。"}],"answer":[2]},{"id":10,"description":"以下哪种情况会导致编译错误？","explanation":"","choices":[{"id":0,"text":"派生类重写基类的虚函数","explanation":"错误。派生类正确重写基类虚函数是标准的多态用法，不会导致编译错误。"},{"id":1,"text":"基类定义纯虚函数但未实现","explanation":"错误。基类定义纯虚函数但不实现是合法的，此时基类成为抽象类，纯虚函数的实现在派生类中提供。"},{"id":2,"text":"实例化抽象类","explanation":"正确。抽象类（含有纯虚函数的类）不能被直接实例化，尝试创建抽象类的对象会导致编译错误。"},{"id":3,"text":"基类指针指向派生类对象","explanation":"错误。基类指针指向派生类对象是合法的多态用法（向上转型），不会导致编译错误。"}],"answer":[2]},{"id":11,"description":"在C++中，override关键字的作用是什么？","explanation":"","choices":[{"id":0,"text":"声明一个函数为虚函数","explanation":"错误。声明虚函数使用<code class=\"inline-code\">virtual</code>关键字，<code class=\"inline-code\">override</code>不用于声明虚函数。"},{"id":1,"text":"确保派生类函数正确重写基类虚函数","explanation":"正确。<code class=\"inline-code\">override</code>让编译器检查派生类函数是否正确匹配基类虚函数的签名，若不匹配则报编译错误，避免无意中创建新函数而非覆盖。"},{"id":2,"text":"阻止派生类重写虚函数","explanation":"错误。阻止派生类覆盖应使用<code class=\"inline-code\">final</code>关键字，而非<code class=\"inline-code\">override</code>。"},{"id":3,"text":"将函数标记为纯虚函数","explanation":"错误。标记纯虚函数使用<code class=\"inline-code\">= 0</code>语法（如<code class=\"inline-code\">virtual void f() = 0;</code>），而非<code class=\"inline-code\">override</code>。"}],"answer":[1]},{"id":12,"description":"以下代码中，哪个选项正确描述运行时行为？<br><br><pre class=\"code-block\"><code>class Base {\npublic:\n    virtual void func() { std::cout &lt;&lt; &quot;Base&quot;; }\n};\nclass Derived : public Base {\npublic:\n    void func() override { std::cout &lt;&lt; &quot;Derived&quot;; }\n};\nDerived d;\nBase b = d;\nb.func();</code></pre>","explanation":"","choices":[{"id":0,"text":"输出“Derived”","explanation":"错误。<code class=\"inline-code\">Base b = d;</code>发生了对象切片，<code class=\"inline-code\">b</code>是独立的<code class=\"inline-code\">Base</code>对象，调用<code class=\"inline-code\">func()</code>输出\"Base\"而非\"Derived\"。"},{"id":1,"text":"输出“Base”","explanation":"正确。<code class=\"inline-code\">Base b = d;</code>是值拷贝（对象切片），派生类部分被\"切掉\"，<code class=\"inline-code\">b</code>是纯粹的<code class=\"inline-code\">Base</code>类型对象，因此调用<code class=\"inline-code\">Base::func()</code>输出\"Base\"。"},{"id":2,"text":"编译错误","explanation":"错误。代码语法合法，<code class=\"inline-code\">Base</code>可以被<code class=\"inline-code\">Derived</code>对象拷贝构造，不会编译错误。"},{"id":3,"text":"运行时崩溃","explanation":"错误。程序行为完全确定，对象切片后<code class=\"inline-code\">b</code>是正常的<code class=\"inline-code\">Base</code>对象，不会导致运行时崩溃。"}],"answer":[1]},{"id":13,"description":"纯虚函数的定义中不能包含：","explanation":"","choices":[{"id":0,"text":"参数","explanation":"错误。纯虚函数可以有参数，例如<code class=\"inline-code\">virtual void f(int x) = 0;</code>是合法的。"},{"id":1,"text":"返回值","explanation":"错误。纯虚函数可以有返回值类型，例如<code class=\"inline-code\">virtual int f() = 0;</code>是合法的。"},{"id":2,"text":"函数体","explanation":"正确。纯虚函数以<code class=\"inline-code\">= 0</code>结尾，没有函数体（不提供实现），包含纯虚函数的类是抽象类。"},{"id":3,"text":"修饰符virtual","explanation":"错误。纯虚函数必须用<code class=\"inline-code\">virtual</code>关键字修饰，否则就不是虚函数更不是纯虚函数了。"}],"answer":[2]},{"id":14,"description":"以下哪个函数声明表明“该函数为最终覆盖，禁止后续派生类再次覆盖”？","explanation":"","choices":[{"id":0,"text":"virtual void f() final;","explanation":"正确。<code class=\"inline-code\">final</code>关键字放在函数声明末尾，表示该虚函数是最终覆盖版本，禁止派生类进一步覆盖。"},{"id":1,"text":"virtual void f();","explanation":"错误。这只是普通的虚函数声明，派生类仍然可以覆盖该函数。"},{"id":2,"text":"virtual void f() override;","explanation":"错误。<code class=\"inline-code\">override</code>表示当前函数覆盖基类虚函数，但不禁止更深层的派生类继续覆盖。"},{"id":3,"text":"virtual void f() const;","explanation":"错误。<code class=\"inline-code\">const</code>表示该函数不修改成员变量，与是否允许派生类覆盖无关。"}],"answer":[0]},{"id":15,"description":"下列代码输出结果为？<br><br><pre class=\"code-block\"><code>class Base {\npublic:\n    virtual void print() { std::cout &lt;&lt; &quot;Base\\n&quot;; }\n};\nclass Derived : public Base {\npublic:\n    void print() { std::cout &lt;&lt; &quot;Derived\\n&quot;; }\n};\nvoid call(Base&amp; b) {\n    b.print();\n}\nint main() {\n    Derived d;\n    call(d);\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"输出 &quot;Derived&quot;","explanation":"正确。<code class=\"inline-code\">print()</code>是虚函数，通过基类引用<code class=\"inline-code\">b</code>调用时发生动态绑定，实际对象是<code class=\"inline-code\">Derived</code>类型，因此输出\"Derived\"。"},{"id":1,"text":"输出 &quot;Base&quot;","explanation":"错误。虽然<code class=\"inline-code\">b</code>的静态类型是<code class=\"inline-code\">Base&amp;</code>，但由于<code class=\"inline-code\">print()</code>是虚函数，运行时会根据实际对象类型调用派生类版本。"},{"id":2,"text":"编译错误","explanation":"错误。代码语法正确，基类引用可以绑定到派生类对象，虚函数机制正常工作，不会编译错误。"},{"id":3,"text":"输出未定义","explanation":"错误。虚函数的动态绑定行为是确定的，调用<code class=\"inline-code\">Derived::print()</code>输出\"Derived\"，不存在未定义行为。"}],"answer":[0]},{"id":16,"description":"C++中实现运行时多态必须满足哪两个条件？","explanation":"","choices":[{"id":0,"text":"成员函数为virtual + 通过对象访问","explanation":"错误。通过对象（而非指针或引用）访问时，会发生对象切片，即使函数是<code class=\"inline-code\">virtual</code>的也无法实现动态绑定。"},{"id":1,"text":"函数名相同 + 类名不同","explanation":"错误。函数名相同且类名不同并不足以实现运行时多态，还需要虚函数和指针/引用机制。"},{"id":2,"text":"返回值类型相同 + 参数个数不同","explanation":"错误。返回值类型和参数个数与运行时多态的条件无关。"},{"id":3,"text":"成员函数为virtual + 通过指针或引用访问","explanation":"正确。实现运行时多态需要两个条件：(1) 函数声明为<code class=\"inline-code\">virtual</code>；(2) 通过基类指针或引用调用，这样才能触发动态绑定。"}],"answer":[3]},{"id":17,"description":"以下哪个概念允许你在C++中重用已编写的代码？","explanation":"","choices":[{"id":0,"text":"继承","explanation":"正确。继承允许派生类直接复用基类的代码（成员变量和函数），是C++中实现代码重用的核心机制。"},{"id":1,"text":"多态","explanation":"错误。多态使同一接口有不同实现，侧重于行为的灵活性和可扩展性，而非直接重用已有代码。"},{"id":2,"text":"抽象","explanation":"错误。抽象是提取共同特征进行接口设计的过程，不直接实现代码重用。"},{"id":3,"text":"封装","explanation":"错误。封装通过访问控制保护数据，关注的是信息隐藏和数据安全，而非代码复用。"}],"answer":[0]},{"id":18,"description":"下列关于动态绑定的说法正确的是？","explanation":"","choices":[{"id":0,"text":"使用基类指针或引用调用虚函数时才会发生动态绑定","explanation":"正确。动态绑定只在通过基类指针或引用调用虚函数时发生，直接通过对象调用或调用非虚函数都是静态绑定。"},{"id":1,"text":"非虚函数在运行时进行动态绑定","explanation":"错误。非虚函数在编译时就确定了调用地址（静态绑定），不会在运行时进行动态绑定。"},{"id":2,"text":"虚函数必须被 override 才会动态绑定","explanation":"错误。虚函数只要被继承就会参与动态绑定，<code class=\"inline-code\">override</code>只是帮助编译器检查正确性的关键字。"},{"id":3,"text":"所有函数默认都是动态绑定的","explanation":"错误。C++中只有<code class=\"inline-code\">virtual</code>函数才支持动态绑定，普通函数默认是静态绑定的。"}],"answer":[0]},{"id":19,"description":"关于多态，说法不正确的是（ ）","explanation":"","choices":[{"id":0,"text":"C++语言的多态性分为编译时的多态性和运行时的多态性","explanation":"此说法正确。C++多态确实分为编译时多态（如函数重载、模板）和运行时多态（如虚函数）。"},{"id":1,"text":"编译时的多态性可通过函数重载实现","explanation":"此说法正确。函数重载在编译时根据参数确定调用版本，属于编译时多态。"},{"id":2,"text":"运行时的多态性可通过模板和虚函数实现","explanation":"此说法错误，是本题答案。运行时多态通过虚函数实现，模板实现的是编译时多态（静态多态），而非运行时多态。"},{"id":3,"text":"实现运行时多态性的机制称为动态绑定","explanation":"此说法正确。动态绑定就是运行时根据对象实际类型确定函数调用版本的机制，是实现运行时多态的核心。"}],"answer":[2]}]},"13":{"title":"25程设Ⅱ-周13-理论题","questions":[{"id":0,"description":"# 问题<br>在 C++ 中，面向对象程序设计中的“多态”主要指的是：","explanation":"出题人太懒，什么都没解释","choices":[{"id":0,"text":"一个类只能生成一种固定类型的对象","explanation":"错误。一个类只生成固定类型对象描述的是非多态的情况，多态强调的是同一接口表现出不同行为。"},{"id":1,"text":"同一个操作或接口在不同对象上可以表现出不同的行为","explanation":"正确。多态是指同一个操作或接口在不同对象上可以表现出不同的行为，例如基类指针调用虚函数时实际执行派生类的版本。"},{"id":2,"text":"一个函数只能被调用一次","explanation":"错误。函数可以被多次调用，这与多态无关。多态是关于行为的多样性，而非调用次数。"},{"id":3,"text":"所有类都必须拥有完全相同的数据成员","explanation":"错误。不同类可以有完全不同的数据成员，多态不要求所有类具有相同的数据成员。"}],"answer":[1]},{"id":1,"description":"# 问题<br>下列关于 C++ 多态的说法，正确的是：","explanation":"出题人太懒，什么都没解释","choices":[{"id":0,"text":"函数重载属于运行时多态","explanation":"错误。函数重载在编译时确定调用版本，属于编译时多态（静态多态），而非运行时多态。"},{"id":1,"text":"虚函数机制主要用于实现运行时多态","explanation":"正确。虚函数通过虚函数表（vtable）机制，在运行时根据对象的实际类型动态决定调用哪个函数版本，是实现运行时多态的核心。"},{"id":2,"text":"多态只能通过模板实现","explanation":"错误。多态可以通过虚函数、模板、函数重载等多种方式实现，不仅仅局限于模板。"},{"id":3,"text":"只要两个函数名称相同，就一定发生运行时多态","explanation":"错误。两个函数名称相同不一定是运行时多态，例如同一作用域中的同名函数可能是编译时的函数重载。"}],"answer":[1]},{"id":2,"description":"# 问题<br>在 C++ 中，将基类成员函数声明为 <code class=\"inline-code\">virtual</code> 的主要意义是：","explanation":"出题人太懒，什么都没解释","choices":[{"id":0,"text":"使该函数只能在基类对象中调用","explanation":"错误。<code class=\"inline-code\">virtual</code>函数不仅可以在基类对象中调用，更关键的是可以通过基类指针或引用在派生类对象上调用。"},{"id":1,"text":"使该函数在编译时一定绑定到基类版本","explanation":"错误。声明为<code class=\"inline-code\">virtual</code>恰恰是为了不在编译时固定绑定到基类版本，而是延迟到运行时动态决定。"},{"id":2,"text":"允许通过基类指针或引用调用时，根据实际对象类型选择函数版本","explanation":"正确。声明<code class=\"inline-code\">virtual</code>后，通过基类指针或引用调用该函数时，编译器会生成动态绑定代码，根据对象实际类型选择正确的函数版本。"},{"id":3,"text":"使派生类不能重新定义该函数","explanation":"错误。<code class=\"inline-code\">virtual</code>的作用恰恰相反，它允许派生类重新定义（覆盖）该函数以实现多态行为。"}],"answer":[2]},{"id":3,"description":"# 问题<br>下列哪种情况最能体现 C++ 的运行时多态？","explanation":"出题人太懒，什么都没解释","choices":[{"id":0,"text":"同一个类中定义多个同名但参数不同的函数","explanation":"错误。同一类中多个同名不同参数的函数是函数重载，在编译时确定调用版本，属于编译时多态。"},{"id":1,"text":"通过基类指针调用虚函数，实际执行派生类中重写的版本","explanation":"正确。基类指针调用虚函数时，运行时根据指针实际指向的对象类型（派生类）执行派生类的重写版本，这是运行时多态的典型场景。"},{"id":2,"text":"使用 <code class=\"inline-code\">int</code>、<code class=\"inline-code\">double</code> 等不同类型变量进行算术运算","explanation":"错误。使用不同类型变量进行算术运算是运算符重载或类型转换，属于编译时多态。"},{"id":3,"text":"在类中定义私有成员变量，限制外部访问","explanation":"错误。定义私有成员变量限制访问属于封装特性，与多态无关。"}],"answer":[1]},{"id":4,"description":"# 问题<br>关于函数重载与运行时多态的关系，下列说法正确的是：","explanation":"出题人太懒，什么都没解释","choices":[{"id":0,"text":"函数重载依靠虚函数表实现","explanation":"错误。函数重载依靠参数列表的不同在编译时区分，虚函数表（vtable）是运行时多态的机制，与重载无关。"},{"id":1,"text":"函数重载通常在编译阶段确定调用哪个函数","explanation":"正确。函数重载在编译阶段由编译器根据实参类型和个数确定调用哪个版本，属于静态绑定（编译时多态）。"},{"id":2,"text":"函数重载必须发生在基类和派生类之间","explanation":"错误。函数重载通常发生在同一作用域中，不要求发生在基类和派生类之间。"},{"id":3,"text":"函数重载要求函数的返回值类型必须不同","explanation":"错误。函数重载依靠参数列表不同来区分，返回值类型不同不能构成重载。"}],"answer":[1]},{"id":5,"description":"# 问题<br>在 C++ 中，若希望通过基类指针调用函数时能够执行派生类中重写的版本，基类中的该函数通常应声明为：","explanation":"出题人太懒，什么都没解释","choices":[{"id":0,"text":"static","explanation":"错误。<code class=\"inline-code\">static</code>成员函数属于类而非对象，不支持动态绑定，无法根据对象类型选择不同版本。"},{"id":1,"text":"virtual","explanation":"正确。将函数声明为<code class=\"inline-code\">virtual</code>后，通过基类指针调用时会在运行时查找虚函数表，根据对象实际类型调用派生类的重写版本。"},{"id":2,"text":"const","explanation":"错误。<code class=\"inline-code\">const</code>修饰函数不修改成员变量，与多态和动态绑定无关。"},{"id":3,"text":"friend","explanation":"错误。<code class=\"inline-code\">friend</code>是友元声明，用于授予非成员函数访问私有成员的权限，与多态机制无关。"}],"answer":[1]},{"id":6,"description":"# 问题<br>下列关于虚函数的说法，正确的是：","explanation":"出题人太懒，什么都没解释","choices":[{"id":0,"text":"虚函数只能在派生类中声明，不能在基类中声明","explanation":"错误。虚函数通常在基类中声明<code class=\"inline-code\">virtual</code>关键字，派生类中的覆盖函数自动继承虚特性。"},{"id":1,"text":"虚函数的调用一定在编译时确定","explanation":"错误。虚函数调用的特点是运行时动态确定（动态绑定），而非编译时确定。编译时确定的是非虚函数。"},{"id":2,"text":"虚函数可以使基类指针或引用调用函数时发生动态绑定","explanation":"正确。虚函数使基类指针或引用调用函数时发生动态绑定，运行时根据对象的实际类型从虚函数表中查找并调用正确的函数版本。"},{"id":3,"text":"虚函数必须是静态成员函数","explanation":"错误。虚函数不能是静态成员函数，因为静态函数没有<code class=\"inline-code\">this</code>指针，无法通过虚函数表实现动态绑定。"}],"answer":[2]},{"id":7,"description":"# 问题<br><br>下列代码的输出结果是：<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass Base {\npublic:\n    virtual void show() {\n        cout &lt;&lt; &quot;Base&quot;;\n    }\n};\n\nclass Derived : public Base {\npublic:\n    void show() {\n        cout &lt;&lt; &quot;Derived&quot;;\n    }\n};\n\nint main() {\n    Derived d;\n    Base* p = &amp;d;\n    p-&gt;show();\n    return 0;\n}</code></pre>","explanation":"出题人太懒，什么都没解释","choices":[{"id":0,"text":"Base","explanation":"错误。<code class=\"inline-code\">show()</code>是虚函数，通过基类指针调用时会动态绑定到实际对象（<code class=\"inline-code\">Derived</code>）的版本，输出\"Derived\"而非\"Base\"。"},{"id":1,"text":"Derived","explanation":"正确。<code class=\"inline-code\">show()</code>在<code class=\"inline-code\">Base</code>中声明为<code class=\"inline-code\">virtual</code>，<code class=\"inline-code\">p</code>指向<code class=\"inline-code\">Derived</code>对象，运行时动态绑定调用<code class=\"inline-code\">Derived::show()</code>，输出\"Derived\"。"},{"id":2,"text":"BaseDerived","explanation":"错误。<code class=\"inline-code\">show()</code>函数中只输出一段文字，没有连续调用基类和派生类两个版本，不会输出\"BaseDerived\"。"},{"id":3,"text":"编译错误","explanation":"错误。代码语法正确，基类指针指向派生类对象是标准多态用法，虚函数机制正常工作，不会编译错误。"}],"answer":[1]},{"id":8,"description":"# 问题<br><br>下列代码的输出结果是：<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass Base {\npublic:\n    void show() {\n        cout &lt;&lt; &quot;Base&quot;;\n    }\n};\n\nclass Derived : public Base {\npublic:\n    void show() {\n        cout &lt;&lt; &quot;Derived&quot;;\n    }\n};\n\nint main() {\n    Derived d;\n    Base* p = &amp;d;\n    p-&gt;show();\n    return 0;\n}</code></pre>","explanation":"出题人太懒，什么都没解释","choices":[{"id":0,"text":"Base","explanation":"正确。<code class=\"inline-code\">show()</code>不是虚函数（没有<code class=\"inline-code\">virtual</code>），通过基类指针调用时进行静态绑定，编译时就确定调用<code class=\"inline-code\">Base::show()</code>，输出\"Base\"。"},{"id":1,"text":"Derived","explanation":"错误。由于<code class=\"inline-code\">show()</code>没有声明为<code class=\"inline-code\">virtual</code>，不会发生动态绑定，即使指针指向<code class=\"inline-code\">Derived</code>对象也不会调用派生类版本。"},{"id":2,"text":"BaseDerived","explanation":"错误。非虚函数只调用一个版本（由指针静态类型决定），不会同时调用基类和派生类的版本。"},{"id":3,"text":"编译错误","explanation":"错误。代码语法完全合法，基类指针可以指向派生类对象，只是调用的是基类的非虚函数版本。"}],"answer":[0]},{"id":9,"description":"# 问题<br>在 C++ 中，使用基类指针或引用调用虚函数时，实际调用哪个函数版本主要取决于：","explanation":"出题人太懒，什么都没解释","choices":[{"id":0,"text":"指针或引用变量的名称","explanation":"错误。变量名称只是标识符，不影响运行时调用哪个函数版本。"},{"id":1,"text":"指针或引用的静态类型","explanation":"错误。静态类型决定的是非虚函数的调用版本。对于虚函数，运行时根据动态类型（而非静态类型）来决定调用版本。"},{"id":2,"text":"指针或引用所绑定对象的实际类型","explanation":"正确。虚函数的动态绑定机制使得函数调用版本取决于指针或引用所绑定对象的实际运行时类型，而非指针/引用本身的声明类型。"},{"id":3,"text":"函数在源文件中的书写顺序","explanation":"错误。函数的书写顺序不影响虚函数的调用选择，虚函数通过虚函数表（vtable）在运行时查找确定。"}],"answer":[2]},{"id":10,"description":"# 问题<br>下列关于函数重载的说法，正确的是：","explanation":"出题人太懒，什么都没解释","choices":[{"id":0,"text":"函数重载要求函数名不同，但参数列表相同","explanation":"错误。函数重载要求函数名相同而非不同，且要求参数列表不同而非相同。"},{"id":1,"text":"函数重载要求函数名相同，但参数列表不同","explanation":"正确。函数重载要求在同一作用域中函数名相同，但参数列表（参数个数、类型或顺序）不同，编译器据此区分不同版本。"},{"id":2,"text":"函数重载只能发生在基类和派生类之间","explanation":"错误。函数重载通常发生在同一作用域中（如同一类中），基类和派生类之间的同名函数属于覆盖或隐藏关系。"},{"id":3,"text":"函数重载必须依靠 virtual 关键字实现","explanation":"错误。函数重载是编译时多态，依靠参数列表区分，不需要也不使用<code class=\"inline-code\">virtual</code>关键字。"}],"answer":[1]},{"id":11,"description":"# 问题<br>下列哪一组函数声明可以构成函数重载？","explanation":"出题人太懒，什么都没解释","choices":[{"id":0,"text":"<code class=\"inline-code\">void fun(int x);</code> 和 <code class=\"inline-code\">int fun(int x);</code>","explanation":"错误。仅返回类型不同（<code class=\"inline-code\">void</code> vs <code class=\"inline-code\">int</code>）而参数列表相同不能构成重载，C++不根据返回类型区分重载函数。"},{"id":1,"text":"<code class=\"inline-code\">void fun(int x);</code> 和 <code class=\"inline-code\">void fun(double x);</code>","explanation":"正确。函数名相同且参数类型不同（<code class=\"inline-code\">int</code> vs <code class=\"inline-code\">double</code>），满足函数重载的条件。"},{"id":2,"text":"<code class=\"inline-code\">void fun(int x);</code> 和 <code class=\"inline-code\">void fun(int y);</code>","explanation":"错误。参数名不同（<code class=\"inline-code\">x</code> vs <code class=\"inline-code\">y</code>）不影响函数签名，两个函数签名完全相同，会导致重复定义错误。"},{"id":3,"text":"<code class=\"inline-code\">int fun();</code> 和 <code class=\"inline-code\">int fun();</code>","explanation":"错误。两个声明完全相同（函数名、参数列表、返回类型都一样），属于重复声明而非重载。"}],"answer":[1]},{"id":12,"description":"# 问题<br>关于函数重载和函数覆盖，下列说法正确的是：","explanation":"出题人太懒，什么都没解释","choices":[{"id":0,"text":"函数重载通常发生在同一作用域中，函数覆盖通常发生在基类和派生类之间","explanation":"正确。函数重载发生在同一作用域中（同名不同参数），函数覆盖（Override）发生在基类和派生类之间（派生类重写基类虚函数，签名相同）。"},{"id":1,"text":"函数重载必须使用 virtual 关键字，函数覆盖不需要使用 virtual 关键字","explanation":"错误。函数重载不需要<code class=\"inline-code\">virtual</code>关键字；函数覆盖才要求基类函数是<code class=\"inline-code\">virtual</code>的。"},{"id":2,"text":"函数覆盖要求函数名相同即可，参数列表可以不同","explanation":"错误。函数覆盖（Override）要求函数名和参数列表都相同（签名一致），参数列表不同则不构成覆盖。"},{"id":3,"text":"函数重载属于运行时多态，函数覆盖属于编译时多态","explanation":"错误。说法恰好相反：函数重载属于编译时多态，函数覆盖配合虚函数属于运行时多态。"}],"answer":[0]},{"id":13,"description":"# 问题<br>如果派生类中定义了一个与基类虚函数同名，但参数列表不同的成员函数，下列说法正确的是：","explanation":"出题人太懒，什么都没解释","choices":[{"id":0,"text":"该函数一定正确覆盖了基类虚函数","explanation":"错误。覆盖（Override）要求函数名和参数列表都完全相同，参数列表不同则不构成覆盖。"},{"id":1,"text":"该函数不会覆盖基类中参数列表不同的虚函数","explanation":"正确。派生类中同名但参数列表不同的函数不会覆盖基类虚函数，而是隐藏（hide）了基类的同名函数，基类指针调用时仍使用基类版本。"},{"id":2,"text":"该函数会使基类虚函数自动变成非虚函数","explanation":"错误。派生类中参数不同的同名函数不会影响基类虚函数的虚特性，虚函数属性在基类中已确定。"},{"id":3,"text":"该函数一定会导致程序运行时错误","explanation":"错误。这种情况不会导致运行时错误，只是派生类的函数隐藏了基类版本，通过基类指针仍可正常调用基类虚函数。"}],"answer":[1]},{"id":14,"description":"# 问题<br><br>下列代码的输出结果是：<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass Base {\npublic:\n    virtual void print() {\n        cout &lt;&lt; &quot;Base&quot;;\n    }\n};\n\nclass Derived : public Base {\npublic:\n    void print() {\n        cout &lt;&lt; &quot;Derived&quot;;\n    }\n};\n\nint main() {\n    Derived d;\n    Base&amp; r = d;\n    r.print();\n    return 0;\n}</code></pre>","explanation":"出题人太懒，什么都没解释","choices":[{"id":0,"text":"Base","explanation":"错误。<code class=\"inline-code\">print()</code>是虚函数，通过基类引用<code class=\"inline-code\">r</code>调用时发生动态绑定，实际对象是<code class=\"inline-code\">Derived</code>，输出\"Derived\"。"},{"id":1,"text":"Derived","explanation":"正确。<code class=\"inline-code\">print()</code>声明为<code class=\"inline-code\">virtual</code>，引用<code class=\"inline-code\">r</code>绑定到<code class=\"inline-code\">Derived</code>对象，运行时动态绑定调用<code class=\"inline-code\">Derived::print()</code>，输出\"Derived\"。"},{"id":2,"text":"BaseDerived","explanation":"错误。只调用了<code class=\"inline-code\">r.print()</code>一次，不会同时输出基类和派生类的内容。"},{"id":3,"text":"编译错误","explanation":"错误。代码语法正确，基类引用绑定派生类对象并调用虚函数是标准的多态用法，不会编译错误。"}],"answer":[1]},{"id":15,"description":"# 问题<br><br>下列代码的输出结果是：<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass Base {\npublic:\n    virtual void show() {\n        cout &lt;&lt; &quot;Base&quot;;\n    }\n};\n\nclass Derived : public Base {\npublic:\n    void show() {\n        cout &lt;&lt; &quot;Derived&quot;;\n    }\n};\n\nint main() {\n    Derived d;\n    Base b = d;\n    b.show();\n    return 0;\n}</code></pre>","explanation":"出题人太懒，什么都没解释","choices":[{"id":0,"text":"Base","explanation":"正确。<code class=\"inline-code\">Base b = d;</code>是对象切片（值拷贝），<code class=\"inline-code\">b</code>成为纯粹的<code class=\"inline-code\">Base</code>对象，即使<code class=\"inline-code\">show()</code>是虚函数，调用时也只执行<code class=\"inline-code\">Base::show()</code>，输出\"Base\"。"},{"id":1,"text":"Derived","explanation":"错误。由于发生了对象切片，<code class=\"inline-code\">b</code>的动态类型已经是<code class=\"inline-code\">Base</code>，不再是<code class=\"inline-code\">Derived</code>，因此不会输出\"Derived\"。"},{"id":2,"text":"BaseDerived","explanation":"错误。只调用了一次<code class=\"inline-code\">show()</code>函数，且对象切片后<code class=\"inline-code\">b</code>只有<code class=\"inline-code\">Base</code>部分，不会输出\"BaseDerived\"。"},{"id":3,"text":"编译错误","explanation":"错误。代码语法正确，基类可以通过派生类对象进行拷贝构造（对象切片），不会编译错误。"}],"answer":[0]},{"id":16,"description":"# 问题<br><br>下面代码中，<code class=\"inline-code\">Base b = d;</code> 体现的现象是：<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass Base {\npublic:\n    virtual void show() {\n        cout &lt;&lt; &quot;Base&quot;;\n    }\n};\n\nclass Derived : public Base {\npublic:\n    void show() {\n        cout &lt;&lt; &quot;Derived&quot;;\n    }\n};\n\nint main() {\n    Derived d;\n    Base b = d;\n    b.show();\n    return 0;\n}</code></pre>","explanation":"出题人太懒，什么都没解释","choices":[{"id":0,"text":"动态绑定","explanation":"错误。动态绑定发生在通过指针或引用调用虚函数时，此处<code class=\"inline-code\">b</code>是值拷贝，不发生动态绑定。"},{"id":1,"text":"对象切片","explanation":"正确。<code class=\"inline-code\">Base b = d;</code>将派生类对象赋值给基类变量时，派生类特有的部分被\"切掉\"，只保留基类部分，这就是对象切片（Object Slicing）现象。"},{"id":2,"text":"函数重载","explanation":"错误。函数重载是指同一作用域中同名函数有不同参数列表，与对象赋值无关。"},{"id":3,"text":"向下转型","explanation":"错误。向下转型（Downcasting）是将基类指针/引用转换为派生类指针/引用，此处是基类接收派生类对象（向上方向）。"}],"answer":[1]},{"id":17,"description":"# 问题<br>下列关于静态类型和动态类型的说法，正确的是：","explanation":"出题人太懒，什么都没解释","choices":[{"id":0,"text":"静态类型由变量声明决定，动态类型由对象实际所属类型决定","explanation":"正确。静态类型在变量声明时确定（如<code class=\"inline-code\">Base* p</code>中<code class=\"inline-code\">p</code>的静态类型是<code class=\"inline-code\">Base*</code>），动态类型在运行时由指针/引用实际指向的对象决定。"},{"id":1,"tex
