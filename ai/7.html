<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>程序设计II · 理论题复习</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}

/* Header */
.header{background:linear-gradient(135deg,#1e3a5f 0%,#2d6a9f 100%);color:#fff;padding:0 24px;height:64px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header-logo{font-size:28px}
.header-title h1{font-size:18px;font-weight:700;letter-spacing:.5px}
.header-title p{font-size:12px;opacity:.8;margin-top:2px}
.header-right{margin-left:auto;background:rgba(255,255,255,.15);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600}


/* Layout */
.layout{display:flex;min-height:calc(100vh - 64px)}

/* Sidebar */
.sidebar{width:220px;background:#fff;border-right:1px solid #e8ecf0;padding:16px 0;flex-shrink:0;overflow-y:auto;position:sticky;top:64px;height:calc(100vh - 64px)}
.sidebar-section{padding:0 16px 8px;font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.8px;margin-top:8px}
.week-btn{display:flex;align-items:center;width:100%;padding:10px 20px;border:none;background:transparent;cursor:pointer;font-size:14px;color:#555;text-align:left;transition:all .15s;gap:10px;border-left:3px solid transparent}
.week-btn:hover{background:#f5f8ff;color:#1e3a5f}
.week-btn.active{background:#e8f0fe;color:#1a73e8;font-weight:600;border-left-color:#1a73e8}
.week-btn .wlabel{flex:1}
.week-btn .wcnt{font-size:11px;color:#aaa;background:#f5f5f5;border-radius:10px;padding:1px 7px}
.week-btn.active .wcnt{background:#c5d8fb;color:#1a73e8}

/* Exam/Random quick buttons in sidebar */
.sidebar-special{padding:12px 16px;border-top:1px solid #eee;margin-top:8px}
.spec-btn{width:100%;padding:10px 16px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;margin-bottom:8px;transition:all .15s;display:flex;align-items:center;gap:8px}
.spec-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.spec-btn.exam{background:linear-gradient(135deg,#ff6b35,#ff8c42);color:#fff}
.spec-btn.shuffle{background:linear-gradient(135deg,#6c5ce7,#8b7cf8);color:#fff}

/* Main content */
.main{flex:1;padding:24px 32px;max-width:1100px;margin:0 auto}
.top-bar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.top-bar h2{font-size:20px;font-weight:700;color:#1a1a2e;flex:1;min-width:200px}
.mode-btns{display:flex;gap:8px}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.btn-review{background:#e8f5e9;color:#2e7d32}
.btn-review.active{background:#2e7d32;color:#fff}
.btn-exam{background:#fff3e0;color:#e65100}
.btn-exam.active{background:#e65100;color:#fff}
.btn-submit{background:linear-gradient(135deg,#1a73e8,#4285f4);color:#fff;padding:9px 20px}
.btn-reset{background:#fce4ec;color:#c62828}
.btn-shuffle{background:#ede7f6;color:#5e35b1}
.btn-shuffle.active{background:#5e35b1;color:#fff}

/* Progress */
.prog-wrap{background:#fff;border-radius:10px;padding:12px 16px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.prog-head{display:flex;justify-content:space-between;font-size:13px;color:#666;margin-bottom:6px}
.prog-bar{height:8px;background:#e8ecf0;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#1a73e8,#34a853);border-radius:4px;transition:width .3s}

/* Mode bar */
.mode-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:16px}
.mode-bar.review{background:#e8f5e9;color:#2e7d32}
.mode-bar.exam{background:#fff3e0;color:#e65100}
.mode-dot{width:8px;height:8px;border-radius:50%}
.mode-bar.review .mode-dot{background:#2e7d32}
.mode-bar.exam .mode-dot{background:#e65100}

/* Welcome */
.welcome{background:#fff;border-radius:16px;padding:48px 32px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.welcome .w-icon{font-size:56px;margin-bottom:16px}
.welcome h3{font-size:22px;font-weight:700;color:#1a1a2e;margin-bottom:12px}
.welcome p{font-size:14px;color:#888;line-height:1.8}
.welcome strong{color:#1a73e8}

/* Question card */
.qcard{background:#fff;border-radius:12px;padding:20px 24px;margin-bottom:16px;box-shadow:0 1px 6px rgba(0,0,0,.06);border:1px solid transparent;transition:border-color .15s}
.qcard.answered{border-color:#1a73e8}
.qcard.card-correct{border-color:#34a853;background:#f8fff9}
.qcard.card-wrong{border-color:#ea4335;background:#fff9f8}
.qnum{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.qdesc{font-size:15px;line-height:1.75;color:#1a1a2e;margin-bottom:16px}
.qdesc code.inline-code{background:#f3f4f6;padding:2px 6px;border-radius:4px;font-family:'Fira Code','Consolas','Courier New',monospace;font-size:.9em;color:#d63369}
.qdesc pre.code-block{background:#1e1e2e;border-radius:8px;padding:14px 16px;margin:10px 0;overflow-x:auto}
.qdesc pre.code-block code{font-family:'Fira Code','Consolas','Courier New',monospace;font-size:13px;color:#cdd6f4;line-height:1.6}
.choices{display:flex;flex-direction:column;gap:8px}
.multi-confirm{display:none;margin-top:10px;padding:8px 22px;border-radius:8px;border:none;background:linear-gradient(135deg,#1a73e8,#4285f4);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.multi-confirm:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,115,232,.35)}
.multi-confirm:disabled{background:#bbb;cursor:default;transform:none;box-shadow:none}
.multi-confirm.visible{display:inline-block}
.choice-item{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border-radius:8px;border:1.5px solid #e0e3e8;cursor:pointer;transition:all .15s;background:#fff}
.choice-item:hover{border-color:#1a73e8;background:#f0f6ff}
.choice-item.selected{border-color:#1a73e8;background:#e8f0fe}
.choice-item.c-correct{border-color:#34a853 !important;background:#e6f9ec !important}
.choice-item.c-wrong{border-color:#ea4335 !important;background:#fce8e6 !important}
.choice-lbl{width:24px;height:24px;min-width:24px;border-radius:50%;background:#f0f2f5;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#666;transition:all .15s}
.choice-item.selected .choice-lbl{background:#1a73e8;color:#fff}
.choice-item.c-correct .choice-lbl{background:#34a853;color:#fff}
.choice-item.c-wrong .choice-lbl{background:#ea4335;color:#fff}
.choice-txt{font-size:14px;line-height:1.6;color:#333;flex:1}
.choice-txt code.inline-code{background:#f3f4f6;padding:2px 5px;border-radius:3px;font-family:'Fira Code','Consolas',monospace;font-size:.85em;color:#d63369}
.choice-txt pre.code-block{background:#1e1e2e;border-radius:6px;padding:10px 12px;margin:6px 0;overflow-x:auto;display:inline-block;width:100%}
.choice-txt pre.code-block code{font-family:'Fira Code','Consolas',monospace;font-size:12px;color:#cdd6f4}

/* Answer reveal */
.ans-reveal{margin-top:14px;padding:14px 16px;border-radius:10px;background:#f8faff;border:1px solid #d4e3fc;display:none}
.choice-explanations{margin-top:12px;padding-top:12px;border-top:1px dashed #c5d8fb}
.ce-title{font-size:13px;font-weight:700;color:#1a73e8;margin-bottom:10px}
.choice-exp{margin-bottom:10px;padding:10px 12px;border-radius:8px;background:#fff;border:1px solid #e8ecf0}
.choice-exp.ce-correct{background:#f0fdf4;border-color:#86efac}
.choice-exp.ce-wrong{background:#fef2f2;border-color:#fca5a5}
.choice-exp.ce-normal{background:#fafafa;border-color:#e5e7eb}
.ce-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ce-icon{font-size:14px}
.ce-label{font-size:13px;font-weight:600;color:#374151}
.ce-text{font-size:12.5px;color:#6b7280;line-height:1.6;padding-left:26px}
.ans-label{font-size:14px;font-weight:700;margin-bottom:8px}
.ans-label.wrong{color:#dc2626}
.expl{font-size:13px;color:#4b5563;line-height:1.7}
.qcard{background:#fff;border-radius:12px;padding:20px 24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);transition:box-shadow .2s}
.qcard:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.qnum{font-size:15px;font-weight:700;color:#1f2937;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #f3f4f6}
.qdesc{font-size:14px;color:#374151;line-height:1.8;margin-bottom:14px}
.choice-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:8px;border:1px solid #e5e7eb;margin-bottom:8px;cursor:pointer;transition:all .15s;background:#fff}
.choice-item:hover{border-color:#93c5fd;background:#f0f7ff}
.choice-item.selected{border-color:#3b82f6;background:#eff6ff}
.choice-item.c-correct{border-color:#22c55e;background:#f0fdf4}
.choice-item.c-wrong{border-color:#ef4444;background:#fef2f2}
.choice-lbl{width:28px;height:28px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#6b7280;flex-shrink:0}
.choice-item.selected .choice-lbl{background:#3b82f6;color:#fff}
.choice-item.c-correct .choice-lbl{background:#22c55e;color:#fff}
.choice-item.c-wrong .choice-lbl{background:#ef4444;color:#fff}
.choice-txt{flex:1;font-size:14px;color:#374151;line-height:1.7;padding-top:3px}
.ans-reveal.show{display:block}
.ans-label{font-size:13px;font-weight:700;color:#1a73e8;margin-bottom:4px}
.ans-label.wrong{color:#ea4335}
.expl{font-size:13px;color:#555;line-height:1.6;margin-top:6px}
.qstatus{font-size:12px;font-weight:600;margin-top:8px}

/* Modal */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:20px;padding:32px;width:90%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h2{font-size:20px;font-weight:700;text-align:center;margin-bottom:6px}
.modal .sub{font-size:13px;color:#888;text-align:center;margin-bottom:24px}
.score-circle{width:130px;height:130px;border-radius:50%;margin:0 auto 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.sc-ex{background:linear-gradient(135deg,#00c851,#007E33);color:#fff}
.sc-gd{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff}
.sc-ok{background:linear-gradient(135deg,#ff9800,#e65100);color:#fff}
.sc-lo{background:linear-gradient(135deg,#ea4335,#b71c1c);color:#fff}
.score-num{font-size:28px;font-weight:900}
.score-pct{font-size:16px;opacity:.9}
.stats-row{display:flex;justify-content:center;gap:24px;margin-bottom:24px}
.stat{text-align:center}
.stat-n{font-size:26px;font-weight:800;color:#1a1a2e}
.stat-l{font-size:12px;color:#888;margin-top:2px}
.s-ok .stat-n{color:#34a853}
.s-err .stat-n{color:#ea4335}
.result-list{border:1px solid #eee;border-radius:10px;overflow:hidden;margin-bottom:20px;max-height:260px;overflow-y:auto}
.r-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #f5f5f5;font-size:13px}
.r-row:last-child{border-bottom:none}
.modal-btns{display:flex;gap:10px;justify-content:center}

/* Exam mode badge */
.exam-badge{display:inline-flex;align-items:center;gap:6px;background:#fff3e0;color:#e65100;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;margin-bottom:14px}

@media(max-width:768px){
  .sidebar{width:72px}
  .week-btn .wlabel,.week-btn .wcnt,.sidebar-section,.spec-btn span{display:none}
  .week-btn{padding:12px 0;justify-content:center}
  .main{padding:16px 12px}
  .modal{padding:24px 16px}
}
</style>
</head>
<body>
<div class="header">
  <div class="header-logo">📚</div>
  <div class="header-title">
    <h1>程序设计II — 理论题复习</h1>
    <p>第1周至第17周 · 全量题库</p>
  </div>
  <div class="header-right" id="hdrTotal">共 260 道题</div>
</div>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-section">按周浏览</div>
    <div id="weekNav"><!-- built by JS --></div>
    <div class="sidebar-special">
      <button class="spec-btn exam" onclick="startExamMode()">🎯 <span>考试模式 50题</span></button>
      <button class="spec-btn shuffle" id="shuffleGlobalBtn" onclick="toggleShuffle()">🔀 <span>随机顺序</span></button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div id="topBar" class="top-bar" style="display:none">
      <h2 id="weekTitle">请选择</h2>
      <div class="mode-btns">
        <button class="btn btn-review active" id="btnReview" onclick="setMode('review')">👁 复习模式</button>
        <button class="btn btn-exam" id="btnExam" onclick="setMode('exam')">📝 答题模式</button>
        <button class="btn btn-submit" id="btnSubmit" onclick="submitQuiz()" style="display:none">✅ 提交</button>
        <button class="btn btn-reset" id="btnReset" onclick="resetQuiz()" style="display:none">🔄 重置</button>
      </div>
    </div>

    <div class="mode-bar review" id="modeBar" style="display:none">
      <div class="mode-dot"></div>
      <span id="modeTxt">复习模式 — 点击选项后直接显示正确答案</span>
    </div>

    <div class="prog-wrap" id="progWrap" style="display:none">
      <div class="prog-head"><span id="progLabel">答题进度</span><span id="progCount">0 / 0</span></div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>

    <div id="qWrap">
      <div class="welcome">
        <div class="w-icon">🎓</div>
        <h3>选择周次开始复习</h3>
        <p>共收录 <strong>第1~17周</strong> 理论题，260道题<br><br>
        <strong>复习模式</strong> — 点击选项后可直接查看正确答案<br>
        <strong>答题模式</strong> — 隐藏答案，随时可提交查看成绩<br>
        <strong>🎯 考试模式</strong> — 跨周抽取50题综合模拟<br>
        <strong>🔀 随机顺序</strong> — 打乱题目顺序练习</p>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="modal">
  <div class="modal">
    <h2>📊 <span id="sTitle">成绩报告</span></h2>
    <div class="sub">答题完成！标注对错但不显示答案</div>
    <div class="score-circle sc-gd" id="scoreCircle">
      <div class="score-num" id="sNum">-/-</div>
      <div class="score-pct" id="sPct">0%</div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-n" id="sTot">-</div><div class="stat-l">总题数</div></div>
      <div class="stat s-ok"><div class="stat-n" id="sOk">-</div><div class="stat-l">✅ 答对</div></div>
      <div class="stat s-err"><div class="stat-n" id="sErr">-</div><div class="stat-l">❌ 未对</div></div>
    </div>
    <div class="result-list" id="rList"></div>
    <div class="modal-btns">
      <button class="btn btn-review" onclick="closeModal()">查看题目详情</button>
      <button class="btn btn-submit" onclick="resetFromModal()">🔄 重新作答</button>
    </div>
  </div>
</div>

<script>
const W = {"1":{"title":"25程设Ⅱ-周1-理论题","questions":[{"id":0,"description":"# 问题<br><br>c和c++分别属于什么语言？","explanation":"","choices":[{"id":0,"text":"面向函数编程语言，面向过程编程语言","explanation":"C语言不是面向函数编程语言，C语言是面向过程编程语言，不存在\"面向函数\"这一分类。"},{"id":1,"text":"面向过程编程语言，面向对象编程语言","explanation":"正确。C语言是面向过程的编程语言，强调函数和过程；C++在C的基础上增加了类、继承、多态等特性，是面向对象编程语言。"},{"id":2,"text":"面向对象编程语言，面向过程编程语言","explanation":"顺序颠倒了。C语言是面向过程的，不是面向对象的；C++虽然支持面向过程编程，但其核心特征是面向对象。"},{"id":3,"text":"面向函数编程语言，面向对象编程语言","explanation":"\"面向函数\"不是标准的编程语言分类方式，C语言属于面向过程，C++属于面向对象，两个都不正确。"}],"answer":[1]},{"id":1,"description":"# 问题<br><br>下面不属于面向对象编程语言的是？","explanation":"","choices":[{"id":0,"text":"Python","explanation":"Python是面向对象编程语言，支持类、继承、多态等面向对象特性。"},{"id":1,"text":"Java","explanation":"Java是纯粹的面向对象编程语言，所有代码都必须写在类中。"},{"id":2,"text":"C","explanation":"正确。C语言是面向过程的编程语言，不支持类、继承、多态等面向对象特性，不属于面向对象编程语言。"},{"id":3,"text":"C++","explanation":"C++是面向对象编程语言，支持类、继承、封装、多态等核心面向对象特性。"}],"answer":[2]},{"id":2,"description":"# 问题<br><br>下列哪些语法内容不是c++比c多出来的？","explanation":"","choices":[{"id":0,"text":"函数指针","explanation":"正确。函数指针在C语言中就已存在，是C语言本身就有的特性，并非C++新增的语法内容。"},{"id":1,"text":"命名空间","explanation":"命名空间（namespace）是C++新增的特性，C语言中没有命名空间的概念。"},{"id":2,"text":"引用","explanation":"引用（reference）是C++新增的特性，C语言中只有指针，没有引用。"},{"id":3,"text":"流式IO操作","explanation":"流式IO操作（如<code class=\"inline-code\">cin</code>、<code class=\"inline-code\">cout</code>）是C++新增的特性，C语言使用的是<code class=\"inline-code\">printf</code>/<code class=\"inline-code\">scanf</code>等函数。"}],"answer":[0]},{"id":3,"description":"# 问题<br><br>下面不属于面向对象编程的特点的是","explanation":"","choices":[{"id":0,"text":"函数","explanation":"正确。函数是编程中的基本概念，不是面向对象编程的特有特征；面向过程编程也有函数。面向对象的三大特性是封装、继承和多态。"},{"id":1,"text":"多态","explanation":"多态是面向对象编程的核心特性之一，指同一接口可以有多种不同的实现方式。"},{"id":2,"text":"继承","explanation":"继承是面向对象编程的核心特性之一，允许子类继承父类的属性和方法。"},{"id":3,"text":"封装","explanation":"封装是面向对象编程的核心特性之一，将数据和操作数据的方法绑定在一起并隐藏内部实现。"}],"answer":[0]},{"id":4,"description":"# 问题<br><br>以下哪个操纵符用于将整数输出的进制设置为八进制？","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">endl</code>","explanation":"<code class=\"inline-code\">endl</code>是换行并刷新输出流的操纵符，与进制设置无关。"},{"id":1,"text":"<code class=\"inline-code\">dec</code>","explanation":"<code class=\"inline-code\">dec</code>用于将整数输出设置为十进制格式，不是八进制。"},{"id":2,"text":"<code class=\"inline-code\">hex</code>","explanation":"<code class=\"inline-code\">hex</code>用于将整数输出设置为十六进制格式，不是八进制。"},{"id":3,"text":"<code class=\"inline-code\">oct</code>","explanation":"正确。<code class=\"inline-code\">oct</code>操纵符将整数输出格式设置为八进制（octal），例如<code class=\"inline-code\">cout &lt;&lt; oct &lt;&lt; 8</code>会输出10。"}],"answer":[3]},{"id":5,"description":"# 问题<br><br>以下哪个操纵符用于设置浮点数输出为科学计数法格式？","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">endl</code>","explanation":"<code class=\"inline-code\">endl</code>是换行并刷新输出流的操纵符，与浮点数格式无关。"},{"id":1,"text":"<code class=\"inline-code\">showpoint</code>","explanation":"<code class=\"inline-code\">showpoint</code>用于强制显示小数点和尾随零，但不会改变为科学计数法格式。"},{"id":2,"text":"<code class=\"inline-code\">fixed</code>","explanation":"<code class=\"inline-code\">fixed</code>用于将浮点数输出设置为定点表示法（如0.725140），与科学计数法相反。"},{"id":3,"text":"<code class=\"inline-code\">scientific</code>","explanation":"正确。<code class=\"inline-code\">scientific</code>操纵符将浮点数输出格式设置为科学计数法（如7.251400e-01）。"}],"answer":[3]},{"id":6,"description":"# 问题<br><br>C++中命名空间的主要作用是什么？","explanation":"","choices":[{"id":0,"text":"提高代码量","explanation":"命名空间不会增加代码量，这不是它的设计目的，反而使用命名空间可能需要多写一些作用域限定符。"},{"id":1,"text":"避免全局标识符的名字冲突","explanation":"正确。命名空间的主要作用是避免不同库或模块中全局标识符（如函数名、变量名）之间的名字冲突，通过将标识符组织到不同的逻辑分组中。"},{"id":2,"text":"强制所有符号必须显式定义","explanation":"命名空间不会强制所有符号必须显式定义，它只是对已有标识符进行逻辑分组。"},{"id":3,"text":"简化编译器的语法分析","explanation":"命名空间不会简化编译器的语法分析，它主要是为程序员提供名字管理的手段，与编译器内部解析无关。"}],"answer":[1]},{"id":7,"description":"# 问题<br><br>下列哪个不属于命名空间std？","explanation":"","choices":[{"id":0,"text":"cin","explanation":"<code class=\"inline-code\">cin</code>是标准输入流对象，定义在<code class=\"inline-code\">std</code>命名空间中。"},{"id":1,"text":"cout","explanation":"<code class=\"inline-code\">cout</code>是标准输出流对象，定义在<code class=\"inline-code\">std</code>命名空间中。"},{"id":2,"text":"endl","explanation":"<code class=\"inline-code\">endl</code>是换行操纵符，定义在<code class=\"inline-code\">std</code>命名空间中。"},{"id":3,"text":"scanf","explanation":"正确。<code class=\"inline-code\">scanf</code>是C语言的输入函数，虽然在C++中可用，但它属于全局命名空间（或C标准库），不属于<code class=\"inline-code\">std</code>命名空间中的C++流式IO组件。"}],"answer":[3]},{"id":8,"description":"# 问题<br><br>以下关于引用的描述，不正确的是：","explanation":"","choices":[{"id":0,"text":"引用必须被定义","explanation":"该说法正确：引用在定义时必须初始化，绑定到一个已存在的对象，不能先定义后赋值。"},{"id":1,"text":"引用不能为空","explanation":"该说法正确：引用必须绑定到一个有效的对象，不存在空引用（与指针不同，指针可以为空）。"},{"id":2,"text":"引用可以指向另一个引用","explanation":"正确（即该说法不正确）。引用本身是某个变量的别名，不能指向另一个引用；对引用的操作始终是对原对象的直接操作，引用一旦绑定就不能重新绑定到其他对象。"},{"id":3,"text":"引用不是一个独立的对象","explanation":"该说法正确：引用不是一个独立的对象，它只是已有对象的别名，不占用独立的内存空间（至少在语义层面如此）。"}],"answer":[2]},{"id":9,"description":"# 问题<br><br>以下代码中，<code class=\"inline-code\">&lt;&lt;</code> 运算符的作用是什么？<br><br><pre class=\"code-block\"><code>cout &lt;&lt; &quot;Hello world!&quot;;</code></pre>","explanation":"","choices":[{"id":0,"text":"将字符串左移","explanation":"左移运算符是<code class=\"inline-code\">&lt;&lt;</code>在位运算中的含义，但在这里<code class=\"inline-code\">cout &lt;&lt;</code>已被重载为流插入运算符，不是字符串左移。"},{"id":1,"text":"将字符串从标准输入读取","explanation":"从标准输入读取数据使用的是<code class=\"inline-code\">cin &gt;&gt;</code>（流提取运算符），而不是<code class=\"inline-code\">cout &lt;&lt;</code>。"},{"id":2,"text":"将字符串作为算术运算的操作数","explanation":"<code class=\"inline-code\">&lt;&lt;</code>在此处不是算术运算符，而是被<code class=\"inline-code\">ostream</code>类重载为流插入运算符。"},{"id":3,"text":"将字符串输出到标准输出","explanation":"正确。在<code class=\"inline-code\">cout &lt;&lt; \"Hello world!\";</code>中，<code class=\"inline-code\">&lt;&lt;</code>是流插入运算符（被重载），作用是将字符串输出到标准输出设备（屏幕）。"}],"answer":[3]},{"id":10,"description":"# 问题<br><br>以下代码中，操纵符 <code class=\"inline-code\">endl</code> 的作用是什么？<br><br><pre class=\"code-block\"><code>cout &lt;&lt; 42 &lt;&lt; endl;</code></pre>","explanation":"","choices":[{"id":0,"text":"仅输出换行符 <code class=\"inline-code\">\\n</code>","explanation":"<code class=\"inline-code\">endl</code>不仅仅输出换行符，它还会刷新输出缓冲区，这是它与<code class=\"inline-code\">\\n</code>的关键区别。"},{"id":1,"text":"输出换行符 <code class=\"inline-code\">\\n</code> 并刷新输出流","explanation":"正确。<code class=\"inline-code\">endl</code>操纵符的作用有两个：一是输出一个换行符<code class=\"inline-code\">\\n</code>，二是立即刷新输出流缓冲区（等价于调用<code class=\"inline-code\">flush()</code>）。"},{"id":2,"text":"设置浮点数的输出格式","explanation":"设置浮点数输出格式使用的是<code class=\"inline-code\">fixed</code>或<code class=\"inline-code\">scientific</code>等操纵符，不是<code class=\"inline-code\">endl</code>。"},{"id":3,"text":"更改整数输出的进制","explanation":"更改整数输出进制使用的是<code class=\"inline-code\">dec</code>、<code class=\"inline-code\">hex</code>、<code class=\"inline-code\">oct</code>等操纵符，与<code class=\"inline-code\">endl</code>无关。"}],"answer":[1]},{"id":11,"description":"# 问题<br><br>以下代码中，如何正确访问命名空间 <code class=\"inline-code\">Math</code> 中的常量 <code class=\"inline-code\">PI</code>？<br><br><pre class=\"code-block\"><code>namespace Math {  \n    const double PI = 3.14;  \n}</code></pre>","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">Math-&gt;PI</code>","explanation":"<code class=\"inline-code\">Math-&gt;PI</code>使用的是箭头运算符<code class=\"inline-code\">-&gt;</code>，这是通过指针访问成员的语法，不能用于访问命名空间中的成员。"},{"id":1,"text":"<code class=\"inline-code\">Math:PI</code>","explanation":"<code class=\"inline-code\">Math:PI</code>只使用了一个冒号，这不是C++中访问命名空间成员的合法语法。"},{"id":2,"text":"<code class=\"inline-code\">Math::PI</code>","explanation":"正确。C++中使用作用域解析运算符<code class=\"inline-code\">::</code>来访问命名空间中的成员，<code class=\"inline-code\">Math::PI</code>表示访问<code class=\"inline-code\">Math</code>命名空间中的<code class=\"inline-code\">PI</code>常量。"},{"id":3,"text":"<code class=\"inline-code\">Math.PI</code>","explanation":"<code class=\"inline-code\">Math.PI</code>使用点运算符，这是Java/Python等语言访问成员的语法，C++中点运算符用于对象访问成员，不能用于命名空间。"}],"answer":[2]},{"id":12,"description":"# 问题<br><br>有如下声明，那么如何将<code class=\"inline-code\">A</code>里面的<code class=\"inline-code\">flag</code>变量赋值为<code class=\"inline-code\">0</code>？<br><br><pre class=\"code-block\"><code>namespace A{\n    int flag=1;\n}\nnamespace B{\n    int flag=0;\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">flag = 0;</code>","explanation":"<code class=\"inline-code\">flag = 0;</code>不加命名空间限定时，由于A和B中都定义了<code class=\"inline-code\">flag</code>，会产生二义性，编译器不知道访问哪个<code class=\"inline-code\">flag</code>。"},{"id":1,"text":"<code class=\"inline-code\">A.flag=0;</code>","explanation":"<code class=\"inline-code\">A.flag=0;</code>使用点运算符访问命名空间成员是不合法的，C++中访问命名空间成员应使用<code class=\"inline-code\">::</code>运算符。"},{"id":2,"text":"<code class=\"inline-code\">A-&gt;flag=0;</code>","explanation":"<code class=\"inline-code\">A-&gt;flag=0;</code>使用箭头运算符访问命名空间成员是不合法的，箭头运算符用于通过指针访问成员。"},{"id":3,"text":"<code class=\"inline-code\">using namespace A;flag = 0;</code>","explanation":"正确。<code class=\"inline-code\">using namespace A;</code>将命名空间A中的所有标识符引入当前作用域，之后<code class=\"inline-code\">flag = 0;</code>会访问A中的<code class=\"inline-code\">flag</code>并将其赋值为0。"}],"answer":[3]},{"id":13,"description":"# 问题<br><br>以下代码的输出结果是什么？<br><br><pre class=\"code-block\"><code>cout &lt;&lt; fixed &lt;&lt; 0.72514 &lt;&lt; endl;</code></pre>","explanation":"","choices":[{"id":0,"text":"0.72514","explanation":"0.72514只有5位小数，而<code class=\"inline-code\">fixed</code>模式下默认显示6位小数，因此输出不会是0.72514。"},{"id":1,"text":"0.725140","explanation":"正确。<code class=\"inline-code\">fixed</code>操纵符将浮点数设置为定点表示法，默认显示6位小数，因此0.72514会输出为0.725140（末尾补零）。"},{"id":2,"text":"0.73","explanation":"0.73是保留2位小数的结果，但<code class=\"inline-code\">fixed</code>默认精度是6位小数，除非用<code class=\"inline-code\">setprecision(2)</code>修改精度。"},{"id":3,"text":"0.72","explanation":"0.72不是正确的截断或四舍五入结果，且<code class=\"inline-code\">fixed</code>默认精度为6位小数。"}],"answer":[1]},{"id":14,"description":"# 问题<br><br>当输入为``<code class=\"inline-code\">b</code>``时下面语句的输出是？<br><br><pre class=\"code-block\"><code>char a;\nstd::cin&gt;&gt;a;\nstd::cout&lt;&lt;a;</code></pre>","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">a</code>","explanation":"输出<code class=\"inline-code\">a</code>意味着输出的是变量名本身，但<code class=\"inline-code\">cout &lt;&lt; a</code>会输出变量a中存储的值，即输入的字符。"},{"id":1,"text":"<code class=\"inline-code\">b</code>","explanation":"正确。输入<code class=\"inline-code\">b</code>时，<code class=\"inline-code\">cin &gt;&gt; a</code>将字符'b'读入变量a，然后<code class=\"inline-code\">cout &lt;&lt; a</code>输出char类型变量a的值，即字符<code class=\"inline-code\">b</code>。"},{"id":2,"text":"<code class=\"inline-code\">97</code>","explanation":"97是字符'a'的ASCII码值，但题目输入的是'b'，且<code class=\"inline-code\">cout &lt;&lt; a</code>对char类型输出字符而非ASCII码值。"},{"id":3,"text":"<code class=\"inline-code\">98</code>","explanation":"98是字符'b'的ASCII码值，但<code class=\"inline-code\">cout</code>对<code class=\"inline-code\">char</code>类型直接输出字符本身，而不是其ASCII码值。"}],"answer":[1]},{"id":15,"description":"# 问题<br><br>当输入``<code class=\"inline-code\">6</code>``时下面语句的输出是？<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\nint main(){\n\tint x;\n\tcin &gt;&gt; x;\n\tcout &lt;&lt; x++;\n        cout &lt;&lt; x++;\n\treturn 0;\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">67</code>","explanation":"正确。输入6后，第一个<code class=\"inline-code\">cout &lt;&lt; x++</code>先输出x的当前值6，然后x自增为7；第二个<code class=\"inline-code\">cout &lt;&lt; x++</code>先输出7，然后x自增为8。因此输出为67。"},{"id":1,"text":"<code class=\"inline-code\">78</code>","explanation":"78意味着两次输出分别是7和8，但后置<code class=\"inline-code\">x++</code>是先使用再自增，第一次应输出6而非7。"},{"id":2,"text":"<code class=\"inline-code\">66</code>","explanation":"66意味着两次都输出6，但第一次<code class=\"inline-code\">x++</code>后x已变为7，第二次应输出7而非6。"},{"id":3,"text":"<code class=\"inline-code\">77</code>","explanation":"77意味着两次都输出7，但第一次应输出x的初始值6（后置自增先使用再自增），且第二次x已是7而非7。"}],"answer":[0]},{"id":16,"description":"# 问题<br><br>下面语句的输出是？<br><br><pre class=\"code-block\"><code>std::cout&lt;&lt;&quot;12.56&quot;&lt;&lt;12.56;</code></pre>","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">12.5612.56</code>","explanation":"正确。<code class=\"inline-code\">\"12.56\"</code>是字符串字面量直接输出12.56，紧接着<code class=\"inline-code\">12.56</code>是浮点数也输出12.56，中间没有空格或换行，因此输出为<code class=\"inline-code\">12.5612.56</code>。"},{"id":1,"text":"<code class=\"inline-code\">12.56\n12.56</code>","explanation":"代码中没有使用<code class=\"inline-code\">endl</code>或<code class=\"inline-code\">\\n</code>，不会产生换行，两部分输出在同一行。"},{"id":2,"text":"<code class=\"inline-code\">12.56 12.56</code>","explanation":"代码中没有输出空格字符，两部分内容直接相连，中间不会有空格。"},{"id":3,"text":"<code class=\"inline-code\">&quot;12.56&quot;12.56</code>","explanation":"字符串字面量<code class=\"inline-code\">\"12.56\"</code>输出时不会带上双引号，双引号只是标记字符串的边界。"}],"answer":[0]},{"id":17,"description":"# 问题<br><br>下面语句的输出是？<br><br><pre class=\"code-block\"><code>cout&lt;&lt; 0 + &quot;33.22&quot;&lt;&lt; endl &lt;&lt; &quot;33.22&quot;;</code></pre>","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">33.22\n33.22</code>","explanation":"正确。<code class=\"inline-code\">0 + \"33.22\"</code>中\"33.22\"是字符串字面量（字符数组指针），加0表示指针偏移0个位置，仍指向字符串首字符，输出\"33.22\"；然后<code class=\"inline-code\">endl</code>换行；最后输出\"33.22\"。"},{"id":1,"text":"<code class=\"inline-code\">33.2233.22</code>","explanation":"代码中有<code class=\"inline-code\">endl</code>操纵符，会产生换行而不是直接相连，因此不是33.2233.22。"},{"id":2,"text":"<code class=\"inline-code\">33.22 33.22</code>","explanation":"代码中没有输出空格，且<code class=\"inline-code\">endl</code>产生的是换行而非空格。"},{"id":3,"text":"<code class=\"inline-code\">033.22\n33.22</code>","explanation":"<code class=\"inline-code\">0 + \"33.22\"</code>中的0是整数与指针相加，结果仍是\"33.22\"字符串的指针，不会输出\"0\"。"}],"answer":[0]},{"id":18,"description":"# 问题<br><br>下述语句的输出是：<br><br><pre class=\"code-block\"><code>cout &lt;&lt; 1 + &quot;20.26&quot; &lt;&lt; endl &lt;&lt; 1 + 20.26;</code></pre>","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">120.26\n21.26</code>","explanation":"<code class=\"inline-code\">1 + \"20.26\"</code>是指针算术运算，指针偏移1位后指向\"0.26\"，不是\"120.26\"。"},{"id":1,"text":"<code class=\"inline-code\">21.26\n21.26</code>","explanation":"<code class=\"inline-code\">1 + \"20.26\"</code>是指针运算，结果是\"0.26\"而非21.26；而<code class=\"inline-code\">1 + 20.26</code>才是算术加法得到21.26。"},{"id":2,"text":"<code class=\"inline-code\">0.26\n0.26</code>","explanation":"<code class=\"inline-code\">1 + 20.26</code>是浮点算术运算，结果应为21.26，不是0.26。"},{"id":3,"text":"<code class=\"inline-code\">0.26\n21.26</code>","explanation":"正确。<code class=\"inline-code\">1 + \"20.26\"</code>是指针偏移1位，指向字符'0'开始的位置，输出\"0.26\"；<code class=\"inline-code\">endl</code>换行；<code class=\"inline-code\">1 + 20.26</code>是数值加法，输出21.26。"}],"answer":[3]},{"id":19,"description":"# 问题<br><br>下面代码在输入2以后，输出为？<br><br><pre class=\"code-block\"><code>#include&lt;iostream&gt;\nusing namespace std; \nint main(){\n\tint cout;\n\tcin&gt;&gt;cout;\n        std::cout&lt;&lt;(cout&lt;&lt;cout);\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"编译错误","explanation":"代码不会编译错误。虽然局部变量<code class=\"inline-code\">cout</code>遮蔽了<code class=\"inline-code\">std::cout</code>，但<code class=\"inline-code\">std::cout</code>仍可通过<code class=\"inline-code\">std::</code>限定访问。"},{"id":1,"text":"2","explanation":"输出2不对。<code class=\"inline-code\">cout&lt;&lt;cout</code>中<code class=\"inline-code\">&lt;&lt;</code>被解释为位左移运算符，2左移2位等于8，不是2。"},{"id":2,"text":"4","explanation":"输出4不对。这里<code class=\"inline-code\">cout</code>是局部int变量值为2，<code class=\"inline-code\">cout&lt;&lt;cout</code>即<code class=\"inline-code\">2&lt;&lt;2</code>=8，不是4。"},{"id":3,"text":"8","explanation":"正确。局部变量<code class=\"inline-code\">cout</code>遮蔽了<code class=\"inline-code\">std::cout</code>，输入2后<code class=\"inline-code\">cout</code>=2；<code class=\"inline-code\">cout&lt;&lt;cout</code>即<code class=\"inline-code\">2&lt;&lt;2</code>（2的二进制左移2位），结果为8；然后通过<code class=\"inline-code\">std::cout</code>输出8。"}],"answer":[3]}]},"2":{"title":"25程设Ⅱ-周2-理论题","questions":[{"id":0,"description":"在C++中，<code class=\"inline-code\">string</code>是属于以下哪种类型？","explanation":"","choices":[{"id":0,"text":"基本数据类型（如 <code class=\"inline-code\">int, float</code>）","explanation":"<code class=\"inline-code\">string</code>不是基本数据类型。C++的基本数据类型包括<code class=\"inline-code\">int</code>、<code class=\"inline-code\">float</code>、<code class=\"inline-code\">double</code>、<code class=\"inline-code\">char</code>、<code class=\"inline-code\">bool</code>等。"},{"id":1,"text":"C 风格字符串类型","explanation":"C风格字符串是字符数组（<code class=\"inline-code\">char[]</code>或以<code class=\"inline-code\">\\0</code>结尾的<code class=\"inline-code\">const char*</code>），而<code class=\"inline-code\">string</code>是C++标准库中的类类型。"},{"id":2,"text":"C++ 标准库类类型（如 <code class=\"inline-code\">std::string</code>）","explanation":"正确。<code class=\"inline-code\">string</code>是C++标准库中定义的类类型（<code class=\"inline-code\">std::string</code>），需要包含<code class=\"inline-code\">&lt;string&gt;</code>头文件，属于<code class=\"inline-code\">std</code>命名空间。"},{"id":3,"text":"宏定义类型","explanation":"<code class=\"inline-code\">string</code>不是宏定义类型，它是C++标准库中的一个完整的类，提供了丰富的成员函数。"}],"answer":[2]},{"id":1,"description":"以下哪个是正确的 <code class=\"inline-code\">string</code>对象初始化方式？","explanation":"字符串字面量要用双引号，且要包含 &lt;string&gt;头文件。","choices":[{"id":0,"text":"<code class=\"inline-code\">string s = &#x27;hello&#x27;;</code>","explanation":"单引号<code class=\"inline-code\">'hello'</code>在C++中表示字符字面量（且多字符字面量行为未定义），不能用来初始化string对象。"},{"id":1,"text":"<code class=\"inline-code\">string s = &quot;hello&quot;;</code>","explanation":"正确。双引号<code class=\"inline-code\">\"hello\"</code>表示字符串字面量，可以用于初始化<code class=\"inline-code\">string</code>对象，这是最常见的初始化方式。"},{"id":2,"text":"<code class=\"inline-code\">string s = hello;</code>","explanation":"<code class=\"inline-code\">hello</code>没有引号，会被编译器视为一个未定义的变量名，而不是字符串字面量，会导致编译错误。"},{"id":3,"text":"<code class=\"inline-code\">D. string s(&#x27;hello&#x27;);</code>","explanation":"构造函数<code class=\"inline-code\">string s('hello')</code>中单引号不能表示字符串，单引号用于字符字面量，此处语法不合法。"}],"answer":[1]},{"id":2,"description":"<pre class=\"code-block\"><code>string s1;\nstring s2 = &quot;C++&quot;;</code></pre><br><br>下面关于 <code class=\"inline-code\">string</code>对象 <code class=\"inline-code\">s1</code>和 <code class=\"inline-code\">s2</code>的说法，正确的是：","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">s1</code> 是未初始化的，<code class=\"inline-code\">s2 </code>是空字符串","explanation":"<code class=\"inline-code\">string</code>类型的默认构造函数会创建空字符串，因此s1不是\"未初始化的\"，而是默认初始化为空字符串。"},{"id":1,"text":"<code class=\"inline-code\">s1 </code>默认为空字符串，<code class=\"inline-code\">s2</code> 初始化为 &quot;C++&quot;","explanation":"正确。<code class=\"inline-code\">string s1;</code>调用默认构造函数，s1被初始化为空字符串；<code class=\"inline-code\">string s2 = \"C++\";</code>将s2初始化为\"C++\"。"},{"id":2,"text":"<code class=\"inline-code\">s1</code> 和 <code class=\"inline-code\">s2</code> 都是未初始化的","explanation":"<code class=\"inline-code\">string</code>类的默认构造函数会保证对象被初始化为空字符串，不会出现未初始化的情况。"},{"id":3,"text":"<code class=\"inline-code\">s2</code> 是 C 风格字符串，不是 string 对象","explanation":"<code class=\"inline-code\">\"C++\"</code>虽然是字符串字面量（C风格），但s2的类型被声明为<code class=\"inline-code\">string</code>，会自动转换为string对象，不是C风格字符串。"}],"answer":[1]},{"id":3,"description":"C++ 支持函数重载，指的是：","explanation":"","choices":[{"id":0,"text":"多个函数可以有相同名字，但参数列表不同","explanation":"正确。函数重载（Function Overloading）指在同一作用域中，多个函数可以拥有相同的函数名，但参数列表（参数个数、类型或顺序）必须不同。"},{"id":1,"text":"一个函数可以有多个返回值","explanation":"一个函数只能有一个返回值（或使用元组等结构），这不是函数重载的含义。"},{"id":2,"text":"函数可以在多个文件中定义","explanation":"函数可以在多个文件中定义涉及的是函数的声明与定义分离，属于编译链接问题，与函数重载无关。"},{"id":3,"text":"函数必须使用相同的参数类型","explanation":"函数重载恰恰要求参数类型不同（或参数个数不同），如果参数类型完全相同则会产生重复定义错误。"}],"answer":[0]},{"id":4,"description":"以下哪个是 <code class=\"inline-code\">string::find</code>函数的正确用法示例？","explanation":"find可以接收字符串、字符和起始位置。直接输入数字会有隐式转换。","choices":[{"id":0,"text":"<code class=\"inline-code\">s.find(&quot;ab&quot;, 2, 3)</code>","explanation":"正确。<code class=\"inline-code\">s.find(\"ab\", 2, 3)</code>合法，第二个参数是起始搜索位置，第三个参数在字符串重载中被隐式处理。find的三参数版本接受<code class=\"inline-code\">(const char*, pos, count)</code>。"},{"id":1,"text":"<code class=\"inline-code\">s.find(&quot;ab&quot;, 2)</code>","explanation":"正确。<code class=\"inline-code\">s.find(\"ab\", 2)</code>是最常用的形式，从位置2开始查找子串\"ab\"。"},{"id":2,"text":"<code class=\"inline-code\">s.find(123)</code>","explanation":"正确。<code class=\"inline-code\">s.find(123)</code>中整数123会被隐式转换为<code class=\"inline-code\">char</code>类型（对应ASCII码的字符），find函数可以查找单个字符。"},{"id":3,"text":"<code class=\"inline-code\">s.find()</code>","explanation":"<code class=\"inline-code\">s.find()</code>不传任何参数是不合法的，find函数至少需要一个参数来指定要查找的内容。"}],"answer":[1,0,2]},{"id":5,"description":"在 C++11 中，<code class=\"inline-code\">constexpr</code>主要用于：","explanation":"","choices":[{"id":0,"text":"表示变量是只读的","explanation":"表示变量只读是<code class=\"inline-code\">const</code>的作用，<code class=\"inline-code\">constexpr</code>虽然也隐含不可修改，但其核心目的是保证编译时求值。"},{"id":1,"text":"用于定义宏","explanation":"<code class=\"inline-code\">constexpr</code>与宏定义无关，宏定义使用<code class=\"inline-code\">#define</code>预处理指令，在预处理阶段简单替换。"},{"id":2,"text":"表示函数或变量能在编译时求值（常量表达式）","explanation":"正确。<code class=\"inline-code\">constexpr</code>用于声明可以在编译时求值的变量或函数，确保其值是常量表达式，可用于数组大小、模板参数等需要编译时常量的场景。"},{"id":3,"text":"用于替代 <code class=\"inline-code\">#define</code>","explanation":"<code class=\"inline-code\">constexpr</code>可以在某些场景替代<code class=\"inline-code\">#define</code>（如定义常量），但这不是它的主要目的，其核心功能是编译时求值。"}],"answer":[2]},{"id":6,"description":"关于 <code class=\"inline-code\">auto</code>关键字，以下说法正确的是？","explanation":"","choices":[{"id":0,"text":"在 C++11 中<code class=\"inline-code\">auto </code>可以用于函数参数类型","explanation":"在C++11中，<code class=\"inline-code\">auto</code>不能用于函数参数类型，这是C++20中才引入的简写lambda特性。"},{"id":1,"text":"<code class=\"inline-code\">auto </code>可以表示任意类型，无需推导","explanation":"<code class=\"inline-code\">auto</code>不是表示任意类型，它必须通过初始化表达式让编译器推导出具体类型，不能脱离初始化独立使用。"},{"id":2,"text":"<code class=\"inline-code\">auto </code>定义的变量不需要初始化","explanation":"<code class=\"inline-code\">auto</code>定义的变量必须初始化，因为编译器需要初始化表达式来推导类型，<code class=\"inline-code\">auto x;</code>会编译错误。"},{"id":3,"text":"<code class=\"inline-code\">auto </code>让编译器根据初始化表达式自动推导变量类型","explanation":"正确。C++11中<code class=\"inline-code\">auto</code>关键字让编译器根据变量的初始化表达式自动推导变量的类型，例如<code class=\"inline-code\">auto x = 3.14;</code>推导出<code class=\"inline-code\">double</code>类型。"}],"answer":[3]},{"id":7,"description":"以下关于 C++ 中 <code class=\"inline-code\">string </code>类的说法，错误的是？","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">string </code>类对象可以直接用 <code class=\"inline-code\">+</code>运算符进行字符串拼接","explanation":"该说法正确。<code class=\"inline-code\">string</code>类重载了<code class=\"inline-code\">+</code>运算符，可以直接用<code class=\"inline-code\">+</code>进行字符串拼接，如<code class=\"inline-code\">s1 + s2</code>。"},{"id":1,"text":"<code class=\"inline-code\">string::length() </code>返回类型为 <code class=\"inline-code\">int</code>","explanation":"正确（即该说法错误）。<code class=\"inline-code\">string::length()</code>的返回类型是<code class=\"inline-code\">size_t</code>（无符号整数类型），不是<code class=\"inline-code\">int</code>。<code class=\"inline-code\">size_t</code>在不同平台上可能是<code class=\"inline-code\">unsigned int</code>或<code class=\"inline-code\">unsigned long</code>。"},{"id":2,"text":"<code class=\"inline-code\">string</code> 类提供了 <code class=\"inline-code\">find()</code>方法用于查找子串","explanation":"该说法正确。<code class=\"inline-code\">string</code>类确实提供了<code class=\"inline-code\">find()</code>方法用于在字符串中查找子串或字符。"},{"id":3,"text":"可以使用 <code class=\"inline-code\">c_str()</code>方法获取与 C 风格字符串兼容的字符数组","explanation":"该说法正确。<code class=\"inline-code\">c_str()</code>方法返回一个<code class=\"inline-code\">const char*</code>指针，可以与C风格的字符串处理函数兼容使用。"}],"answer":[1]},{"id":8,"description":"<pre class=\"code-block\"><code>vector&lt;int&gt; vec = {1, 2, 3};\nauto it = vec.begin();</code></pre>","explanation":"auto用于自动类型推导，此处 it的类型会被推导为 vector&lt;int&gt;::iterator","choices":[{"id":0,"text":"让 <code class=\"inline-code\">it</code> 的类型成为 <code class=\"inline-code\">vector</code>","explanation":"<code class=\"inline-code\">auto</code>推导出的类型是<code class=\"inline-code\">vector&lt;int&gt;::iterator</code>，不是<code class=\"inline-code\">vector</code>本身。"},{"id":1,"text":"显式声明 <code class=\"inline-code\">it</code> 为 <code class=\"inline-code\">int </code>类型","explanation":"<code class=\"inline-code\">auto</code>会根据<code class=\"inline-code\">vec.begin()</code>的返回类型自动推导，不会推导为<code class=\"inline-code\">int</code>类型。"},{"id":2,"text":"让编译器根据 <code class=\"inline-code\">vec.begin() </code>的返回值自动推导 <code class=\"inline-code\">it </code>的类型","explanation":"正确。<code class=\"inline-code\">auto</code>让编译器根据<code class=\"inline-code\">vec.begin()</code>的返回值类型自动推导<code class=\"inline-code\">it</code>的类型，此处推导为<code class=\"inline-code\">vector&lt;int&gt;::iterator</code>。"},{"id":3,"text":"让 <code class=\"inline-code\">it </code>指向 <code class=\"inline-code\">vec </code>的最后一个元素","explanation":"<code class=\"inline-code\">vec.begin()</code>返回指向第一个元素的迭代器，不是最后一个元素。指向最后一个元素应使用<code class=\"inline-code\">vec.end()-1</code>或<code class=\"inline-code\">vec.rbegin()</code>。"}],"answer":[2]},{"id":9,"description":"以下关于 C++ 中的 <code class=\"inline-code\">string::substr()</code>方法，说法正确的是？","explanation":"substr(pos, len)是 string类的成员函数，用于提取从索引 pos开始（从0开始计数）、长度为 len的子串，不会修改原字符串。","choices":[{"id":0,"text":"<code class=\"inline-code\">substr()</code>用于删除字符串中的某一部分","explanation":"<code class=\"inline-code\">substr()</code>用于提取子串，不是删除操作。删除子串应使用<code class=\"inline-code\">erase()</code>方法。"},{"id":1,"text":"<code class=\"inline-code\">substr(pos, len)</code>返回从位置 <code class=\"inline-code\">pos </code>开始，长度为 <code class=\"inline-code\">len </code>的子字符串","explanation":"正确。<code class=\"inline-code\">substr(pos, len)</code>返回从索引<code class=\"inline-code\">pos</code>开始、长度为<code class=\"inline-code\">len</code>的子字符串，返回一个新的string对象，不修改原字符串。"},{"id":2,"text":"<code class=\"inline-code\">substr()</code>只能返回整个字符串","explanation":"<code class=\"inline-code\">substr()</code>可以指定起始位置和长度来提取任意子串，并非只能返回整个字符串。不传参数时<code class=\"inline-code\">substr()</code>会返回整个字符串的副本。"},{"id":3,"text":"<code class=\"inline-code\">substr()</code>方法会修改原字符串","explanation":"<code class=\"inline-code\">substr()</code>不会修改原字符串，它返回一个新创建的string对象作为子串，原字符串保持不变。"}],"answer":[1]},{"id":10,"description":"在 C++ 中使用 C 语言标准库设施时，推荐使用的头文件命名格式是？","explanation":"","choices":[{"id":0,"text":"直接使用 <code class=\"inline-code\">.h</code> 后缀，如 <code class=\"inline-code\">&lt;math.h&gt;</code>","explanation":"直接使用<code class=\"inline-code\">.h</code>后缀的头文件（如<code class=\"inline-code\">&lt;math.h&gt;</code>）在C++中不推荐，因为它将符号放入全局命名空间而非<code class=\"inline-code\">std</code>命名空间。"},{"id":1,"text":"去掉 <code class=\"inline-code\">.h</code> 后缀并在前面加 <code class=\"inline-code\">c</code>，如 <code class=\"inline-code\">&lt;cmath&gt;</code>","explanation":"正确。C++推荐使用<code class=\"inline-code\">c</code>前缀且去掉<code class=\"inline-code\">.h</code>后缀的格式（如<code class=\"inline-code\">&lt;cmath&gt;</code>），这样C库函数会被放入<code class=\"inline-code\">std</code>命名空间中。"},{"id":2,"text":"去掉 <code class=\"inline-code\">.h</code> 后缀并在前面加 <code class=\"inline-code\">cpp</code>，如 <code class=\"inline-code\">&lt;cppmath&gt;</code>","explanation":"C++标准库中没有<code class=\"inline-code\">cpp</code>前缀的头文件命名格式，这不是任何标准中定义的约定。"},{"id":3,"text":"C++ 不支持使用 C 语言标准库","explanation":"C++完全支持使用C语言标准库，只是推荐使用C++风格的头文件命名格式（如<code class=\"inline-code\">&lt;cstdio&gt;</code>而非<code class=\"inline-code\">&lt;stdio.h&gt;</code>）。"}],"answer":[1]},{"id":11,"description":"使用 <code class=\"inline-code\">&lt;cstdio&gt;</code>、<code class=\"inline-code\">&lt;cmath&gt;</code> 等 C++ 标准头文件引入的 C 库函数（如 <code class=\"inline-code\">printf</code>），通常位于哪个命名空间中？","explanation":"","choices":[{"id":0,"text":"global","explanation":"使用<code class=\"inline-code\">&lt;cstdio&gt;</code>等C++风格头文件时，C库函数被放入<code class=\"inline-code\">std</code>命名空间，而非全局命名空间（global）。"},{"id":1,"text":"c_std","explanation":"C++标准库中不存在<code class=\"inline-code\">c_std</code>这个命名空间，这不是有效的命名空间名称。"},{"id":2,"text":"sysu","explanation":"<code class=\"inline-code\">sysu</code>不是C++标准库中的命名空间，这只是一个无关的自定义名称。"},{"id":3,"text":"std","explanation":"正确。使用<code class=\"inline-code\">&lt;cstdio&gt;</code>、<code class=\"inline-code\">&lt;cmath&gt;</code>等C++标准头文件引入的C库函数通常位于<code class=\"inline-code\">std</code>命名空间中，应通过<code class=\"inline-code\">std::printf</code>等方式调用。"}],"answer":[3]},{"id":12,"description":"“回文测试”案例中，为了判断一个字符是否为字母，使用了 <code class=\"inline-code\">&lt;cctype&gt;</code> 库中的哪个函数？","explanation":"","choices":[{"id":0,"text":"isnum()","explanation":"<code class=\"inline-code\">isnum()</code>不是<code class=\"inline-code\">&lt;cctype&gt;</code>库中的函数。判断数字字符的函数是<code class=\"inline-code\">isdigit()</code>。"},{"id":1,"text":"isalpha()","explanation":"正确。<code class=\"inline-code\">isalpha()</code>是<code class=\"inline-code\">&lt;cctype&gt;</code>库中的函数，用于判断一个字符是否为字母（a-z或A-Z），在回文测试中用于过滤非字母字符。"},{"id":2,"text":"ischar()","explanation":"<code class=\"inline-code\">ischar()</code>不是<code class=\"inline-code\">&lt;cctype&gt;</code>库中的标准函数，不存在这个函数名。"},{"id":3,"text":"check\\_alpha()","explanation":"<code class=\"inline-code\">check_alpha()</code>不是<code class=\"inline-code\">&lt;cctype&gt;</code>库中的标准函数，C标准库中没有这个函数。"}],"answer":[1]},{"id":13,"description":"在读取包含空格的字符串（如 &quot;Was it a rat I saw?&quot;）时，使用<code class=\"inline-code\">getline(cin, s)</code> 而不是 <code class=\"inline-code\">cin &gt;&gt; s</code>，这是因为？","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">cin &gt;&gt; s</code> 读取速度太慢","explanation":"<code class=\"inline-code\">cin &gt;&gt; s</code>的问题不在于读取速度，而在于它以空白字符（空格、制表符、换行符）为分隔符读取。"},{"id":1,"text":"<code class=\"inline-code\">getline</code> 是 C 语言的函数，兼容性更好","explanation":"<code class=\"inline-code\">getline</code>是C++标准库中的函数（定义在<code class=\"inline-code\">&lt;string&gt;</code>中），不是C语言的函数。"},{"id":2,"text":"<code class=\"inline-code\">cin &gt;&gt; s</code> 会在遇到空格时停止读取，无法读取整行","explanation":"正确。<code class=\"inline-code\">cin &gt;&gt; s</code>在遇到空格、制表符或换行符时会停止读取，无法读取包含空格的整行字符串；而<code class=\"inline-code\">getline(cin, s)</code>会读取整行直到换行符。"},{"id":3,"text":"<code class=\"inline-code\">getline</code> 不需要包含 <code class=\"inline-code\">&lt;string&gt;</code> 头文件","explanation":"<code class=\"inline-code\">getline(cin, s)</code>使用<code class=\"inline-code\">string</code>类型，需要包含<code class=\"inline-code\">&lt;string&gt;</code>头文件，并非不需要包含。"}],"answer":[2]},{"id":14,"description":"关于 C++ 中的 <code class=\"inline-code\">const</code> 关键字，以下说法正确的是？","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">const</code> 只能用于定义全局变量","explanation":"<code class=\"inline-code\">const</code>可以用于局部变量、全局变量、函数参数、成员函数等多种场景，不限于全局变量。"},{"id":1,"text":"<code class=\"inline-code\">const</code> 变量完全等同于宏定义 (<code class=\"inline-code\">#define</code>)","explanation":"<code class=\"inline-code\">const</code>与<code class=\"inline-code\">#define</code>不同：<code class=\"inline-code\">const</code>有类型检查、遵循作用域规则，而<code class=\"inline-code\">#define</code>只是预处理器文本替换。"},{"id":2,"text":"<code class=\"inline-code\">const</code> 主要限定变量为“只读”（不可修改），但在某些情况下（如函数参数）无法作为编译期常量初始化数组","explanation":"正确。<code class=\"inline-code\">const</code>主要表示变量是\"只读\"的，不可修改。但<code class=\"inline-code\">const</code>变量的值不一定在编译时确定（如通过运行时输入初始化的const变量），因此不能在所有需要编译期常量的场景使用。"},{"id":3,"text":"<code class=\"inline-code\">const</code> 变量的值总是可以在编译时确定","explanation":"<code class=\"inline-code\">const</code>变量的值不一定总是可以在编译时确定，例如<code class=\"inline-code\">const int x = foo();</code>中<code class=\"inline-code\">x</code>的值要在运行时才能确定。"}],"answer":[2]},{"id":15,"description":"C++11 引入 <code class=\"inline-code\">constexpr</code> 关键字的主要目的是什么？","explanation":"","choices":[{"id":0,"text":"用于定义可以被修改的变量","explanation":"<code class=\"inline-code\">constexpr</code>定义的变量是不可修改的常量，不能被修改，而不是\"可以被修改\"。"},{"id":1,"text":"用于声明必须在**编译时**求值（常量表达式）的变量或函数，常用于数组大小初始化","explanation":"正确。<code class=\"inline-code\">constexpr</code>用于声明必须在编译时就能求值的变量或函数，保证结果是常量表达式，常用于数组大小定义、模板参数等需要编译期常量的场景。"},{"id":2,"text":"用于替代 <code class=\"inline-code\">auto</code> 关键字","explanation":"<code class=\"inline-code\">constexpr</code>和<code class=\"inline-code\">auto</code>是完全不同的关键字，<code class=\"inline-code\">auto</code>用于类型推导，<code class=\"inline-code\">constexpr</code>用于编译时常量。"},{"id":3,"text":"用于声明字符串变量","explanation":"<code class=\"inline-code\">constexpr</code>与字符串变量声明无关，声明字符串变量使用<code class=\"inline-code\">string</code>或<code class=\"inline-code\">char[]</code>类型。"}],"answer":[1]},{"id":16,"description":"在 C++11 标准下，如果你想表达“只读”语义，应该用 \\_\\_\\_\\_\\_；如果你想表达“编译期常量”语义，应该用 \\_\\_\\_\\_\\_。","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">const</code>, <code class=\"inline-code\">constexpr</code>","explanation":"正确。<code class=\"inline-code\">const</code>表达\"只读\"语义，表示变量不可被修改；<code class=\"inline-code\">constexpr</code>表达\"编译期常量\"语义，确保值在编译时就能确定。两者在C++11中有明确的分工。"},{"id":1,"text":"<code class=\"inline-code\">constexpr</code>, <code class=\"inline-code\">const</code>","explanation":"顺序反了。<code class=\"inline-code\">constexpr</code>表达的是\"编译期常量\"而非\"只读\"，<code class=\"inline-code\">const</code>才是表达\"只读\"语义的关键字。"},{"id":2,"text":"<code class=\"inline-code\">static</code>, <code class=\"inline-code\">const</code>","explanation":"<code class=\"inline-code\">static</code>用于控制变量的生命周期和可见性（如静态局部变量、静态成员），与\"只读\"语义无关。"},{"id":3,"text":"<code class=\"inline-code\">readonly</code>, <code class=\"inline-code\">const</code>","explanation":"C++中没有<code class=\"inline-code\">readonly</code>关键字（这是C#的关键字），C++使用<code class=\"inline-code\">const</code>来表示只读语义。"}],"answer":[0]},{"id":17,"description":"**关于 C++11 引入的 <code class=\"inline-code\">auto</code> 关键字，以下说法**错误**的是？**","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">auto</code> 是一个占位符，编译器会根据初始化表达式自动推导变量类型","explanation":"该说法正确。<code class=\"inline-code\">auto</code>是类型推导的占位符，编译器会根据初始化表达式的类型来确定变量的实际类型。"},{"id":1,"text":"使用 <code class=\"inline-code\">auto</code> 声明的变量必须进行初始化","explanation":"该说法正确。<code class=\"inline-code\">auto</code>声明的变量必须初始化，因为编译器需要初始化表达式来推导类型。"},{"id":2,"text":"<code class=\"inline-code\">auto</code> 可以用于定义没有初始值的变量，如 <code class=\"inline-code\">auto x;</code>","explanation":"正确（即该说法错误）。<code class=\"inline-code\">auto</code>不能用于定义没有初始值的变量，如<code class=\"inline-code\">auto x;</code>会导致编译错误，因为编译器无法推导类型。"},{"id":3,"text":"<code class=\"inline-code\">auto</code> 常用于简化复杂的类型声明（如迭代器类型）","explanation":"该说法正确。<code class=\"inline-code\">auto</code>常用于简化复杂类型声明，如迭代器类型<code class=\"inline-code\">vector&lt;int&gt;::iterator</code>可以简化为<code class=\"inline-code\">auto</code>。"}],"answer":[2]},{"id":18,"description":"在遍历 <code class=\"inline-code\">vector</code> 容器时，使用 <code class=\"inline-code\">auto</code> 可以简化代码。以下代码片段中 <code class=\"inline-code\">auto i</code> 推导出的类型取决于？<br><br><pre class=\"code-block\"><code>for(auto i : v) { cout &lt;&lt; i; }</code></pre>","explanation":"","choices":[{"id":0,"text":"总是 <code class=\"inline-code\">int</code> 类型","explanation":"<code class=\"inline-code\">auto</code>推导的类型取决于容器元素类型，如果v是<code class=\"inline-code\">vector&lt;string&gt;</code>，则<code class=\"inline-code\">auto i</code>推导为<code class=\"inline-code\">string</code>，不总是<code class=\"inline-code\">int</code>。"},{"id":1,"text":"取决于容器 <code class=\"inline-code\">v</code> 中存储的元素类型","explanation":"正确。在范围for循环<code class=\"inline-code\">for(auto i : v)</code>中，<code class=\"inline-code\">auto</code>推导出的类型取决于容器v中存储的元素类型，例如<code class=\"inline-code\">vector&lt;double&gt;</code>推导出<code class=\"inline-code\">double</code>。"},{"id":2,"text":"总是 <code class=\"inline-code\">string</code> 类型","explanation":"<code class=\"inline-code\">auto</code>推导类型不总是<code class=\"inline-code\">string</code>，它取决于容器中实际存储的元素类型。"},{"id":3,"text":"总是指针类型","explanation":"<code class=\"inline-code\">auto</code>在范围for循环中推导的是元素的值类型，不是指针类型。如需引用或指针需显式使用<code class=\"inline-code\">auto&amp;</code>或<code class=\"inline-code\">auto*</code>。"}],"answer":[1]},{"id":19,"description":"关于 C++ 中的 <code class=\"inline-code\">bool</code> 类型，以下说法正确的是？","explanation":"","choices":[{"id":0,"text":"<code class=\"inline-code\">bool</code> 类型的大小在所有编译器中固定为 1 字节","explanation":"<code class=\"inline-code\">bool</code>类型的大小虽然通常为1字节，但C++标准只保证<code class=\"inline-code\">sizeof(bool)</code>大于等于1，具体大小取决于实现。"},{"id":1,"text":"<code class=\"inline-code\">bool</code> 类型只能存放 <code class=\"inline-code\">true</code> 或 <code class=\"inline-code\">false</code> 两个值","explanation":"正确。<code class=\"inline-code\">bool</code>类型只有两个取值：<code class=\"inline-code\">true</code>和<code class=\"inline-code\">false</code>，这是布尔类型的基本定义。"},{"id":2,"text":"<code class=\"inline-code\">bool</code> 不是 C++ 的关键字，需要引入头文件才能使用","explanation":"<code class=\"inline-code\">bool</code>、<code class=\"inline-code\">true</code>和<code class=\"inline-code\">false</code>都是C++的内置关键字，不需要额外引入头文件即可使用。"},{"id":3,"text":"<code class=\"inline-code\">true</code> 和 <code class=\"inline-code\">false</code> 在 C++ 中分别强制等于 1 和 0，不能作为布尔值使用","explanation":"<code class=\"inline-code\">true</code>和<code class=\"inline-code\">false</code>在C++中就是布尔值，可以直接作为布尔值使用。虽然在数值上下文中<code class=\"inline-code\">true</code>转换为1、<code class=\"inline-code\">false</code>转换为0，但它们本身就是合法的布尔值。"}],"answer":[1]}]},"3":{"title":"25程设II-周3-理论","questions":[{"id":0,"description":"在程序设计中，ADT 的全称是什么？","explanation":"ADT 是 Abstract Data Type 的缩写，即抽象数据类型。","choices":[{"id":0,"text":"Advanced Data Technique","explanation":"Advanced Data Technique不是ADT的全称，这不是计算机科学中的标准术语。"},{"id":1,"text":"Abstract Data Type","explanation":"正确。ADT全称为Abstract Data Type（抽象数据类型），是程序设计中用于描述数据结构和操作的理论模型。"},{"id":2,"text":"Array Data Type","explanation":"Array Data Type不是ADT的全称，数组只是数据结构的一种具体实现形式。"},{"id":3,"text":"Allocated Data Type","explanation":"Allocated Data Type不是ADT的全称，这与内存分配相关，不是抽象数据类型的概念。"}],"answer":[1]},{"id":1,"description":"抽象数据类型（ADT）的数字化描述内容主要包括什么？","explanation":"ADT 描述内容包括属性（关于事物数据特征）和方法（关于事物的行为与操作特征）。","choices":[{"id":0,"text":"仅包含属性（关于事物数据特征）","explanation":"ADT的描述不仅包含属性（数据特征），还包含方法（操作特征），仅包含属性是不完整的。"},{"id":1,"text":"仅包含方法（关于事物的行为与操作特征）","explanation":"ADT的描述不仅包含方法（操作特征），还包含属性（数据特征），仅包含方法是不完整的。"},{"id":2,"text":"包含属性（数据特征）和方法（操作特征）","explanation":"正确。ADT的数字化描述包括两个方面：属性（描述事物的数据特征，即\"有什么\"）和方法（描述事物的行为与操作特征，即\"能做什么\"）。"},{"id":3,"text":"包含内存地址与指针操作","explanation":"ADT是抽象层面的概念描述，不涉及具体的内存地址和指针操作等底层实现细节。"}],"answer":[2]},{"id":2,"description":"在 C++ 中，<code class=\"inline-code\">class</code> 关键字定义的类成员，如果没有显式指定访问说明符，默认的访问权限是？","explanation":"在 C++ 中，<code class=\"inline-code\">class</code> 默认权限是 <code class=\"inline-code\">private</code>，而 <code class=\"inline-code\">struct</code> 默认权限是 <code class=\"inline-code\">public</code>。","choices":[{"id":0,"text":"public","explanation":"<code class=\"inline-code\">public</code>是<code class=\"inline-code\">struct</code>的默认访问权限，不是<code class=\"inline-code\">class</code>的默认权限。"},{"id":1,"text":"private","explanation":"正确。在C++中，使用<code class=\"inline-code\">class</code>关键字定义的类，如果没有显式指定访问说明符，所有成员默认为<code class=\"inline-code\">private</code>（私有），外部不能直接访问。"},{"id":2,"text":"protected","explanation":"<code class=\"inline-code\">protected</code>不是任何类关键字的默认访问权限，它用于继承体系中控制派生类的访问。"},{"id":3,"text":"static","explanation":"<code class=\"inline-code\">static</code>不是访问说明符，而是存储类别说明符，用于声明静态成员。C++的访问说明符只有public、private和protected。"}],"answer":[1]},{"id":3,"description":"在 C++ 中，<code class=\"inline-code\">struct</code> 关键字定义的类成员，如果没有显式指定访问说明符，默认的访问权限是？","explanation":"<code class=\"inline-code\">struct</code> 定义的类成员默认是公有的（public）。","choices":[{"id":0,"text":"public","explanation":"正确。在C++中，使用<code class=\"inline-code\">struct</code>关键字定义的类型，如果没有显式指定访问说明符，所有成员默认为<code class=\"inline-code\">public</code>（公有），这是struct与class的主要区别之一。"},{"id":1,"text":"private","explanation":"<code class=\"inline-code\">private</code>是<code class=\"inline-code\">class</code>关键字的默认访问权限，而不是<code class=\"inline-code\">struct</code>的。"},{"id":2,"text":"protected","explanation":"<code class=\"inline-code\">protected</code>不是struct的默认访问权限，struct默认是public。"},{"id":3,"text":"inline","explanation":"<code class=\"inline-code\">inline</code>不是访问说明符，而是用于提示编译器进行内联展开的说明符，与访问权限无关。"}],"answer":[0]},{"id":4,"description":"关于 C 语言和 C++ 中的 <code class=\"inline-code\">struct</code>，以下说法正确的是？","explanation":"C 语言结构体只能包含变量；C++ 中的 <code class=\"inline-code\">struct</code> 本质上是一种类，可以包含成员函数。","choices":[{"id":0,"text":"C 语言的 struct 可以包含成员函数","explanation":"C语言的struct只能包含数据成员（变量），不能包含成员函数，这是C与C++结构体的重要区别。"},{"id":1,"text":"C++ 的 struct 只能包含成员变量，不能包含成员函数","explanation":"C++的struct本质上是一种类（只是默认访问权限为public），它既可以包含成员变量，也可以包含成员函数。"},{"id":2,"text":"C++ 的 struct既可以包含成员变量，也可以包含成员函数","explanation":"正确。C++中的<code class=\"inline-code\">struct</code>是一种类，与<code class=\"inline-code\">class</code>功能相同（仅默认访问权限不同），因此既可以包含成员变量，也可以包含成员函数。"},{"id":3,"text":"两者的语法和语义没有任何区别","explanation":"C语言的struct只能包含数据成员且默认public，而C++的struct可以包含成员函数且有完整的类特性，两者存在显著差异。"}],"answer":[2]},{"id":5,"description":"用于表示类成员仅对象内部可访问，对象使用者不可直接访问的关键字是？","explanation":"<code class=\"inline-code\">private</code> 关键字用于实现封装中的信息隐藏。","choices":[{"id":0,"text":"public","explanation":"<code class=\"inline-code\">public</code>表示公有成员，对象外部可以直接访问，与\"仅对象内部可访问\"的描述相反。"},{"id":1,"text":"private","explanation":"正确。<code class=\"inline-code\">private</code>关键字表示私有成员，只能在类的内部（成员函数中）访问，对象外部不能直接访问，实现了封装中的信息隐藏。"},{"id":2,"text":"protected","explanation":"<code class=\"inline-code\">protected</code>表示受保护成员，类内部和派生类可以访问，但对象外部不能直接访问。它的范围比private更宽。"},{"id":3,"text":"hidden","explanation":"<code class=\"inline-code\">hidden</code>不是C++中的访问说明符关键字，C++只有public、private和protected三种访问说明符。"}],"answer":[1]},{"id":6,"description":"在类的外部定义成员函数时，需要使用什么运算符来指明该函数属于哪个类？","explanation":"<code class=\"inline-code\">::</code> 是作用域解析运算符，用于在类外实现成员函数。","choices":[{"id":0,"text":".","explanation":"<code class=\"inline-code\">.</code>是成员访问运算符（点运算符），用于通过对象实例访问成员，不能用于在类外部定义成员函数时指明所属类。"},{"id":1,"text":"-&gt;","explanation":"<code class=\"inline-code\">-&gt;</code>是箭头运算符，用于通过指针访问成员，不能用于在类外部定义成员函数时指明所属类。"},{"id":2,"text":"::","explanation":"正确。<code class=\"inline-code\">::</code>是作用域解析运算符（Scope Resolution Operator），在类外部定义成员函数时使用，如<code class=\"inline-code\">void MyClass::myFunction()</code>表明该函数属于MyClass类。"},{"id":3,"text":":","explanation":"单个冒号<code class=\"inline-code\">:</code>在C++中用于继承列表或成员初始化列表，不是作用域解析运算符。"}],"answer":[2]},{"id":7,"description":"在 C++ 中，如果将成员函数的实现直接写在类定义的 <code class=\"inline-code\">{}</code> 内部，该函数会被视为？","explanation":"在类声明中定义的函数会被编译器处理为内联函数，以提高运行效率。","choices":[{"id":0,"text":"外部函数","explanation":"外部函数是指在类外部定义的函数实现，而题目描述的是在类定义内部直接实现函数，恰恰相反。"},{"id":1,"text":"纯虚函数","explanation":"纯虚函数是用<code class=\"inline-code\">= 0</code>声明的虚函数（如<code class=\"inline-code\">virtual void f() = 0;</code>），与在类内部定义函数体无关。"},{"id":2,"text":"内联函数 (inline)","explanation":"正确。在类定义的<code class=\"inline-code\">{}</code>内部直接实现的成员函数会被编译器隐式视为内联函数（inline），编译器可能将其代码直接嵌入调用处以减少函数调用开销。"},{"id":3,"text":"静态函数","explanation":"静态函数是用<code class=\"inline-code\">static</code>关键字声明的成员函数，与在类内部定义函数体无关。"}],"answer":[2]},{"id":8,"description":"在成员函数声明的末尾加上 <code class=\"inline-code\">const</code> 关键字（如 <code class=\"inline-code\">int getYear() const;</code>），这表示什么含义？","explanation":"<code class=\"inline-code\">const</code> 成员函数承诺不修改对象的数据成员。","choices":[{"id":0,"text":"该函数返回一个常量","explanation":"函数返回值是否为常量由返回类型决定（如<code class=\"inline-code\">const int getYear()</code>），末尾的<code class=\"inline-code\">const</code>修饰的是函数本身而非返回值。"},{"id":1,"text":"该函数不能被外部调用","explanation":"<code class=\"inline-code\">const</code>成员函数可以被外部调用，而且<code class=\"inline-code\">const</code>对象只能调用<code class=\"inline-code\">const</code>成员函数。"},{"id":2,"text":"该函数不能修改类的数据成员","explanation":"正确。末尾的<code class=\"inline-code\">const</code>表示该成员函数承诺不会修改类的任何非mutable数据成员，是一种只读操作的保证，使得const对象也能调用该函数。"},{"id":3,"text":"该函数的运行速度更快","explanation":"<code class=\"inline-code\">const</code>修饰符不影响函数的运行速度，它只是一个编译期的约束，保证函数不会修改对象的状态。"}],"answer":[2]},{"id":9,"description":"若有 <code class=\"inline-code\">DATE date1;</code>，要调用 <code class=\"inline-code\">date1</code> 的公有成员函数 <code class=\"inline-code\">Set</code>，正确的语法是？","explanation":"普通对象使用点运算符 <code class=\"inline-code\">.</code> 来访问公有成员。","choices":[{"id":0,"text":"date1-&gt;Set(2023, 10, 1);","explanation":"<code class=\"inline-code\">-&gt;</code>是箭头运算符，用于通过对象指针访问成员。<code class=\"inline-code\">date1</code>是普通对象而非指针，应使用点运算符。"},{"id":1,"text":"date1.Set(2023, 10, 1);","explanation":"正确。<code class=\"inline-code\">date1</code>是一个普通对象（非指针），使用点运算符<code class=\"inline-code\">.</code>来调用其公有成员函数，语法为<code class=\"inline-code\">date1.Set(2023, 10, 1)</code>。"},{"id":2,"text":"DATE::Set(2023, 10, 1);","explanation":"<code class=\"inline-code\">DATE::Set()</code>是作用域解析运算符的用法，用于类外部定义成员函数或调用静态成员函数，不能用于通过对象调用普通成员函数。"},{"id":3,"text":"Set(date1, 2023, 10, 1);","explanation":"<code class=\"inline-code\">Set(date1, 2023, 10, 1)</code>是普通函数调用的语法，不是调用对象成员函数的正确方式。"}],"answer":[1]},{"id":10,"description":"以下关于对象的描述，错误的是？","explanation":"类是蓝图（不占数据空间），对象才是根据蓝图创建的实例。","choices":[{"id":0,"text":"对象是类的实例","explanation":"该说法正确。对象是类的实例化结果，类定义了一个类型，而对象是该类型的具体变量。"},{"id":1,"text":"类定义的变量称为对象","explanation":"该说法正确。用类类型定义的变量就是对象，例如<code class=\"inline-code\">DATE date1;</code>中的<code class=\"inline-code\">date1</code>就是DATE类的对象。"},{"id":2,"text":"类和对象是同一个概念，本质就是存有实际数据的模板","explanation":"正确（即该说法错误）。类和对象不是同一个概念：类是一种类型定义（蓝图/模板），不占用数据存储空间；对象是类的具体实例，占用实际内存。"},{"id":3,"text":"自动对象的默认初始化值为不确定","explanation":"该说法正确。自动存储期（局部）的对象如果没有显式初始化，其成员的值是不确定的（与内置类型行为一致）。"}],"answer":[2]},{"id":11,"description":"假设 <code class=\"inline-code\">month</code> 是 <code class=\"inline-code\">DATE</code> 类的私有成员，以下哪种做法可以在类外部访问或修改它？","explanation":"私有成员只能通过类提供的公有接口（Getter/Setter）来间接操作。","choices":[{"id":0,"text":"直接通过 <code class=\"inline-code\">date1.month = 10;</code> 赋值","explanation":"私有成员不能在类外部直接访问，<code class=\"inline-code\">date1.month = 10;</code>会导致编译错误，违反了封装原则。"},{"id":1,"text":"编写公有成员函数（如 <code class=\"inline-code\">getMonth()</code> 和 <code class=\"inline-code\">Set()</code>）供外部调用","explanation":"正确。私有成员不能直接访问，但可以通过类提供的公有成员函数（如Getter和Setter）来间接读取或修改私有数据，这是封装的标准做法。"},{"id":2,"text":"使用 <code class=\"inline-code\">DATE::month</code> 访问","explanation":"<code class=\"inline-code\">DATE::month</code>使用作用域解析运算符只能访问静态成员，不能访问非静态的私有成员变量。"},{"id":3,"text":"无法在外部以任何方式获取其值","explanation":"虽然不能直接访问私有成员，但可以通过类提供的公有接口（如Getter函数）来间接获取私有成员的值，并非完全无法获取。"}],"answer":[1]},{"id":12,"description":"将数据与操作数据的函数绑定在一起，并隐藏内部实现细节的过程，这体现了面向对象编程的哪种特性？","explanation":"封装（Encapsulation）的作用就是将属性和行为结合，并控制访问权限。","choices":[{"id":0,"text":"继承","explanation":"继承（Inheritance）是指一个类可以继承另一个类的属性和方法，实现代码复用和层次关系，不是数据与函数的绑定和隐藏。"},{"id":1,"text":"多态","explanation":"多态（Polymorphism）是指同一接口可以有不同的实现形式（如函数重载、虚函数），不是数据与函数的绑定和隐藏。"},{"id":2,"text":"封装","explanation":"正确。封装（Encapsulation）将数据（属性）和操作数据的函数（方法）绑定在一起作为一个整体，并通过访问控制（public/private）隐藏内部实现细节，只暴露必要的接口。"},{"id":3,"text":"泛型","explanation":"泛型（Generic Programming）是指编写不依赖于具体数据类型的通用代码（如模板），不是数据与函数的绑定和隐藏。"}],"answer":[2]},{"id":13,"description":"在 C++ 类的常规设计中，类的声明（包含成员变量和函数原型）通常放在哪种文件中？","explanation":"通常声明放在头文件（.h 或 .hpp），实现放在源文件（.cpp）。","choices":[{"id":0,"text":".cpp 文件","explanation":"<code class=\"inline-code\">.cpp</code>文件通常用于存放类的成员函数的具体实现（定义），而不是类的声明。"},{"id":1,"text":".hpp 或 .h 文件","explanation":"正确。类的声明（包含成员变量和函数原型的定义）通常放在头文件（<code class=\"inline-code\">.h</code>或<code class=\"inline-code\">.hpp</code>）中，方便其他文件通过<code class=\"inline-code\">#include</code>引入使用。"},{"id":2,"text":".txt 文件","explanation":"<code class=\"inline-code\">.txt</code>是纯文本文件格式，不是C++项目中用于存放类声明的标准文件格式。"},{"id":3,"text":".exe 文件","explanation":"<code class=\"inline-code\">.exe</code>是编译后的可执行文件格式，不能用于存放类声明或任何源代码内容。"}],"answer":[1]},{"id":14,"description":"如果 <code class=\"inline-code\">DATE.cpp</code> 中需要使用到 <code class=\"inline-code\">DATE.hpp</code> 中定义的类声明，应该在该 <code class=\"inline-code\">.cpp</code> 文件的开头添加什么？","explanation":"使用 <code class=\"inline-code\">#include</code> 预处理命令引入自定义头文件。","choices":[{"id":0,"text":"import DATE.hpp;","explanation":"<code class=\"inline-code\">import</code>是Java/Python等语言中引入模块的语法，C++中不使用<code class=\"inline-code\">import</code>来包含头文件（C++20的modules是另一回事）。"},{"id":1,"text":"using DATE.hpp;","explanation":"<code class=\"inline-code\">using</code>在C++中用于引入命名空间（如<code class=\"inline-code\">using namespace std;</code>），不是用来引入头文件的。"},{"id":2,"text":"#include &quot;DATE.hpp&quot;","explanation":"正确。使用<code class=\"inline-code\">#include \"DATE.hpp\"</code>预处理命令将自定义头文件的内容引入到<code class=\"inline-code\">.cpp</code>文件中。自定义头文件使用双引号，系统头文件使用尖括号。"},{"id":3,"text":"#define DATE.hpp","explanation":"<code class=\"inline-code\">#define</code>是宏定义预处理指令，用于定义宏常量或宏函数，不是用来引入头文件的。"}],"answer":[2]},{"id":15,"description":"以下哪一项不是 C++ 中的类关键字（用于定义类的关键字）？","explanation":"C++ 的类关键字包括 class、struct 和 union；object 是对象，不是关键字。","choices":[{"id":0,"text":"class","explanation":"<code class=\"inline-code\">class</code>是C++中最基本的类定义关键字，默认访问权限为private。"},{"id":1,"text":"struct","explanation":"<code class=\"inline-code\">struct</code>在C++中也是一种类定义关键字，与class类似但默认访问权限为public。"},{"id":2,"text":"union","explanation":"<code class=\"inline-code\">union</code>是C++中的联合体关键字，也是一种特殊的类类型（所有成员共享同一块内存），属于类关键字。"},{"id":3,"text":"object","explanation":"正确。<code class=\"inline-code\">object</code>不是C++中的关键字，它只是一个通用的编程术语（指类的实例）。C++中用于定义类的关键字只有class、struct和union。"}],"answer":[3]},{"id":16,"description":"<code class=\"inline-code\">void DATE::Increment() { day++; ... }</code> 中的 <code class=\"inline-code\">DATE::</code> 的作用是什么？","explanation":"这是作用域限定符，告诉编译器该函数属于哪个类。","choices":[{"id":0,"text":"声明这是一个新的数据类型","explanation":"<code class=\"inline-code\">DATE::</code>不是声明新的数据类型，它只是作用域限定符，用于指明函数所属的类。"},{"id":1,"text":"指明 <code class=\"inline-code\">Increment</code> 是类 <code class=\"inline-code\">DATE</code> 里的成员函数","explanation":"正确。<code class=\"inline-code\">DATE::</code>是作用域限定符，告诉编译器<code class=\"inline-code\">Increment</code>函数是<code class=\"inline-code\">DATE</code>类的成员函数，用于在类外部实现成员函数时指明其归属。"},{"id":2,"text":"定义类的私有数据成员","explanation":"定义类的私有数据成员是在类定义的花括号内完成的，不是在类外部用<code class=\"inline-code\">::</code>来定义的。"},{"id":3,"text":"创建一个类的对象","explanation":"创建类的对象使用类名加变量名的方式（如<code class=\"inline-code\">DATE date1;</code>），与<code class=\"inline-code\">::</code>运算符无关。"}],"answer":[1]},{"id":17,"description":"“抽象”在人们认知事物中的主要意义是？","explanation":"抽象是过滤次要细节，抓取本质特征的过程。","choices":[{"id":0,"text":"将事物变得更加复杂化和数据化","explanation":"抽象的目的不是使事物更复杂化，恰恰相反，抽象是为了简化认知，去除不必要的细节。"},{"id":1,"text":"舍弃本质特征，保留表面现象进行描述","explanation":"描述恰好相反：抽象是舍弃非本质的表面特征，保留本质特征，而非\"舍弃本质保留表面\"。"},{"id":2,"text":"透过事物的现象获得它的本质，通过本质识别或区分事物","explanation":"正确。抽象是透过事物的现象提取其本质特征的过程，通过本质特征来识别和区分不同类型的事物，忽略与当前问题无关的细节。"},{"id":3,"text":"为事物分配计算机语言中的内存地址","explanation":"抽象是一种思维方法和认知过程，与具体的内存地址分配无关，内存分配是底层实现细节。"}],"answer":[2]},{"id":18,"description":"关于客户端代码（Client code），描述正确的是？","explanation":"类是被使用的，使用该类的代码（如 main 函数所在的程序）就是该类的客户端。","choices":[{"id":0,"text":"它是指操作系统的内核运行代码","explanation":"客户端代码不是操作系统内核代码，而是使用某个类或模块的应用层代码。"},{"id":1,"text":"使用类的软件（即调用类对象及其公有方法的代码）称为客户端代码","explanation":"正确。客户端代码（Client code）是指使用某个类或模块的代码，例如<code class=\"inline-code\">main()</code>函数中创建类的对象并调用其公有方法的代码。\"客户端\"指的是服务的使用者。"},{"id":2,"text":"它是指实现类内部实现细节的函数库代码","explanation":"实现类内部细节的函数库代码属于类的实现代码（implementation），不是客户端代码。客户端代码是使用类的外部代码。"},{"id":3,"text":"客户端代码可以直接无视权限访问类的私有数据成员","explanation":"客户端代码只能通过类提供的公有接口访问对象，不能直接无视权限访问私有数据成员，否则就破坏了封装性。"}],"answer":[1]},{"id":19,"description":"观察代码：<code class=\"inline-code\">DATE date1, date2;</code> 这里的 <code class=\"inline-code\">date1</code> 和 <code class=\"inline-code\">date2</code> 被称作什么？","explanation":"类定义的变量就是对象。","choices":[{"id":0,"text":"类 (Class)","explanation":"<code class=\"inline-code\">DATE</code>才是类（Class），而<code class=\"inline-code\">date1</code>和<code class=\"inline-code\">date2</code>是用DATE类定义的变量，不是类本身。"},{"id":1,"text":"函数 (Function)","explanation":"<code class=\"inline-code\">date1</code>和<code class=\"inline-code\">date2</code>是变量/对象，不是函数。函数是用返回类型和参数列表定义的。"},{"id":2,"text":"抽象数据类型 (ADT)","explanation":"ADT（抽象数据类型）是理论层面的概念描述，<code class=\"inline-code\">date1</code>和<code class=\"inline-code\">date2</code>是具体的变量实例，不是ADT本身。"},{"id":3,"text":"对象 (Object) 或实例 (Instance)","explanation":"正确。<code class=\"inline-code\">date1</code>和<code class=\"inline-code\">date2</code>是用DATE类定义的变量，称为DATE类的对象（Object）或实例（Instance），是类的具体化。"}],"answer":[3]}]},"4":{"title":"25程设Ⅱ-周4-理论题","questions":[{"id":0,"description":"一个类可以有多少个构造函数","explanation":"一个类可以有任意多个构造函数，但一个类的实例能且只能调用一次构造函数","choices":[{"id":0,"text":"1","explanation":"1个构造函数太少，C++支持构造函数重载，一个类可以拥有多个不同参数列表的构造函数。"},{"id":1,"text":"2","explanation":"2个并非上限，C++允许通过重载定义任意多个构造函数。"},{"id":2,"text":"3","explanation":"3个也不是上限，只要参数列表不同，就可以继续重载构造函数。"},{"id":3,"text":"任意多个","explanation":"正确。C++支持构造函数重载，只要参数个数或类型不同，一个类可以定义任意多个构造函数。"}],"answer":[3]},{"id":1,"description":"一个类可以有多少个析构函数","explanation":"本质上是因为析构函数不能传参，因此有且仅有一个析构函数签名","choices":[{"id":0,"text":"1","explanation":"正确。每个类只能有一个析构函数，它不接受任何参数，因此无法重载。"},{"id":1,"text":"2","explanation":"析构函数不能重载，一个类只能有1个析构函数，不能有2个。"},{"id":2,"text":"3","explanation":"析构函数无参数、无返回值，无法重载，因此不可能有3个。"},{"id":3,"text":"任意多个","explanation":"析构函数不能带参数，因此不能像构造函数那样进行重载，一个类只能有1个析构函数。"}],"answer":[0]},{"id":2,"description":"下列C++代码的输出是什么<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\nclass TEST {\n    int a, b, c; \n}\nint main() {\n    TEST test;\n    cout &lt;&lt; &quot;In main()\\n&quot;;\n    return 0;\n}</code></pre>","explanation":"类的声明部分的{ }之后应该用分号 ; 结尾。","choices":[{"id":0,"text":"In main()","explanation":"代码存在语法错误，类定义末尾缺少分号，无法正常编译输出。"},{"id":1,"text":"In main()\\n","explanation":"代码无法编译通过，不会有任何输出。"},{"id":2,"text":"编译错误","explanation":"正确。类定义 <code class=\"inline-code\">class TEST { ... }</code> 后面缺少分号，C++要求类定义必须以分号结尾，否则编译错误。"},{"id":3,"text":"段错误（Segmentation Fault）","explanation":"段错误是运行时错误，而本题代码在编译阶段就会因为缺少分号而失败。"}],"answer":[2]},{"id":3,"description":"下列C++代码的输出是什么<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\nclass A{\nprivate:\n    int a, b, c; \npublic:\n    A(int a, int b, int c) {\n        this-&gt;a = a;\n        this-&gt;b = b;\n        this-&gt;c = c;\n        cout &lt;&lt; &quot;A&quot; &lt;&lt; endl;\n    }\n    ~A() {\n        cout &lt;&lt; &quot;~A&quot; &lt;&lt; endl;\n    }\n};\nint main() {\n    A test;\n    return 0;\n}</code></pre>","explanation":"显示声明了构造函数，因此编译器不会自动补上默认构造函数，因此编译报错：类 &quot;A&quot; 不存在默认构造函数","choices":[{"id":0,"text":"A<br>~A","explanation":"代码无法编译。<code class=\"inline-code\">main</code>中<code class=\"inline-code\">A test;</code>调用无参构造函数，但类A只定义了有参构造函数，缺少默认构造函数。"},{"id":1,"text":"A","explanation":"同理，由于没有默认构造函数，<code class=\"inline-code\">A test;</code>无法编译，不会输出\"A\"。"},{"id":2,"text":"~A","explanation":"代码编译不通过，不会有任何输出。"},{"id":3,"text":"编译错误","explanation":"正确。类A只定义了带三个参数的构造函数<code class=\"inline-code\">A(int,int,int)</code>，而<code class=\"inline-code\">A test;</code>试图调用无参构造，编译器找不到匹配的构造函数，因此编译错误。"}],"answer":[3]},{"id":4,"description":"下列C++代码的输出是什么<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\nclass A{\n    int a, b, c; \n    A() {\n        cout &lt;&lt; &quot;A1&quot; &lt;&lt; endl;\n    }\n    A(int a, int b, int c) {\n        this-&gt;a = a;\n        this-&gt;b = b;\n        this-&gt;c = c;\n        cout &lt;&lt; &quot;A2&quot; &lt;&lt; endl;\n    }\n    ~A() {\n        cout &lt;&lt; &quot;~A&quot; &lt;&lt; endl;\n    }\n};\nint main() {\n    A test;\n    return 0;\n}</code></pre>","explanation":"类的声明里没有显式访问控制时默认为private，导致main函数无法访问默认构造函数，编译报错：&quot;A::A()&quot; 不可访问","choices":[{"id":0,"text":"A1<br>~A","explanation":"代码编译不通过，因为构造函数是<code class=\"inline-code\">private</code>的，外部无法访问。"},{"id":1,"text":"A2<br>~A","explanation":"即使有匹配的构造函数，由于其访问权限为<code class=\"inline-code\">private</code>，<code class=\"inline-code\">main</code>中无法调用。"},{"id":2,"text":"A1<br>A2<br>~A","explanation":"构造函数为私有，外部不可调用，编译阶段就会报错。"},{"id":3,"text":"编译错误","explanation":"正确。类A的所有构造函数都声明为<code class=\"inline-code\">private</code>，而<code class=\"inline-code\">main</code>函数中<code class=\"inline-code\">A test;</code>在类外部试图调用构造函数，因权限不足导致编译错误。"}],"answer":[3]},{"id":5,"description":"下列C++代码的输出是什么<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\n#include &lt;string&gt;\nusing namespace std;\n\nclass A{\n    string name;\npublic:\n    A(string name) {\n        this-&gt;name = name;\n        cout &lt;&lt; &quot;A(&quot; &lt;&lt; name &lt;&lt; &quot;)&quot; &lt;&lt; endl;\n    }\n    ~A() {\n        cout &lt;&lt; &quot;~A(&quot; &lt;&lt; name &lt;&lt; &quot;)&quot; &lt;&lt; endl;\n    }\n};\n\nint main() {\n    A a1(&quot;a1&quot;), a2(&quot;a2&quot;);\n    return 0;\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"A(a1)<br>A(a2)<br>~A(a2)<br>~A(a1)","explanation":"正确。构造顺序为先a1后a2；析构顺序与构造相反，先析构a2再析构a1。因此输出A(a1)、A(a2)、~A(a2)、~A(a1)。"},{"id":1,"text":"A(a1)<br>A(a2)<br>~A(a1)<br>~A(a2)","explanation":"析构顺序与构造顺序相同是错误的。C++栈上局部对象的析构顺序与构造顺序相反。"},{"id":2,"text":"A(a1)<br>~A(a1)<br>A(a2)<br>~A(a2)","explanation":"a1和a2都在main作用域，不会在构造后立即析构，而是等main结束时才依次析构。"},{"id":3,"text":"编译错误","explanation":"代码语法正确，构造函数和析构函数均为public，可以正常编译运行。"}],"answer":[0]},{"id":6,"description":"下列C++代码的输出是什么<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass A{\n    string name;\npublic:\n    A(string name) {\n        this-&gt;name = name;\n        cout &lt;&lt; &quot;A(&quot; &lt;&lt; name &lt;&lt; &quot;)&quot; &lt;&lt; endl;\n    }\n    ~A() {\n        cout &lt;&lt; &quot;~A(&quot; &lt;&lt; name &lt;&lt; &quot;)&quot; &lt;&lt; endl;\n    }\n};\n\nint main() {\n    A a1(&quot;a1&quot;);\n    { A a2(&quot;a2&quot;); }\n    A a3(&quot;a3&quot;);\n    return 0;\n}</code></pre>","explanation":"{}的出现影响了a2的生命周期，使其提前被回收，因此提前调用析构函数","choices":[{"id":0,"text":"A(a1)<br>A(a2)<br>A(a3)<br>~A(a2)<br>~A(a3)<br>~A(a1)","explanation":"a2在独立作用域块内创建和销毁，~A(a2)应在A(a3)之前输出，而不是之后。"},{"id":1,"text":"A(a1)<br>A(a2)<br>~A(a2)<br>A(a3)<br>~A(a3)<br>~A(a1)","explanation":"正确。a1先构造；进入内层作用域构造a2；离开内层作用域析构a2；然后构造a3；main结束时先析构a3再析构a1。"},{"id":2,"text":"A(a1)<br>~A(a1)<br>A(a2)<br>~A(a2)<br>A(a3)<br>~A(a3)","explanation":"a1在main结束时才析构，不会在构造后立即析构。每个对象的构造和析构时间点由作用域决定。"},{"id":3,"text":"编译错误","explanation":"代码语法基本正确，缺少<code class=\"inline-code\">#include &lt;string&gt;</code>在某些编译器上可能有警告，但不影响编译。"}],"answer":[1]},{"id":7,"description":"下列C++代码的输出是什么<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass A{\n    int a = 0;\n    int b = 0;\n    int c = 0;\npublic:\n    A(int a, int b = 1, int c = 1) {\n        this-&gt;a = a;\n        this-&gt;b = b;\n    }\n    ~A() {\n        cout &lt;&lt; a &lt;&lt; b &lt;&lt; c &lt;&lt; endl;\n    }\n};\n\nint main() {\n    A a(2,2,2);\n    return 0;\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"000","explanation":"构造函数中<code class=\"inline-code\">this-&gt;a = a</code>和<code class=\"inline-code\">this-&gt;b = b</code>已将a和b赋值为2，不会是000。"},{"id":1,"text":"222","explanation":"构造函数体内只赋值了a和b，并没有赋值c，所以c保持默认值0，不会是222。"},{"id":2,"text":"220","explanation":"正确。构造函数只将参数a和b赋值给成员变量，参数c虽传入但未赋值给成员c。成员c使用类内默认值0，输出220。"},{"id":3,"text":"211","explanation":"c没有被构造函数赋值，保持类内初始值0。b被赋值为2而非默认参数1。"}],"answer":[2]},{"id":8,"description":"下列C++代码的输出是什么<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass A{\n    int a = 0;\n    int b = 0;\n    int c = 0;\npublic:\n    A(int a, int b = 1, int c = 1){\n        this-&gt;a = a;\n        this-&gt;b = b;\n        this-&gt;c = c;\n    }\n    ~A() {\n        cout &lt;&lt; a &lt;&lt; b &lt;&lt; c &lt;&lt; endl;\n    }\n};\n\nint main() {\n    A a(2,2,2);\n    return 0;\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"221","explanation":"构造函数体内明确执行了<code class=\"inline-code\">this-&gt;c = c</code>，参数c为2，所以c应该是2而不是1。"},{"id":1,"text":"222","explanation":"正确。构造函数中将a、b、c三个参数全部赋值给对应成员变量，传入(2,2,2)，因此输出222。"},{"id":2,"text":"000","explanation":"三个成员都在构造函数中被赋值为2，不会保持默认值000。"},{"id":3,"text":"111","explanation":"构造函数使用传入参数赋值，默认参数值1不会生效（因为实参已提供），不会输出111。"}],"answer":[1]},{"id":9,"description":"下列C++代码的输出是什么<br><br><pre class=\"code-block\"><code>#include &lt;iostream&gt;\nusing namespace std;\n\nclass A{\n    int a = 0;\n    int b = 0;\n    int c = 0;\npublic:\n    A(int a, int b = 1, int c = 1) {\n        this-&gt;a = a;\n        this-&gt;b = b;\n        this-&gt;c = c;\n    }\n    ~A() {\n        cout &lt;&lt; a &lt;&lt; b &lt;&lt; c &lt;&lt; endl;\n    }\n};\n\nint main() {\n    A a(3);\n    return 0;\n}</code></pre>","explanation":"","choices":[{"id":0,"text":"111","explanation":"a被赋值为3，不会是1。b和c使用默认参数值1，但a显然不是1。"},{"id":1,"text":"331","explanation":"b使用默认参数值1，不是3。构造函数只赋值a和b，b的默认参数是1。"},{"id":2,"text":"313","explanation":"构造函数只赋值了a和b，c保持类内默认值0，不是3。实际上c=0而非1，所以313不对。"},{"id":3,"text":"311","explanation":"正确。调用<code class=\"inline-code\">A(3)</code>时，a=3，b和c使用默认参数值1。构造函数赋值a=3、b=1、c=1，输出311。"}],"answer":[3]},{"id":10,"description":"以下关于构造函数的描述，错误的是？","explanation":"构造函数是可以重载的","choices":[{"id":0,"text":"构造函数的名称必须与类名相同","explanation":"正确说法。构造函数的名称必须与类名相同，这是C++语法规定。"},{"id":1,"text":"构造函数不能有返回值类型，包括 <code class=\"inline-code\">void</code>","explanation":"正确说法。构造函数没有返回类型，连<code class=\"inline-code\">void</code>都不能写。"},{"id":2,"text":"构造函数不能重载","explanation":"错误说法，即本题答案。构造函数可以重载，一个类可以有多个构造函数，只要参数列表不同即可。"},{"id":3,"text":"构造函数可以有默认参数","explanation":"正确说法。构造函数的参数可以有默认值，例如<code class=\"inline-code\">A(int x=0)</code>是合法的。"}],"answer":[2]},{"id":11,"description":"下面关于析构函数的说法，正确的是？","explanation":"","choices":[{"id":0,"text":"析构函数必须由程序员手动调用","explanation":"析构函数由系统自动调用，栈对象离开作用域时自动调用，堆对象通过delete调用，不需要手动调用。"},{"id":1,"text":"如果一个类没有析构函数，编译器不会生成默认析构函数","explanation":"如果程序员未定义析构函数，编译器会自动生成一个默认的析构函数。"},{"id":2,"text":"析构函数通常用于释放动态分配的内存","explanation":"正确。析构函数通常用于释放动态分配的内存、关闭文件等资源清理工作。"},{"id":3,"text":"析构函数不能为 <code class=\"inline-code\">private</code>","explanation":"析构函数可以是<code class=\"inline-code\">private</code>的，这在某些设计模式（如单例模式）中会用到。"}],"answer":[2]},{"id":12,"description":"下面哪个函数不能访问 <code class=\"inline-code\">this</code> 指针？","explanation":"静态成员函数不依赖对象","choices":[{"id":0,"text":"普通成员函数","explanation":"普通成员函数可以访问<code class=\"inline-code\">this</code>指针，<code class=\"inline-code\">this</code>指向调用该函数的对象。"},{"id":1,"text":"构造函数","explanation":"构造函数中也可以使用<code class=\"inline-code\">this</code>指针，它指向正在构造的对象。"},{"id":2,"text":"虚函数","explanation":"虚函数也是成员函数，通过<code class=\"inline-code\">this</code>指针实现动态绑定，可以访问<code class=\"inline-code\">this</code>。"},{"id":3,"text":"静态成员函数","explanation":"正确。静态成员函数不属于任何对象，没有<code class=\"inline-code\">this</code>指针，因此不能访问<code class=\"inline-code\">this</code>。"}],"answer":[3]},{"id":13,"description":"以下关于静态成员变量的描述，错误的是？","explanation":"静态成员变量可以是 const","choices":[{"id":0,"text":"静态成员变量不能是 <code class=\"inline-code\">const</code>","explanation":"错误说法，即本题答案。静态成员变量可以是<code class=\"inline-code\">const</code>的，例如<code class=\"inline-code\">static const int N = 10;</code>是合法的。"},{"id":1,"text":"静态成员变量必须在类外初始化","explanation":"正确说法。非const静态成员变量通常需要在类外定义和初始化。"},{"id":2,"text":"静态成员变量不能在构造函数内初始化","explanation":"正确说法。静态成员变量属于类而非对象，不能在构造函数内初始化。"},{"id":3,"text":"静态成员变量在所有对象间共享","explanation":"正确说法。静态成员变量只有一份存储，被该类所有对象共享。"}],"answer":[0]},{"id":14,"description":"类的构造函数的作用是什么？","explanation":"拷贝构造函数参数必须是引用，否则会递归调用自身","choices":[{"id":0,"text":"必要时修改数据成员","explanation":"修改数据成员是普通成员函数的职责，不是构造函数的主要作用。"},{"id":1,"text":"销毁一个对象","explanation":"销毁对象是析构函数的作用，不是构造函数的作用。"},{"id":2,"text":"产生该对象时，初始化其数据成员","explanation":"正确。构造函数的主要作用是在对象创建时初始化其数据成员，确保对象处于有效状态。"},{"id":3,"text":"在外部调用私有成员函数","explanation":"构造函数不能用于在外部调用私有成员函数，这不是它的设计目的。"}],"answe
